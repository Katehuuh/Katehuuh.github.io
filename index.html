<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Katehuuh / Nekochu</title>
<meta name="description" content="Vibe code, models, and a kitten benchmark.">
<meta name="color-scheme" content="dark">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Geist+Mono:wght@400;500;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%2280%22%20font-size%3D%2280%22%3E%F0%9F%90%B1%3C/text%3E%3C/svg%3E">
<style>
/* Design tokens. Warm-tone dark mode, coral-orange primary, soft rose secondary.
   Fraunces (display), Manrope (body), Geist Mono (mono). */
:root {
  /* === Colors ============================================================ */
  --bg:        #0a0a0e;                      /* page bg, slight blue undertone */
  --bg-1:      #0f0f15;                      /* cards / panels */
  --bg-2:      #14141a;                      /* elevated inputs, popovers */
  --bg-3:      #1c1c24;                      /* hover surface */
  --line:      rgba(255, 255, 255, 0.07);    /* hairlines */
  --line-2:    rgba(255, 255, 255, 0.13);    /* dividers */
  --text:      #f4f4f6;                      /* primary text */
  --text-2:    rgba(244, 244, 246, 0.72);    /* secondary — bumped from .62 */
  --text-3:    rgba(244, 244, 246, 0.55);    /* muted / labels — bumped from .36 (WCAG AA) */
  --accent:    #ff6b35;                      /* coral-orange — primary brand */
  --accent-2:  #ffa8b8;                      /* soft rose — secondary highlight */
  --accent-3:  #f5cf5e;                      /* warm gold — tertiary, sparingly */
  --accent-soft: rgba(255, 107, 53, 0.12);
  --accent-line: rgba(255, 107, 53, 0.42);
  --danger:    #ff6f6f;
  --success:   #7dd49b;

  /* === Fonts ============================================================= */
  --serif:     "Fraunces", ui-serif, Georgia, serif;          /* display */
  --sans:      "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --mono:      "Geist Mono", ui-monospace, "JetBrains Mono", "SF Mono", Consolas, monospace;

  /* === Type — single token for small UI text; headings use inline rem ==== */
  --fs-sm:     17px;
  --lh-tight:  1.2;

  /* === Spacing & radii — only what's used ================================ */
  --sp-2:   8px;
  --r-sm:   10px;
  --r-lg:   22px;
  --r-pill: 999px;

  /* === Elevation ========================================================= */
  --shadow-1:    0 1px 3px rgba(0, 0, 0, 0.3);
  --shadow-2:    0 6px 20px -8px rgba(0, 0, 0, 0.5);
  --shadow-3:    0 18px 38px -12px rgba(0, 0, 0, 0.6);
  --shadow-glow: 0 0 28px -6px rgba(255, 107, 53, 0.36);
  --shadow-coral:0 18px 44px -14px rgba(255, 107, 53, 0.42), 0 6px 18px -8px rgba(255, 107, 53, 0.18);

  /* === Motion ============================================================ */
  --ease-bounce: cubic-bezier(.34, 1.56, .64, 1);   /* overshoot — popovers, cards on hover */

  /* === Layout ============================================================ */
  --max:    980px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text); font-family: var(--sans);
  font-size: 18px; line-height: 1.6;
  -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: 100%;
  text-rendering: optimizeLegibility;
}
main { max-width: var(--max); margin: 0 auto; padding: 3.5rem 1.4rem 5rem; }
a { color: var(--accent); text-decoration: none; }
a:hover { color: #ffb98d; }
::selection { background: var(--accent-soft); color: var(--accent); }

.hero { text-align: center; margin-bottom: 2.4rem; }
.avatar {
  width: 96px; height: 96px; border-radius: 50%; display: block;
  margin: 0 auto .65rem;
  box-shadow: 0 0 0 1px var(--line), 0 30px 60px -20px rgba(255, 107, 53, 0.18);
}
/* Display name with the asterisk-as-mark idea — the * subtly hints at the
   alias (Nekochu) without spelling it out. Hover the * for the full title. */
.hero-name {
  margin: 0 0 .15rem;
  font: 500 clamp(2.6rem, 9vw, 5rem)/1 var(--serif);
  font-variation-settings: "opsz" 144;
  letter-spacing: -0.025em;
  color: var(--text);
}
.hero-mark {
  position: relative;
  top: -0.42em;
  display: inline-block;
  margin-left: .04em;
  color: var(--accent);
  font: 500 .42em/1 var(--mono);
  letter-spacing: 0;
  cursor: help;
  text-decoration: none;
  border: 0;
  transform-origin: bottom left;
  animation: mark-pop .55s var(--ease-bounce) .55s both;
}
@keyframes mark-pop {
  from { opacity: 0; transform: scale(0) rotate(-25deg); }
  to   { opacity: 1; transform: scale(1) rotate(0); }
}
.hero-tagline {
  margin: 0 0 1.2rem;
  color: var(--text-3);
  font: 500 var(--fs-sm)/1.4 var(--mono);
  letter-spacing: .12em;
  text-transform: lowercase;
}
.hero-tagline .dot { color: var(--accent); margin: 0 .35em; }
.icon-nav { display: inline-flex; gap: .25rem; justify-content: center; }
/* Direct-child selectors only — descendant `.icon-nav a` would also match
   popover pills and force them to 48x48 circles. */
.icon-nav > a, .icon-nav > .icon-pop-wrap > a {
  display: inline-flex; align-items: center; justify-content: center;
  width: 48px; height: 48px; border-radius: 999px;
  border: 1px solid var(--line); color: var(--text);
  transition: border-color .18s ease, background-color .18s ease, color .18s ease, transform .18s ease;
}
.icon-nav > a:hover, .icon-nav > .icon-pop-wrap > a:hover {
  border-color: var(--accent-line); background: var(--accent-soft);
  color: var(--accent); transform: translateY(-2px);
}
.icon-nav svg { display: block; }
.icon-nav .emoji { font-size: 1.35rem; line-height: 1; display: inline-block; -webkit-text-fill-color: initial; }

/* Popover above icon, sibling of icon-link so item clicks don't fire icon's href.
   2-col grid with content-sized columns keeps rows visually balanced (no orphan
   long pill stranded on its own row). Section headers + orphan items span both. */
.icon-pop-wrap { position: relative; display: inline-flex; }
.icon-pop-wrap .pop-list {
  position: absolute;
  bottom: calc(100% + 6px); left: 50%;
  width: max-content; max-width: min(540px, calc(100vw - 24px));
  max-height: 50vh;
  margin: 0; padding: 6px;
  list-style: none;
  display: grid; grid-template-columns: auto auto;
  justify-content: center; justify-items: center;
  column-gap: 6px; row-gap: 2px;
  background: rgba(22, 22, 26, 0.94);
  -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
  border: 1px solid var(--accent-line);
  border-radius: var(--r-sm);
  box-shadow: var(--shadow-3);
  font: 400 var(--fs-sm)/var(--lh-tight) var(--sans);
  overflow-x: hidden; overflow-y: auto;
  opacity: 0; pointer-events: none;
  transform: translateX(-50%) translateY(8px) scale(0.96);
  transition: opacity .18s ease, transform .22s var(--ease-bounce);
  z-index: 200;
}
.icon-pop-wrap .pop-list li {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .22s ease, transform .32s var(--ease-bounce);
}
.icon-pop-wrap .pop-list a {
  display: inline-block;
  padding: 3px 12px;
  border-radius: var(--r-pill);
  background: var(--accent-soft);
  border: 1px solid var(--accent-line);
  color: var(--text);
  white-space: nowrap;
  text-decoration: none;
  transition: background .14s, color .14s, border-color .14s;
}
.icon-pop-wrap .pop-list a:hover {
  background: rgba(255, 107, 53, 0.22);
  color: var(--accent);
  border-color: var(--accent);
}
.icon-pop-wrap .pop-list .section-header,
.icon-pop-wrap .pop-list .section-orphan {
  grid-column: 1 / -1;
}
.icon-pop-wrap .pop-list .section-header {
  padding: 2px 0 0;
  font: 600 var(--fs-sm)/1 var(--mono);
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--accent);
}
.icon-pop-wrap .pop-list .section-header:first-child { padding-top: 0; }

.icon-pop-wrap.show-pop .pop-list,
.icon-pop-wrap:focus-within .pop-list {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(-50%) translateY(0) scale(1);
}
.icon-pop-wrap.show-pop .pop-list li,
.icon-pop-wrap:focus-within .pop-list li {
  opacity: 1;
  transform: translateY(0);
  transition-delay: var(--idx, 0ms);
}
/* Decorative chain-line connecting icon to popover. Animated grow on open;
   removed when .show-pop is gone (no separate fade-out needed). */
.icon-pop-wrap.show-pop::before {
  content: '';
  position: absolute;
  bottom: 100%; left: calc(50% - 0.5px);
  width: 1px; height: 6px;
  background-image: linear-gradient(to top, var(--accent), var(--accent) 50%, transparent 50%);
  background-size: 100% 3px;
  pointer-events: none;
  z-index: 199;
  transform-origin: bottom;
  animation: tree-chain-grow .25s var(--ease-bounce);
}
@keyframes tree-chain-grow { from { transform: scaleY(0); } to { transform: scaleY(1); } }

/* Inline search field that lives next to the tag-filter pill */
.inline-search {
  appearance: none;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.04);
  border-radius: 999px;
  padding: .35rem .95rem;
  color: var(--text);
  font-family: var(--mono);
  font-size: var(--fs-sm);
  letter-spacing: .04em;
  width: 170px;
  -webkit-backdrop-filter: blur(12px) saturate(140%);
  backdrop-filter: blur(12px) saturate(140%);
  outline: none;
  transition: border-color .2s ease, background-color .2s ease, width .25s ease;
}
.inline-search::placeholder { color: var(--text-3); }
.inline-search:hover { border-color: rgba(255, 255, 255, 0.18); }
.inline-search:focus {
  border-color: var(--accent-line);
  background: rgba(255, 138, 76, 0.08);
  width: 200px;
}
.is-hidden-by-search { display: none !important; }

section { margin-block: 2.8rem; }
section h2 {
  font-family: var(--serif); font-weight: 500;
  font-size: clamp(1.55rem, 3vw, 1.95rem);
  letter-spacing: -0.018em; margin: 0 0 .35rem;
  display: flex; align-items: center; gap: .9rem; flex-wrap: wrap;
}

/* ─── Liquid-glass tag filter ─────────────────────────────────────────
   Three layers stacked to fake Apple's "lip profile" + Snell-law bezel
   without a real-time displacement shader:

   1. multi-step inset box-shadow for the convex rim (light catches the
      top edge twice — outer specular ring + inner highlight — same as a
      pinched glass cross-section)
   2. ::before conic-gradient specular highlight that tracks the cursor
      via the --gloss-angle CSS variable (set by JS)
   3. backdrop-filter: blur + saturate for the surface; on Chromium,
      additionally `url(#lg-refract)` references an SVG turbulence-based
      feDisplacementMap so the actual backdrop distorts at the rim. Safari
      ignores the url() and falls back to plain blur.
────────────────────────────────────────────────────────────────────── */
.tag-filter {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 3px;
  position: relative;
  isolation: isolate;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.05);
  -webkit-backdrop-filter: blur(14px) saturate(170%);
  backdrop-filter: blur(14px) saturate(170%) url(#lg-refract);
  box-shadow:
    /* outer ambient ring */
    0 0 0 1px rgba(255, 255, 255, 0.08),
    /* outer drop shadow for elevation */
    0 6px 24px -6px rgba(0, 0, 0, 0.55),
    /* inner top highlight (the key light catching the lip) */
    inset 0 1.5px 0 rgba(255, 255, 255, 0.45),
    /* inner side bevels — extra hint of glass thickness */
    inset 1.5px 0 1px rgba(255, 255, 255, 0.10),
    inset -1.5px 0 1px rgba(255, 255, 255, 0.10),
    /* inner bottom shadow (back of the lip) */
    inset 0 -1px 0 rgba(0, 0, 0, 0.28);
  font-family: var(--mono);
  font-size: var(--fs-sm);
  letter-spacing: .1em;
  text-transform: uppercase;
}

/* Mouse-tracked specular sweep */
.tag-filter::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  z-index: -1;
  background: conic-gradient(
    from var(--gloss-angle, 90deg),
    transparent 0deg,
    transparent 70deg,
    rgba(255, 255, 255, 0.38) 100deg,
    rgba(255, 255, 255, 0.16) 140deg,
    transparent 210deg,
    transparent 360deg
  );
  filter: blur(7px);
  mix-blend-mode: screen;
  opacity: 0.85;
}

/* Static top arc + bottom slope for the lip cross-section */
.tag-filter::after {
  content: '';
  position: absolute;
  inset: 1px;
  border-radius: inherit;
  pointer-events: none;
  z-index: -1;
  background: linear-gradient(
    180deg,
    rgba(255, 255, 255, 0.22) 0%,
    rgba(255, 255, 255, 0) 38%,
    rgba(0, 0, 0, 0) 72%,
    rgba(0, 0, 0, 0.07) 100%
  );
}

.tag-filter button {
  position: relative;
  z-index: 1;
  appearance: none;
  background: transparent;
  border: 0;
  color: var(--text-3);
  padding: 2px 10px;
  border-radius: 999px;
  font: inherit;
  cursor: pointer;
  transition: color .2s ease, background-color .25s ease, box-shadow .25s ease;
}
.tag-filter button:hover {
  color: var(--text);
  background: rgba(255, 255, 255, 0.05);
}
.tag-filter button.active {
  color: var(--accent);
  background: linear-gradient(180deg,
    rgba(255, 138, 76, 0.24),
    rgba(255, 138, 76, 0.11)
  );
  box-shadow:
    /* still a tiny lip on the active button */
    inset 0 1px 0 rgba(255, 255, 255, 0.22),
    inset 0 0 0 1px rgba(255, 138, 76, 0.38),
    inset 0 -1px 0 rgba(0, 0, 0, 0.20),
    0 0 14px -3px rgba(255, 138, 76, 0.32);
}
/* Separator between filter toggles and the sort toggle */
.tag-filter .sort-sep {
  display: inline-block;
  width: 1px;
  align-self: stretch;
  margin: 4px 4px;
  background: rgba(255, 255, 255, 0.14);
}
.tag-filter button#sort-by-likes {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
}
.tag-filter button#sort-by-likes .heart-glyph,
.tag-filter button#sort-by-likes .arrow-glyph {
  display: block;
  width: 13px;
  height: 13px;
  flex-shrink: 0;
}
.tag-filter button#sort-by-likes .arrow-glyph {
  opacity: .55;
  transition: opacity .25s ease, transform .25s ease;
}
.tag-filter button#sort-by-likes.active .arrow-glyph {
  opacity: 1;
}
.is-hidden-by-filter { display: none !important; }

.vibe-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
@media (min-width: 720px) { .vibe-grid { grid-template-columns: 1fr 1fr; gap: 1.25rem; } }
.vibe-card {
  background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--r-lg);
  overflow: hidden; display: flex; flex-direction: column;
  transition: border-color .2s ease, transform .2s ease, box-shadow .25s ease;
}
@media (hover: hover) {
  .vibe-card:hover {
    border-color: var(--accent-line);
    transform: translateY(-2px);
    box-shadow: var(--shadow-coral);
  }
}
.vibe-card a.card-link { color: inherit; display: flex; flex-direction: column; flex: 1; }
.vibe-card a.card-link:hover { color: inherit; }
.thumb-wrap { position: relative; }
.thumb {
  aspect-ratio: 16 / 9; background: var(--bg-2);
  width: 100%; display: block; object-fit: cover;
  border-bottom: 1px solid var(--line);
}
.thumb.placeholder {
  display: flex; align-items: center; justify-content: center;
  color: var(--text-3); font-family: var(--mono); font-size: .82rem; letter-spacing: .04em;
}

/* Title row containing the h3 plus the like button on the right. */
.title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .8rem;
  margin-bottom: .28rem;
}
.title-row h3 { margin: 0; flex: 1; min-width: 0; }

/* Like button — sits next to the title (no longer overlay on thumbnail).
   Click adds your like; orange-filled when you've liked. Public count
   shown next to the heart. */
.like-btn {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  padding: .22rem .55rem;
  background: rgba(20, 20, 24, 0.5);
  border: 1px solid rgba(255, 255, 255, 0.14);
  color: rgba(244, 244, 246, 0.75);
  border-radius: 999px;
  font-family: var(--mono);
  font-size: .8rem;
  font-weight: 500;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .18s ease, border-color .18s ease, color .18s ease, transform .12s ease;
}
.like-btn:hover {
  background: rgba(20, 20, 24, 0.92);
  border-color: var(--accent-line);
  color: var(--accent);
}
.like-btn:active { transform: scale(0.94); }
.like-btn.liked {
  background: rgba(255, 138, 76, 0.14);
  border-color: rgba(255, 138, 76, 0.55);
  color: var(--accent);
}
.like-btn .heart {
  width: 16px; height: 16px;
  fill: none; stroke: currentColor; stroke-width: 2;
  stroke-linecap: round; stroke-linejoin: round;
  transition: fill .18s ease, transform .2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.like-btn.liked .heart {
  fill: var(--accent);
  transform: scale(1.05);
}
.like-btn .count {
  font-variant-numeric: tabular-nums;
  letter-spacing: 0;
  min-width: 1ch;
  text-align: right;
}
.card-body { padding: 1.05rem 1.2rem 1.2rem; }
.card-body h3 {
  font-family: var(--serif); font-weight: 500; font-size: 1.22rem;
  letter-spacing: -0.01em; margin: 0 0 .28rem;
}
.card-body p { margin: 0; color: var(--text-2); font-size: var(--fs-sm); }
.card-meta {
  margin-top: .8rem; display: flex; gap: .4rem; flex-wrap: wrap;
  font-family: var(--mono); font-size: .8rem; color: var(--text-3);
}
.card-meta span, .card-meta a {
  border: 1px solid var(--line); padding: .12rem .55rem;
  border-radius: 999px; color: inherit;
}
.card-meta a:hover { border-color: var(--accent-line); color: var(--accent); }
.card-meta time.card-date {
  margin-left: auto; border: 0; padding: 0;
  color: var(--text-3); font-size: var(--fs-sm);
}

section.compact { display: grid; gap: .6rem; }
.compact-row {
  display: grid; grid-template-columns: 90px 1fr; gap: 1rem; align-items: baseline;
  padding-block: .55rem; border-top: 1px solid var(--line);
}
.compact-row:last-child { border-bottom: 1px solid var(--line); }
.compact-row h3 {
  font-family: var(--serif); font-weight: 500; font-size: 1.08rem;
  color: var(--text-2); margin: 0; letter-spacing: -0.01em;
}
.chips {
  list-style: none; padding: 0 0 .25rem; margin: 0;
  display: flex; flex-wrap: nowrap; gap: .35rem;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: thin; scrollbar-color: var(--line-2) transparent;
}
.chips::-webkit-scrollbar { height: 4px; }
.chips::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 2px; }
.chips::-webkit-scrollbar-track { background: transparent; }
.chips li { flex-shrink: 0; }
.chips li a {
  display: inline-block; padding: .25rem .7rem;
  border: 1px solid var(--line); border-radius: 999px;
  font-family: var(--mono); font-size: var(--fs-sm); color: var(--text);
  white-space: nowrap;
  transition: border-color .18s ease, color .18s ease, background-color .18s ease;
}
.chips li a:hover {
  border-color: var(--accent-line); background: var(--accent-soft); color: var(--accent);
}
@media (max-width: 540px) {
  .compact-row { grid-template-columns: 1fr; gap: .35rem; padding-block: .8rem; }
}

@keyframes rise {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.rise { animation: rise .65s cubic-bezier(.2, .65, .2, 1) both; }
.rise[data-d="1"] { animation-delay: .04s; }
.rise[data-d="2"] { animation-delay: .12s; }
.rise[data-d="3"] { animation-delay: .20s; }
.rise[data-d="4"] { animation-delay: .28s; }
.rise[data-d="5"] { animation-delay: .36s; }
@media (prefers-reduced-motion: reduce) { .rise { animation: none; } }

@media (max-width: 600px) {
  main { padding: 2rem 1.1rem 3.5rem; }
  .hero { margin-bottom: 2rem; }
  .avatar { width: 92px; height: 92px; margin-bottom: .8rem; }
  section { margin-block: 2.2rem; }
  /* Bigger tap targets where text is dense. */
  .tag-filter button { padding: 5px 12px; }
  .chips li a { padding: .35rem .8rem; }
}
/* Scroll-driven reveal — replaces the time-based cascade where supported.
   In Chrome/Edge cards animate as they enter the viewport, off-the-shelf, no JS. */
@supports (animation-timeline: view()) {
  .vibe-card.rise {
    animation-timeline: view();
    animation-range: cover 0% cover 22%;
    animation-delay: 0s; /* timeline drives progress, not time */
  }
}

/* Command palette — Ctrl/Cmd+K opens a centered modal scoped to navigation
   jumps and filter toggles (project search lives in the inline search field).
   Lazily-built on first open so the cost doesn't hit initial paint. */
.cmd-overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.55);
  -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
  display: none; align-items: flex-start; justify-content: center;
  padding: 12vh 16px 16px;
  z-index: 1000;
  opacity: 0; transition: opacity .18s ease;
}
.cmd-overlay.open { display: flex; opacity: 1; }
.cmd-panel {
  width: min(560px, 100%);
  max-height: 70vh;
  background: var(--bg-1);
  border: 1px solid var(--accent-line);
  border-radius: 14px;
  box-shadow: var(--shadow-3), 0 0 0 1px rgba(255, 107, 53, 0.10);
  display: flex; flex-direction: column;
  overflow: hidden;
  transform: translateY(-8px) scale(0.98);
  transition: transform .22s var(--ease-bounce);
}
.cmd-overlay.open .cmd-panel { transform: translateY(0) scale(1); }
.cmd-input {
  appearance: none; width: 100%;
  padding: 16px 20px;
  background: transparent;
  border: 0; border-bottom: 1px solid var(--line);
  color: var(--text);
  font: 500 18px/1.4 var(--sans);

}
.cmd-input::placeholder { color: var(--text-3); }
.cmd-list {

}
.cmd-list li {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px;

}
.cmd-list .label { flex: 1; color: var(--text); }
.cmd-list .meta { color: var(--text-3); font: 600 11px/1 var(--mono); text-transform: uppercase; letter-spacing: .06em; }
.cmd-list li[aria-selected="true"] { background: var(--accent-soft); }
.cmd-list li[aria-selected="true"] .meta { color: var(--accent); }
.cmd-list .empty { padding: 20px; text-align: center; color: var(--text-3); font: 500 var(--fs-sm)/1.3 var(--sans); cursor: default; }
@media (max-width: 600px) {
  .cmd-overlay { padding: 8vh 12px 12px; }
  .cmd-panel { max-height: 84vh; }
}
</style>
</head>

<script>
(async () => {
  let data;
  try {
    data = await fetch('data.json').then(r => r.json());
  } catch (e) {
    console.error('failed to load data.json', e);
    return;
  }

  const projects = data.projects || [];
  await liveAugmentDemos(projects);
  renderProjects(projects);
  setupSearch();
  setupTagFilter();
  setupSortByLikes();
  populateHeroPopovers(data);
  setupCommandPalette();
})();

// `document.startViewTransition(fn)` snapshots the DOM, runs fn, then crossfades
// from old to new — turning a "snap" filter change into a smooth diff. Falls
// back to a plain call where the API isn't shipped (Firefox at time of writing).
function withVT(fn) {
  if (document.startViewTransition) document.startViewTransition(fn);
  else fn();
}

function setupTagFilter() {
  const root = document.getElementById('tag-filter');
  if (!root) return;
  // Scope to [data-tag] so the sort-by-likes button (also inside .tag-filter)
  // doesn't get treated as a category toggle.
  const buttons = [...root.querySelectorAll('button[data-tag]')];
  // The three toggles cover these category tags. Cards whose tags don't
  // include any of these (descriptive-only tags like "webrtc", "p2p") are
  // shown regardless — the toggles don't affect them.
  const CATEGORY = new Set(buttons.map(b => b.dataset.tag));

  function applyFilter() {
    const enabled = new Set();
    for (const b of buttons) if (b.classList.contains('active')) enabled.add(b.dataset.tag);
    for (const card of document.querySelectorAll('.vibe-card')) {
      const tags = [...card.querySelectorAll('.card-meta span')]
        .map(s => s.textContent.trim().toLowerCase());
      const cardCats = tags.filter(t => CATEGORY.has(t));
      // No category tag on this card → always visible. Otherwise hide if all
      // of its category tags are currently toggled off.
      const visible = cardCats.length === 0 || cardCats.some(t => enabled.has(t));
      card.classList.toggle('is-hidden-by-filter', !visible);
    }
    writeHash();
  }

  // Hash-route filter state — `#tags=game,show` is shareable and survives reload.
  // Empty (all-on) hash drops the param so default URL stays clean.
  function writeHash() {
    const on = buttons.filter(b => b.classList.contains('active')).map(b => b.dataset.tag);
    const all = on.length === buttons.length;
    const target = all ? location.pathname + location.search : `#tags=${on.join(',')}`;
    if (location.href.endsWith(target) || (all && !location.hash)) return;
    history.replaceState(null, '', target);
  }
  function readHash() {
    const m = location.hash.match(/(?:^|[#&])tags=([^&]*)/);
    if (!m) return;
    const want = new Set(m[1].split(',').filter(Boolean));
    let changed = false;
    for (const b of buttons) {
      const on = want.has(b.dataset.tag);
      if (b.classList.contains('active') !== on) {
        b.classList.toggle('active', on);
        b.setAttribute('aria-pressed', on ? 'true' : 'false');
        changed = true;
      }
    }
    if (changed) applyFilter();
  }
  readHash();
  window.addEventListener('hashchange', readHash);

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      withVT(() => {
        const on = !btn.classList.contains('active');
        btn.classList.toggle('active', on);
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');
        applyFilter();
      });
    });
  });

  // Mouse-tracked specular: rotate the conic-gradient highlight on the
  // glass pill so it points roughly at the cursor. Listener is on `root`
  // (not document) so the gloss only animates when the cursor is actually
  // over the pill — no global cursor-following everywhere on the page.
  // On leave, the angle eases back to the default 90deg.
  let rafId = 0;
  const onMove = (e) => {
    if (rafId) return;
    rafId = requestAnimationFrame(() => {
      rafId = 0;
      const r = root.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const ang = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
      root.style.setProperty('--gloss-angle', `${ang + 90}deg`);
    });
  };
  root.addEventListener('mousemove', onMove, { passive: true });
  root.addEventListener('mouseleave', () => root.style.setProperty('--gloss-angle', '90deg'));
}

// Sims-4-style flyout: hovers on GitHub / HF icons reveal a tree of
// related links cascading from above the icon. Click any item to follow
// the underlying url — popover is a sibling of the icon-link, not a
// child, so item clicks don't trigger the icon's own href.
function populateHeroPopovers(data) {
  const ghLink = document.querySelector('.icon-nav a[aria-label="GitHub"]');
  const hfLink = document.querySelector('.icon-nav a[aria-label="Hugging Face"]');
  const STAGGER_MS = 55;

  const buildItem = (entry, idx) => {
    const li = document.createElement('li');
    li.style.setProperty('--idx', `${idx * STAGGER_MS}ms`);
    const a = document.createElement('a');
    a.href = entry.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = entry.name;
    if (entry.description) a.title = entry.description;
    li.appendChild(a);
    return li;
  };
  const buildHeader = (label) => {
    const li = document.createElement('li');
    li.className = 'section-header';
    li.textContent = label;
    return li;
  };

  // Wrap a link element in a `.icon-pop-wrap` with the popover as a sibling.
  // Using an inline wrapper preserves the icon-nav's flex layout.
  // Hover state is managed in JS (not :hover CSS) so we can keep the popover
  // open while the cursor traverses the gap between icon and popover. Pure
  // CSS :hover loses state the moment the cursor leaves the icon's box,
  // before it can land on a hover-bridge — JS grace period fixes that.
  const HIDE_DELAY_MS = 220;
  // Only one popover open at a time — opening one closes the others.
  const allWraps = [];
  const closeOthers = (current) => {
    for (const w of allWraps) if (w !== current) w.__closeNow();
  };
  const wrapWithPopover = (link, ul) => {
    const wrap = document.createElement('span');
    wrap.className = 'icon-pop-wrap';
    link.parentNode.insertBefore(wrap, link);
    wrap.appendChild(link);
    wrap.appendChild(ul);

    let hideTimer = null;
    const show = () => {
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
      closeOthers(wrap);
      // Clamp popover height to available space above the icon so its top
      // edge never crosses the viewport top — opens-up positioning means a
      // tall popover would otherwise spill off-screen at top on small viewports.
      const space = wrap.getBoundingClientRect().top - 6 - 8; // anchor gap + viewport buffer
      ul.style.maxHeight = Math.max(120, Math.min(window.innerHeight * 0.5, space)) + 'px';
      wrap.classList.add('show-pop');
    };
    const scheduleHide = () => {
      if (hideTimer) clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        wrap.classList.remove('show-pop');
        hideTimer = null;
      }, HIDE_DELAY_MS);
    };
    wrap.__closeNow = () => {
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
      wrap.classList.remove('show-pop');
    };
    // Listen on the wrapper — events bubble from icon, popover, and bridge.
    wrap.addEventListener('mouseenter', show);
    wrap.addEventListener('mouseleave', scheduleHide);
    // Touch / focus: tap on icon shows, blur hides
    link.addEventListener('focus', show);
    link.addEventListener('blur', scheduleHide);
    allWraps.push(wrap);
  };

  // Tag last item of an odd-count section so CSS can span it across both
  // grid columns — otherwise it sits alone in column 1 with empty col 2.
  const appendItems = (ul, items, startIdx = 0) => {
    items.forEach((item, i) => {
      const li = buildItem(item, startIdx + i);
      if (items.length % 2 === 1 && i === items.length - 1) li.classList.add('section-orphan');
      ul.appendChild(li);
    });
  };

  if (ghLink && Array.isArray(data.repos) && data.repos.length) {
    const ul = document.createElement('ul');
    ul.className = 'pop-list';
    appendItems(ul, data.repos);
    wrapWithPopover(ghLink, ul);
  }

  if (hfLink) {
    const sets = Array.isArray(data.datasets) ? data.datasets : [];
    const models = Array.isArray(data.models) ? data.models : [];
    if (sets.length || models.length) {
      const ul = document.createElement('ul');
      ul.className = 'pop-list';
      let idx = 0;
      if (sets.length) {
        ul.appendChild(buildHeader('Datasets'));
        appendItems(ul, sets, idx); idx += sets.length;
      }
      if (models.length) {
        ul.appendChild(buildHeader('Models'));
        appendItems(ul, models, idx); idx += models.length;
      }
      wrapWithPopover(hfLink, ul);
    }
  }
}

// Ctrl/Cmd+K command palette — keyboard-only navigation list (no visible button).
// Scoped to filter toggles + outbound jumps; project search lives in the inline
// search field. Built lazily on first open.
function setupCommandPalette() {
  const overlay = document.getElementById('cmd-overlay');
  const input = document.getElementById('cmd-input');
  const list = document.getElementById('cmd-list');
  if (!overlay || !input || !list) return;

  let items = [];   // [{label, meta, run}]
  let filtered = [];
  let cursor = 0;

  const buildItems = () => {
    items = [];
    const root = document.getElementById('tag-filter');
    if (root) for (const b of root.querySelectorAll('button[data-tag]')) {
      items.push({
        label: `toggle: ${b.dataset.tag}`,
        meta: 'filter',
        run: () => b.click(),
      });
    }
    items.push({ label: 'CatBench — kitten benchmark', meta: 'jump', run: () => location.assign('demos/CatBench/') });
    items.push({ label: 'GitHub — Katehuuh', meta: 'jump', run: () => window.open('https://github.com/Katehuuh', '_blank') });
    items.push({ label: 'Hugging Face — Nekochu', meta: 'jump', run: () => window.open('https://huggingface.co/Nekochu', '_blank') });
  };

  const render = () => {
    list.innerHTML = '';
    if (filtered.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'empty';
      empty.textContent = 'no matches';
      list.appendChild(empty);
      return;
    }
    filtered.forEach((it, i) => {
      const li = document.createElement('li');
      li.setAttribute('role', 'option');
      if (i === cursor) li.setAttribute('aria-selected', 'true');
      const label = document.createElement('span');
      label.className = 'label'; label.textContent = it.label;
      const meta = document.createElement('span');
      meta.className = 'meta'; meta.textContent = it.meta;
      li.append(label, meta);
      li.addEventListener('mouseenter', () => { cursor = i; updateSelection(); });
      li.addEventListener('click', () => { it.run(); close(); });
      list.appendChild(li);
    });
  };
  const updateSelection = () => {
    [...list.children].forEach((el, i) => el.toggleAttribute('aria-selected', i === cursor));
  };
  const apply = () => {
    const q = input.value.toLowerCase().trim();
    filtered = !q ? items.slice(0, 12)
      : items.filter(it => it.label.toLowerCase().includes(q) || it.meta.includes(q)).slice(0, 12);
    cursor = 0;
    render();
  };

  const open = () => {
    if (!items.length) buildItems();
    overlay.hidden = false;
    requestAnimationFrame(() => overlay.classList.add('open'));
    input.value = '';
    apply();
    input.focus();
  };
  const close = () => {
    overlay.classList.remove('open');
    setTimeout(() => { overlay.hidden = true; }, 200);
  };

  trigger?.addEventListener('click', open);
  input.addEventListener('input', apply);
  input.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); cursor = Math.min(filtered.length - 1, cursor + 1); updateSelection(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); cursor = Math.max(0, cursor - 1); updateSelection(); }
    else if (e.key === 'Enter') { const it = filtered[cursor]; if (it) { it.run(); close(); } }
    else if (e.key === 'Escape') { close(); }
  });
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

  window.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      overlay.classList.contains('open') ? close() : open();
    }
  });
}

function setupSearch() {
  const input = document.getElementById('site-search');
  if (!input) return;
  const targets = [
    ...document.querySelectorAll('.vibe-card'),
    ...document.querySelectorAll('.chips li'),
  ];
  const apply = () => {
    const q = input.value.toLowerCase().trim();
    for (const el of targets) {
      const text = el.textContent.toLowerCase();
      el.classList.toggle('is-hidden-by-search', !!q && !text.includes(q));
    }
    for (const row of document.querySelectorAll('.compact-row')) {
      const chips = [...row.querySelectorAll('.chips li')];
      const visible = chips.some(li => !li.classList.contains('is-hidden-by-search'));
      row.classList.toggle('is-hidden-by-search', !!q && !visible);
    }
  };
  input.addEventListener('input', () => withVT(apply));
}

// Pick up anything dropped under /demos/ (flat .html or subdir with
// index.html) without needing a manual data.json entry.
//
// Strategy: read a static manifest committed by CI (no API quota cost). Only
// fall back to the GitHub Contents API on rate limit / first-deploy gap.
async function liveAugmentDemos(projects) {
  const seen = new Set(projects.map(p => p.name));

  let items = await loadDemosManifest();
  if (!items) items = await loadDemosFromApi();
  if (!items) return;

  // Items are pre-sorted newest-first by the manifest; API path sorts via its
  // own commit-date query already.
  const fresh = [];
  for (const it of items) {
    let rawName, href;
    if (it.type === 'file') {
      rawName = it.name;
      const fn = it.filename || `${it.name}.html`;
      href = `demos/${fn}`;
    } else if (it.type === 'dir') {
      rawName = it.name;
      href = `demos/${it.name}/`;
    } else continue;

    let displayName = rawName, tag = null;
    const m = rawName.match(/^\[([^\]]+)\]-(.+)$/);
    if (m) { tag = m[1].toLowerCase(); displayName = m[2]; }

    if (seen.has(displayName)) continue;
    seen.add(displayName);

    fresh.push({
      name: displayName,
      url: href,
      thumb: `assets/thumbs/${rawName}.jpg`,
      tags: tag ? [tag] : ['demo'],
    });
  }

  projects.unshift(...fresh);
}

async function loadDemosManifest() {
  try {
    const r = await fetch('demos/manifest.json', { cache: 'no-store' });
    if (!r.ok) return null;
    const data = await r.json();
    return Array.isArray(data?.demos) ? data.demos : null;
  } catch {
    return null;
  }
}

// Fallback: scan via the Contents API. Best-effort — if rate-limited, we
// silently give up and the page just shows whatever data.json had.
async function loadDemosFromApi() {
  const host = location.hostname;
  if (!/\.github\.io$/i.test(host)) return null;
  const owner = host.split('.')[0];
  const repo = host;
  const ttl = 60 * 60_000;

  const contents = await fetchCached(`demos:${owner}/${repo}`, ttl,
    () => fetch(`https://api.github.com/repos/${owner}/${repo}/contents/demos`,
                { headers: { 'Accept': 'application/vnd.github+json' } }));
  if (!Array.isArray(contents)) return null;

  const items = [];
  for (const it of contents) {
    if (!it.name || it.name.startsWith('.')) continue;
    if (it.type === 'file' && /\.html?$/i.test(it.name)) {
      items.push({ name: it.name.replace(/\.html?$/i, ''), type: 'file', filename: it.name });
    } else if (it.type === 'dir') {
      // CatBench is reachable only from the cat emoji, never via the gallery.
      // Static manifest path filters via .gallery-exclude; API fallback can't
      // see hidden sentinel files, so name-skip here.
      if (it.name === 'CatBench') continue;
      items.push({ name: it.name, type: 'dir' });
    }
  }
  return items;
}

async function fetchCached(key, ttl, fetcher) {
  const cached = sessionStorage.getItem(key);
  if (cached) {
    try {
      const { t, data } = JSON.parse(cached);
      if (Date.now() - t < ttl) return data;
    } catch {}
  }
  try {
    const r = await fetcher();
    if (!r.ok) return null;
    const data = await r.json();
    sessionStorage.setItem(key, JSON.stringify({ t: Date.now(), data }));
    return data;
  } catch { return null; }
}

/* First-commit date is embedded into each thumbnail JPEG's COM marker by
   the build pipeline (scripts/embed_thumb_dates.py). We read the binary
   the browser is already fetching for <img>, so this costs ~0 network —
   shared HTTP cache between fetch() and <img>. No GitHub API hit. */
async function readJpegEmbeddedDate(thumbUrl) {
  const cacheKey = `jpgdate:${thumbUrl}`;
  const stored = localStorage.getItem(cacheKey);
  if (stored) return stored;
  try {
    // force-cache shares the response with the <img> request — no double fetch.
    const r = await fetch(thumbUrl, { cache: 'force-cache' });
    if (!r.ok) return null;
    const buf = new Uint8Array(await r.arrayBuffer());
    const iso = scanJpegComMarker(buf);
    if (iso) localStorage.setItem(cacheKey, iso);
    return iso;
  } catch { return null; }
}

/* Walk JPEG segments looking for COM (FF FE). Stop at SOS — past metadata. */
function scanJpegComMarker(buf) {
  if (buf[0] !== 0xff || buf[1] !== 0xd8) return null;
  const STANDALONE = new Set([0xd0, 0xd1, 0xd2, 0xd3, 0xd4, 0xd5, 0xd6, 0xd7, 0xd8, 0xd9, 0x01]);
  let i = 2;
  while (i + 3 < buf.length) {
    if (buf[i] !== 0xff) return null;
    const m = buf[i + 1];
    if (m === 0xda) return null;             // SOS — entropy data follows
    if (STANDALONE.has(m)) { i += 2; continue; }
    const segLen = (buf[i + 2] << 8) | buf[i + 3];
    if (m === 0xfe) {                         // COM marker
      return new TextDecoder().decode(buf.slice(i + 4, i + 2 + segLen)) || null;
    }
    i += 2 + segLen;
  }
  return null;
}

function formatRelativeDate(iso) {
  const days = (Date.now() - new Date(iso)) / 86400000;
  if (days < 1)   return 'today';
  if (days < 7)   return `${Math.floor(days)}d ago`;
  if (days < 30)  return `${Math.floor(days / 7)}w ago`;
  if (days < 365) return `${Math.floor(days / 30)}mo ago`;
  return `${Math.floor(days / 365)}y ago`;
}

/* Skipped when the project has no thumbnail (no JPEG = no embedded date). */
async function annotateCardDate(card, project) {
  if (!project.thumb) return;
  const iso = await readJpegEmbeddedDate(project.thumb);
  if (!iso) return;
  const meta = card.querySelector('.card-meta');
  if (!meta) return;
  meta.appendChild(el('time', {
    class: 'card-date',
    datetime: iso,
    title: new Date(iso).toLocaleString(),
  }, formatRelativeDate(iso)));
}

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (v == null) continue;
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else e.setAttribute(k, v);
  }
  for (const c of [].concat(children || [])) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function renderProjects(projects) {
  const root = document.getElementById('projects-grid');
  if (!root) return;
  const cards = projects.map(p => {
    const card = projectCard(p);
    annotateCardDate(card, p);
    return card;
  });
  root.replaceChildren(...cards);
}

function projectCard(p) {
  const slug = slugifyForLikes(p.name);
  const thumb = p.thumb
    ? el('img', {
        class: 'thumb', src: p.thumb, alt: '', loading: 'lazy',
        onerror: "this.replaceWith(Object.assign(document.createElement('div'), {className:'thumb placeholder', textContent:'building'}))"
      })
    : el('div', { class: 'thumb placeholder' }, 'building');
  const titleRow = el('div', { class: 'title-row' }, [
    el('h3', null, p.name),
    makeLikeButton(slug),
  ]);
  const meta = el('div', { class: 'card-meta' }, [
    p.repo ? el('a', { href: p.repo, title: 'source' }, 'src') : null,
    ...(p.tags || []).map(t => el('span', null, t)),
  ]);
  const body = el('div', { class: 'card-body' }, [
    titleRow,
    el('p', null, p.description || ''),
    meta,
  ]);
  const link = el('a', { class: 'card-link', href: p.url }, [thumb, body]);
  return el('div', { class: 'vibe-card', 'data-slug': slug }, link);
}

// ─── Sort by likes (toggle) ──────────────────────────────────────────
// Counts are populated per-card by makeLikeButton's background fetch.
// When the toggle flips on, we DOM-reorder cards by count desc; when off,
// we restore the natural order (newest demos first, captured at render).
const LIKE_COUNTS = new Map();
let sortByLikesActive = false;
let originalCardOrder = [];

function notifyLikeCountLoaded(slug, n) {
  LIKE_COUNTS.set(slug, n);
  if (sortByLikesActive) applyLikesSort();
}

function setupSortByLikes() {
  const btn = document.getElementById('sort-by-likes');
  const root = document.getElementById('projects-grid');
  if (!btn || !root) return;
  // Snapshot the natural order once, after first render.
  originalCardOrder = [...root.children];
  btn.addEventListener('click', () => {
    sortByLikesActive = !sortByLikesActive;
    btn.classList.toggle('active', sortByLikesActive);
    btn.setAttribute('aria-pressed', sortByLikesActive ? 'true' : 'false');
    if (sortByLikesActive) applyLikesSort();
    else restoreNaturalOrder();
  });
}

function applyLikesSort() {
  const root = document.getElementById('projects-grid');
  if (!root) return;
  // Stable secondary sort by original index keeps unloaded cards in their
  // natural relative order while the loaded ones float to the top.
  const indexOf = new Map(originalCardOrder.map((c, i) => [c, i]));
  const sorted = [...root.children].sort((a, b) => {
    const aN = LIKE_COUNTS.get(a.dataset.slug);
    const bN = LIKE_COUNTS.get(b.dataset.slug);
    const aHas = typeof aN === 'number';
    const bHas = typeof bN === 'number';
    if (aHas && bHas && aN !== bN) return bN - aN;
    if (aHas && !bHas) return -1;
    if (!aHas && bHas) return 1;
    return (indexOf.get(a) ?? 0) - (indexOf.get(b) ?? 0);
  });
  for (const c of sorted) root.appendChild(c);
}

function restoreNaturalOrder() {
  const root = document.getElementById('projects-grid');
  if (!root) return;
  for (const c of originalCardOrder) root.appendChild(c);
}

// ─── Likes (anonymous, no signup) ────────────────────────────────────
// Counter-only via counterapi.dev (free, no key, /up + /down both work).
// Per-browser identity via localStorage — same person on different
// browsers can like multiple times, which is acceptable for a portfolio.
// (IP-hashing was considered but adds complexity and false-positives on
//  shared NATs without much real benefit. Easy to add later.)
const LIKES_NS = 'katehuuh-likes';
const LIKES_API = 'https://api.counterapi.dev/v1';

function slugifyForLikes(name) {
  return String(name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '') || 'untitled';
}

function makeLikeButton(slug) {
  const heart = `<svg class="heart" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
  </svg>`;
  const btn = el('button', {
    class: 'like-btn',
    type: 'button',
    'aria-label': `like ${slug}`,
    title: 'like'
  });
  btn.innerHTML = heart + '<span class="count">·</span>';
  btn.dataset.slug = slug;
  // Optimistic local state from previous visits
  if (localStorage.getItem(`liked-${slug}`) === '1') btn.classList.add('liked');
  btn.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    handleLikeClick(btn);
  });
  // Background fetch of the global count. If the API is fully unreachable
  // (adblocker + puter both blocked), hide the button — better than showing
  // a non-functional heart.
  fetchLikeCount(slug).then(n => {
    if (n === null) { btn.style.display = 'none'; return; }
    btn.querySelector('.count').textContent = n;
    notifyLikeCountLoaded(slug, n);
  });
  return btn;
}

// Wait for the puter SDK to finish loading (added to <head> as async).
// Bumped to 5s — earlier 1.5s timed out on slower connections before the
// SDK was ready, causing every call to fall through to direct fetch.
function puterReady(timeoutMs = 5000) {
  if (window.puter && window.puter.net && window.puter.net.fetch) return Promise.resolve(true);
  return new Promise((resolve) => {
    const t0 = Date.now();
    const tick = () => {
      if (window.puter && window.puter.net && window.puter.net.fetch) return resolve(true);
      if (Date.now() - t0 >= timeoutMs) return resolve(false);
      setTimeout(tick, 60);
    };
    tick();
  });
}

// Single "puter is ready and warm" promise that ALL likesApi callers
// await. First call triggers SDK wait + opening the WebSocket via a
// throwaway fetch (with retries because the very first puter.net.fetch
// can fail with "Still in CONNECTING state"). Subsequent callers reuse
// the resolved promise — no parallel WS-open races. nvd-chat doesn't
// hit this because it makes one call after a user gesture, by which
// time the WS is already up; the home page fires many in parallel on
// page load, so we need to gate them.
// Silence puter SDK's internal "WebSocket Still in CONNECTING state" noise.
// The SDK fires-and-forgets some queued operations that reject when the
// underlying socket wasn't ready; our retries handle the real failure path,
// so these residual rejections are pure log spam.
window.addEventListener('unhandledrejection', (e) => {
  const msg = String((e && e.reason && (e.reason.message || e.reason)) || '');
  if (/Still in CONNECTING state/i.test(msg)) e.preventDefault();
});

// Race a promise against a timeout — every network call is timeboxed
// because puter's WS can hang indefinitely on transient relay issues,
// which would otherwise leave every like button stuck on "·" forever.
function withTimeout(p, ms, label) {
  return Promise.race([
    p,
    new Promise((_, rej) => setTimeout(() => rej(new Error(`${label} timeout ${ms}ms`)), ms)),
  ]);
}

// Skip the long warm-up retry storm if a previous session failed, but always
// do ONE quick probe per page load to detect recovery — otherwise users stay
// stuck in fallback mode forever after a transient puter.cafe outage.
const PUTER_BROKEN_KEY = 'puter-broken-until';
function puterRecentlyBroken() {
  const until = parseInt(localStorage.getItem(PUTER_BROKEN_KEY) || '0', 10);
  return Date.now() < until;
}
function markPuterBroken() {
  localStorage.setItem(PUTER_BROKEN_KEY, String(Date.now() + 60 * 60_000));
}
function clearPuterBroken() { localStorage.removeItem(PUTER_BROKEN_KEY); }

let puterReadyPromise = null;
async function ensurePuterReady() {
  if (puterReadyPromise) return puterReadyPromise;
  puterReadyPromise = (async () => {
    if (!(await puterReady())) { markPuterBroken(); return false; }
    // Single fast probe — quick recovery check after a previous failure.
    try {
      const r = await withTimeout(puter.net.fetch('https://api.github.com/'), 3500, 'puter probe');
      if (r && r.ok) { clearPuterBroken(); return true; }
    } catch { /* fall through */ }
    // Probe failed. If recently flagged, skip the heavy retry storm.
    if (puterRecentlyBroken()) return false;
    for (let i = 0; i < 3; i++) {
      try {
        const r = await withTimeout(puter.net.fetch('https://api.github.com/'), 4000, 'puter warmup');
        if (r && r.ok) { clearPuterBroken(); return true; }
      } catch { /* retry */ }
      await new Promise(r => setTimeout(r, 250 + i * 200));
    }
    markPuterBroken();
    return false;
  })();
  return puterReadyPromise;
}

// Returns the JSON, or null if all transports failed. Puter-first to
// bypass adblock filters on counterapi.dev — the actual outbound request
// goes to puter.com / puter.cafe (the relay) which isn't on standard
// filter lists. 400 "record not found" means the counter has zero hits
// yet — treat as { count: 0 } so fresh slugs show 0 instead of hiding.
// Each transport gets its own timeout so neither can hang forever.
async function likesApi(path) {
  const url = `${LIKES_API}/${LIKES_NS}/${path}`;
  const parse = async (r) => {
    if (r && r.ok) return await r.json();
    if (r && r.status === 400) {
      try {
        const j = await r.json();
        if (j && /record not found/i.test(j.message || '')) return { count: 0 };
      } catch { /* not json */ }
    }
    return undefined;
  };
  if (await ensurePuterReady()) {
    try {
      const out = await parse(await withTimeout(puter.net.fetch(url), 7000, 'puter likes'));
      if (out !== undefined) return out;
    } catch { /* fall through */ }
  }
  try {
    const out = await parse(await withTimeout(fetch(url), 4000, 'direct likes'));
    if (out !== undefined) return out;
  } catch { /* both failed */ }
  return null;
}

async function fetchLikeCount(slug) {
  const d = await likesApi(`${slug}/`);
  if (!d) return null;
  return d.count || 0;
}

async function handleLikeClick(btn) {
  const slug = btn.dataset.slug;
  if (!slug || btn.dataset.busy === '1') return;
  btn.dataset.busy = '1';
  const wasLiked = btn.classList.contains('liked');
  const countEl = btn.querySelector('.count');
  const cur = parseInt(countEl.textContent, 10);
  const curSafe = isFinite(cur) ? cur : 0;
  // Optimistic UI
  btn.classList.toggle('liked', !wasLiked);
  countEl.textContent = wasLiked ? Math.max(0, curSafe - 1) : curSafe + 1;
  if (wasLiked) localStorage.removeItem(`liked-${slug}`);
  else localStorage.setItem(`liked-${slug}`, '1');
  const op = wasLiked ? 'down' : 'up';
  const d = await likesApi(`${slug}/${op}`);
  if (d && typeof d.count === 'number') {
    countEl.textContent = d.count;
    notifyLikeCountLoaded(slug, d.count);
  } else if (d === null) {
    // Both transports blocked — revert optimistic UI
    btn.classList.toggle('liked', wasLiked);
    countEl.textContent = curSafe;
    if (wasLiked) localStorage.setItem(`liked-${slug}`, '1');
    else localStorage.removeItem(`liked-${slug}`);
  } else {
    // Optimistic value is what we have; reflect it in the sort map.
    const n = parseInt(countEl.textContent, 10);
    if (isFinite(n)) notifyLikeCountLoaded(slug, n);
  }
  btn.dataset.busy = '0';
}

</script>
