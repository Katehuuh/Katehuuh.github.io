            )

          const ClipboardIcon = () => (
            React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", fill: "none", viewBox: "0 0 24 24", strokeWidth: 1.5, stroke: "currentColor", className: "w-5 h-5" },
              React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", d: "M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v3.045M15.666 3.888a2.25 2.25 0 012.25 2.25v13.5A2.25 2.25 0 0115.75 21h-6a2.25 2.25 0 01-2.25-2.25V6.138a2.25 2.25 0 012.25-2.25h1.5M13.5 4.5v3.045m0 0A2.25 2.25 0 0015.75 9h1.5m-1.5-1.5h-3a2.25 2.25 0 00-2.25 2.25v3.75m13.5 0v3.75a2.25 2.25 0 01-2.25 2.25h-1.5a2.25 2.25 0 01-2.25-2.25V15m-3 0a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 15v3.75a2.25 2.25 0 002.25 2.25h1.5a2.25 2.25 0 002.25-2.25V15" })

          const CodeBracketIcon = () => (

          const FilmIcon = () => (

              React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", d: "M6 20.25h12A2.25 2.25 0 0020.25 18V6A2.25 2.25 0 0018 3.75H6A2.25 2.25 0 003.75 6v12A2.25 2.25 0 006 20.25z" }),
              React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", d: "M3.75 6h.008v.008H3.75V6zM3.75 9h.008v.008H3.75V9zM3.75 12h.008v.008H3.75v-.008zM3.75 15h.008v.008H3.75V15zm0 3h.008v.008H3.75v-.008zM20.25 6h-.008v.008h.008V6zM20.25 9h-.008v.008h.008V9zm0 3h-.008v.008h.008v-.008zm0 3h-.008v.008h.008V15zm0 3h-.008v.008h.008v-.008z" })
            )
          );

          const WandIcon = () => (
            React.createElement('svg', { xmlns: "http://www.w3.org/2000/svg", fill: "none", viewBox: "0 0 24 24", strokeWidth: 1.5, stroke: "currentColor", className: "w-5 h-5" },
              React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", d: "M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z" }),
              React.createElement('path', { strokeLinecap: "round", strokeLinejoin: "round", d: "M12 18l-3-3m0 0l-3 3m3-3V21" })
            )
          );

          // ---------- ControlSlider ----------
          const ControlSlider = ({ label, value, onChange, min = 0, max = 1024, step = 1 }) => {
            const handleSliderChange = (e) => {
              onChange(Number(e.target.value));
            };

            const handleNumberChange = (e) => {
              const numValue = e.target.value === '' ? min : Number(e.target.value);
              onChange(numValue);
            };

            const handleBlur = (e) => {
              let numValue = Number(e.target.value);
              if (isNaN(numValue)) numValue = min;
              onChange(Math.max(min, Math.min(max, numValue)));
            };

            return React.createElement('div', { className: "space-y-2" },
              React.createElement('div', { className: "flex justify-between items-center" },
                React.createElement('label', { htmlFor: label, className: "text-sm font-medium text-gray-300" }, label),
                React.createElement('input', {
                  type: "number",
                  id: `${label}-number`,
                  value: value,
                  onChange: handleNumberChange,
                  onBlur: handleBlur,
                  min: min,
                  max: max,
                  step: step,
                  className: "w-20 bg-gray-700 border border-gray-600 text-white text-sm rounded-md p-1 text-center focus:ring-cyan-500 focus:border-cyan-500"
                })
              ),
              React.createElement('input', {
                id: label,
                type: "range",
                min: min,
                max: max,
                step: step,
                value: value,
                onChange: handleSliderChange,
                className: "w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer range-thumb",
                style: { '--thumb-color': '#22d3ee' }
              })
            );
          };

          // ---------- AnimationPreviewer ----------
          const AnimationPreviewer = ({ image, rows, spriteWidth, rowHeight, fps }) => {
            const canvasRefs = useRef(new Map());
            const animationFrameId = useRef(null);
            const lastFrameTime = useRef(0);
            const currentFrames = useRef(new Array(rows.length).fill(0));

            useEffect(() => {
              if (!image) return;
              const frameDuration = 1000 / fps;

              const animate = (timestamp) => {
                if (!lastFrameTime.current) {
                  lastFrameTime.current = timestamp;
                }

                const elapsed = timestamp - lastFrameTime.current;

                if (elapsed > frameDuration) {
                  lastFrameTime.current = timestamp - (elapsed % frameDuration);

                  rows.forEach((sprites, rowIndex) => {
                    if (sprites.length > 0) {
                      const nextFrame = (currentFrames.current[rowIndex] + 1) % sprites.length;
                      currentFrames.current[rowIndex] = nextFrame;

                      const canvas = canvasRefs.current.get(rowIndex);
                      const sprite = sprites[nextFrame];
                      if (canvas && sprite && image) {
                        const ctx = canvas.getContext('2d');
                        if (ctx) {
                          ctx.clearRect(0, 0, canvas.width, canvas.height);
                          ctx.drawImage(
                            image,
                            sprite.x,
                            sprite.y,
                            sprite.w,
                            sprite.h,
                            0,
                            0,
                            canvas.width,
                            canvas.height
                          );
                        }
                      }
                    }
                  });
                }

                animationFrameId.current = requestAnimationFrame(animate);
              };

              rows.forEach((sprites, index) => {
                if (sprites.length > 0) {
                  const canvas = canvasRefs.current.get(index);
                  const sprite = sprites[0];
                  if (canvas && sprite && image) {
                    const ctx = canvas.getContext('2d');
                    if (ctx) {
                      ctx.imageSmoothingEnabled = false;
                      ctx.clearRect(0, 0, canvas.width, canvas.height);
                      ctx.drawImage(image, sprite.x, sprite.y, sprite.w, sprite.h, 0, 0, canvas.width, canvas.height);
                    }
                  }
                }
              });

              animationFrameId.current = requestAnimationFrame(animate);

              return () => {
                if (animationFrameId.current) {
                  cancelAnimationFrame(animationFrameId.current);
                }
              };
            }, [image, rows, fps]);

            if (!rows || rows.length === 0 || spriteWidth <= 0 || rowHeight <= 0) {
              return null;
            }

            return React.createElement('div', { className: "mt-6 bg-gray-800 rounded-lg shadow-2xl p-6" },
              React.createElement('h2', { className: "text-2xl font-bold text-cyan-400 mb-4 border-b border-gray-700 pb-2" },
                "Animation Preview"
              ),
              React.createElement('div', { className: "grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4" },
                rows.map((sprites, index) => {
                  if (sprites.length === 0) return null;
                  const originalRowIndex = sprites[0].row;
                  return React.createElement('div', { key: index, className: "flex flex-col items-center bg-gray-900/50 p-3 rounded-md border border-gray-700" },
                    React.createElement('h3', { className: "text-sm font-semibold text-gray-300 mb-2" }, `Row ${index + 1} (Original: ${originalRowIndex})`),
                    React.createElement('canvas', {
                      ref: (el) => {
                        if (el) {
                          canvasRefs.current.set(index, el);
                        } else {
                          canvasRefs.current.delete(index);
                        }
                      },
                      width: spriteWidth,
                      height: rowHeight,
                      className: "bg-checkered rounded-sm",
                      style: {
                        imageRendering: 'pixelated',
                        '--check-color-1': '#4a5568',
                        '--check-color-2': '#2d3748'
                      },
                      'aria-label': `Animation preview for original row ${originalRowIndex}`
                    })
                  );
                })
              )
            );
          };

          // ---------- SpriteAnalyzer ----------
          const REMIX_PROMPT = 'Using the same placement and type of animation, adapt to replace the current 2D game sprite character animation with the "girl with long hair". Carefully analyze the image and its movement, and replace accordingly. Each character in the grid MUST be changed to the corresponding action pose. This means idle, walk, run, jump, and attack 1 will need to be adapted to an "girl with long hair" style sprite in 2D animation.';

          // Build a synthetic sprite sheet so the demo works offline / without external images.
          // Layout matches INITIAL_STATE: labelWidth=303, spriteWidth=192, rowHeight=215,
          // offsetX=-71, offsetY=228 on a 1024x576 sheet.
          const buildDefaultSpriteSheet = () => {
            const W = 1024, H = 576;
            const canvas = document.createElement('canvas');
            canvas.width = W;
            canvas.height = H;
            const ctx = canvas.getContext('2d');
            if (!ctx) return canvas;

            // grey background that matches the "make grey transparent" target color
            ctx.fillStyle = '#a2a2a2';
            ctx.fillRect(0, 0, W, H);

            const labels = ['IDLE', 'WALK', 'RUN', 'JUMP', 'ATK 1'];
            const skinColor = '#f4c290';       // warm skin (saturated -> survives grey-transparency)
            const hairColor = '#5d3a1a';       // brown hair
            const shirtPalette = ['#e74c3c', '#f39c12', '#27ae60', '#2980b9', '#8e44ad'];
            const pantsColor = '#2c3e50';
            const rowHeight = 215;
            const labelWidth = 303;
            const spriteWidth = 192;
            const offsetX = -71;
            const offsetY = 228;

            for (let r = 0; r < 3; r++) {
              const y = offsetY + r * rowHeight;
              if (y >= H) continue;
              const rowColor = shirtPalette[r % shirtPalette.length];

              // label area (saturated dark blue so it survives transparency)
              const labelStart = Math.max(0, offsetX);
              ctx.fillStyle = '#0c2340';
              ctx.fillRect(labelStart, y, labelWidth + Math.min(0, offsetX), Math.min(rowHeight, H - y));
              ctx.fillStyle = '#ffffff';
              ctx.font = 'bold 30px sans-serif';
              ctx.textAlign = 'left';
              ctx.textBaseline = 'middle';
              ctx.fillText(labels[r % labels.length] || '',
                           labelStart + 16,
                           y + rowHeight / 2);

              // 4 sprite cells per row
              for (let c = 0; c < 4; c++) {
                const x = offsetX + labelWidth + c * spriteWidth;
                if (x + spriteWidth > W || x < 0) continue;

                // cell bg in saturated teal tint so it stays visible
                ctx.fillStyle = c % 2 === 0 ? '#11324a' : '#0e3d54';
                ctx.fillRect(x + 4, y + 4, spriteWidth - 8, Math.min(rowHeight, H - y) - 8);

                // character: head + torso + limbs, scaled to fill most of the cell
                const cx = x + spriteWidth / 2;
                const cyBase = y + rowHeight - 30;

                // legs
                ctx.fillStyle = pantsColor;
                const legSpread = 6 + c * 4;
                ctx.fillRect(cx - 22 - (c % 2 === 0 ? 0 : legSpread), cyBase - 60, 18, 60);
                ctx.fillRect(cx + 4 + (c % 2 === 0 ? 0 : legSpread), cyBase - 60, 18, 60);

                // torso
                ctx.fillStyle = rowColor;
                ctx.fillRect(cx - 32, cyBase - 120, 64, 65);

                // arms
                ctx.fillStyle = skinColor;
                ctx.fillRect(cx - 50, cyBase - 110, 18, 55);
                ctx.fillRect(cx + 32, cyBase - 110, 18, 55);

                // head
                ctx.fillStyle = skinColor;
                ctx.beginPath();
                ctx.arc(cx, cyBase - 145, 26, 0, Math.PI * 2);
                ctx.fill();

                // hair
                ctx.fillStyle = hairColor;
                ctx.beginPath();
                ctx.arc(cx, cyBase - 152, 26, Math.PI, 0);
                ctx.fill();
                ctx.fillRect(cx - 26, cyBase - 158, 52, 12);

                // frame number badge in saturated yellow
                ctx.fillStyle = '#facc15';
                ctx.fillRect(x + spriteWidth - 36, y + 8, 28, 22);
                ctx.fillStyle = '#000';
                ctx.font = 'bold 14px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`f${c + 1}`, x + spriteWidth - 22, y + 19);
              }
            }

            return canvas;
          };

          const INITIAL_STATE = {
            labelWidth: 303,
            spriteWidth: 192,
            rowHeight: 215,
            offsetX: -71,
            offsetY: 228,
            lineWidth: 1,
            fps: 10,
          };

          const isDrawable = (src) => {
            if (!src) return false;
            if (typeof HTMLImageElement !== 'undefined' && src instanceof HTMLImageElement) return true;
            if (typeof HTMLCanvasElement !== 'undefined' && src instanceof HTMLCanvasElement) return true;
            if (typeof ImageBitmap !== 'undefined' && src instanceof ImageBitmap) return true;
            return false;
          };

          const SpriteAnalyzer = () => {
            const [image, setImage] = useState(null);
            const [processedImage, setProcessedImage] = useState(null);
            const [sourceCanvas, setSourceCanvas] = useState(null);
            const [imageDimensions, setImageDimensions] = useState({ width: 1024, height: 576 });
            const [isLoading, setIsLoading] = useState(true);
            const [isAdjusting, setIsAdjusting] = useState(false);
            const [isDragOver, setIsDragOver] = useState(false);
            const [toast, setToast] = useState('');
            const canvasRef = useRef(null);
            const canvasContainerRef = useRef(null);
            const fileInputRef = useRef(null);

            const [gridVisible, setGridVisible] = useState(true);
            const [useWhiteBackground, setUseWhiteBackground] = useState(false);
            const [makeGreyTransparent, setMakeGreyTransparent] = useState(true);
            const [labelWidth, setLabelWidth] = useState(INITIAL_STATE.labelWidth);
            const [spriteWidth, setSpriteWidth] = useState(INITIAL_STATE.spriteWidth);
            const [rowHeight, setRowHeight] = useState(INITIAL_STATE.rowHeight);
            const [offsetX, setOffsetX] = useState(INITIAL_STATE.offsetX);
            const [offsetY, setOffsetY] = useState(INITIAL_STATE.offsetY);
            const [lineWidth, setLineWidth] = useState(INITIAL_STATE.lineWidth);
            const [fps, setFps] = useState(INITIAL_STATE.fps);
            const [copySuccess, setCopySuccess] = useState('');
            const [activeTab, setActiveTab] = useState('json');

            const imageToDraw = useMemo(() => {
              if (isDrawable(processedImage)) return processedImage;
              if (isDrawable(image)) return image;
              return null;
            }, [processedImage, image]);

            useEffect(() => {
              // Try the original Ryu reference; fall back to a synthetic sheet if the network blocks it.
              const DEFAULT_SPRITE_SHEET_URL = 'https://i.imgur.com/gA32p4K.png';
              const img = new Image();
              img.crossOrigin = 'anonymous';
              img.onload = () => {
                setImage(img);
                setImageDimensions({ width: img.width, height: img.height });
                setIsLoading(false);
