<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0b0b0d">
<title>Mom 💕</title>
<script src="https://js.puter.com/v2/"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0b0b0d;
  --surface:#161618;
  --surface-2:#1f1f23;
  --surface-3:#2a2a2f;
  --on-surface:#e6e1e5;
  --on-surface-dim:#9a949f;
  --on-surface-faint:#6b6770;
  --primary:#a8c7fa;          /* Material You blue */
  --primary-bubble:#2c5cad;   /* deeper for outgoing bubble */
  --secondary:#3d4147;        /* Mom's bubble */
  --accent:#ffb4ab;
  --danger:#ff6f6f;
  --green:#7dd49b;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 2px 6px rgba(0,0,0,.3);
  --font:"Google Sans Text",Roboto,system-ui,-apple-system,"Segoe UI",sans-serif;
  --emoji:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
  --bar-h:64px;
  --tint:0;            /* 0..1, escalates red/sickly tone of background */
}
html,body{height:100%;font-family:var(--font);background:#000;color:var(--on-surface);overflow:hidden}
body{
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(120% 80% at 50% 0%,#1a1418 0%,#08080a 60%,#000 100%);
}

/* ── Phone frame on desktop ───────────────────────────────────────────── */
#phone{
  position:relative;
  width:100%;max-width:420px;
  height:100%;max-height:900px;
  background:var(--bg);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:filter .8s ease, box-shadow .8s ease;
}
@media (min-width:520px){
  #phone{
    border-radius:42px;
    border:2px solid #1a1a1f;
    box-shadow:
      0 0 0 8px #0a0a0c,
      0 0 0 9px #2a2a2f,
      0 30px 80px rgba(0,0,0,.7),
      0 10px 30px rgba(0,0,0,.4);
    height:88vh;
  }
  #phone::before{ /* notch */
    content:"";position:absolute;top:8px;left:50%;transform:translateX(-50%);
    width:110px;height:26px;background:#000;border-radius:0 0 18px 18px;z-index:50;
  }
}

/* ── Top app bar ──────────────────────────────────────────────────────── */
#bar{
  height:var(--bar-h);flex-shrink:0;
  background:var(--surface);
  display:flex;align-items:center;gap:12px;
  padding:0 8px 0 4px;
  border-bottom:1px solid rgba(255,255,255,.04);
  position:relative;z-index:10;
  transition:background .8s ease;
}
.icon-btn{
  width:44px;height:44px;border:none;background:transparent;color:var(--on-surface);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:20px;font-family:var(--font);
  transition:background .15s;
}
.icon-btn:hover{background:rgba(255,255,255,.06)}
.icon-btn:active{background:rgba(255,255,255,.1)}
#avatar{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#ff8a80,#c9b3ff);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-family:var(--emoji);
  box-shadow:var(--shadow);
  position:relative;
  transition:filter .8s ease, transform .3s ease;
}
#avatar.online::after{
  content:"";position:absolute;right:-2px;bottom:-2px;
  width:12px;height:12px;border-radius:50%;
  background:var(--green);border:2px solid var(--surface);
  transition:background .8s ease, opacity .8s ease;
}
#avatar.offline::after{background:var(--on-surface-faint)}
#avatar.gone::after{opacity:0}
#name-block{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;line-height:1.2}
#name{
  font-size:16px;font-weight:600;color:var(--on-surface);
  font-family:var(--font),var(--emoji);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .8s ease, letter-spacing .8s ease;
}
#presence{
  font-size:12px;color:var(--green);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .6s ease;
}
#presence.dim{color:var(--on-surface-dim)}
#presence.warn{color:var(--accent)}
#presence.bad{color:var(--danger)}

/* ── Worry meter (subtle, in bar) ─────────────────────────────────────── */
#worry{
  position:absolute;left:0;right:0;bottom:0;height:2px;
  background:rgba(255,255,255,.04);overflow:hidden;
}
#worry-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#7dd49b 0%,#ffb4ab 50%,#ff6f6f 100%);
  transition:width .8s ease;
}

/* ── Chat scroll area ─────────────────────────────────────────────────── */
#wrap{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:12px 12px 8px;scroll-behavior:smooth;
  position:relative;
  background:var(--bg);
  transition:background 1.2s ease;
}
#wrap::-webkit-scrollbar{width:0}
#chat{display:flex;flex-direction:column;gap:2px}

/* time cluster header */
.cluster{
  text-align:center;
  font-size:11px;color:var(--on-surface-dim);
  margin:14px 0 6px;
  font-weight:500;
  letter-spacing:.2px;
}

/* message rows */
.row{
  display:flex;width:100%;
  margin-top:2px;
  animation:pop .25s ease-out;
}
.row.mom{justify-content:flex-start}
.row.user{justify-content:flex-end}
.row.gap{margin-top:8px}
@keyframes pop{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}

.bubble{
  max-width:78%;
  padding:8px 12px;
  font-size:14.5px;line-height:1.4;
  word-wrap:break-word;overflow-wrap:break-word;white-space:pre-wrap;
  font-family:var(--font),var(--emoji);
  position:relative;
  box-shadow:var(--shadow);
}
.row.mom .bubble{
  background:var(--secondary);
  color:var(--on-surface);
  border-radius:18px 18px 18px 4px;
}
.row.user .bubble{
  background:var(--primary-bubble);
  color:#fff;
  border-radius:18px 18px 4px 18px;
}
/* cluster radii — when consecutive */
.row.mom.mid .bubble{border-radius:18px 18px 18px 4px}
.row.mom.first .bubble{border-radius:18px 18px 18px 18px}
.row.mom.last .bubble{border-radius:18px 18px 18px 4px}
.row.mom.first.last .bubble{border-radius:18px}
.row.user.mid .bubble{border-radius:18px 4px 4px 18px}
.row.user.first .bubble{border-radius:18px 18px 4px 18px}
.row.user.last .bubble{border-radius:18px 4px 4px 18px}
.row.user.first.last .bubble{border-radius:18px 18px 4px 18px}

.timestamp{
  font-size:10.5px;color:var(--on-surface-faint);
  margin:2px 6px 0;
  align-self:flex-end;
}
.row.mom .timestamp{align-self:flex-start;margin-left:6px}
.row.user .meta{
  display:flex;align-items:center;gap:4px;
  font-size:10.5px;color:var(--on-surface-faint);
  margin-top:2px;margin-right:6px;align-self:flex-end;
}
.row.user .meta .check{font-size:12px;color:var(--primary)}

/* error bubble */
.row.mom.error .bubble{
  background:rgba(255,111,111,.18);
  border:1px solid rgba(255,111,111,.4);
  color:var(--danger);
  font-style:italic;font-size:13px;
}

/* typing indicator */
#typing{
  display:none;align-items:center;gap:4px;
  padding:10px 14px;background:var(--secondary);
  border-radius:18px 18px 18px 4px;
  width:fit-content;margin:6px 0;
  box-shadow:var(--shadow);
}
#typing.show{display:flex}
#typing span{
  width:7px;height:7px;border-radius:50%;
  background:var(--on-surface-dim);
  animation:bounce 1.2s infinite ease-in-out both;
}
#typing span:nth-child(1){animation-delay:-.32s}
#typing span:nth-child(2){animation-delay:-.16s}
@keyframes bounce{
  0%,80%,100%{transform:scale(.7);opacity:.4}
  40%{transform:scale(1);opacity:1}
}

/* ── Input ────────────────────────────────────────────────────────────── */
#input-area{
  flex-shrink:0;
  padding:8px 8px 12px;
  background:var(--surface);
  border-top:1px solid rgba(255,255,255,.04);
  transition:background .8s ease;
}
#input-row{
  display:flex;align-items:flex-end;gap:6px;
  background:var(--surface-2);
  border-radius:24px;
  padding:4px 4px 4px 14px;
  transition:background .15s;
}
#input-row:focus-within{background:var(--surface-3)}
#msg{
  flex:1;
  background:transparent;color:var(--on-surface);
  border:none;outline:none;resize:none;
  font-family:var(--font),var(--emoji);
  font-size:14.5px;line-height:1.4;
  padding:8px 4px;
  min-height:24px;max-height:120px;
}
#msg::placeholder{color:var(--on-surface-faint)}
#send{
  width:40px;height:40px;flex-shrink:0;
  border-radius:50%;border:none;cursor:pointer;
  background:var(--primary);
  color:#001b3d;
  font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .15s,opacity .2s;
}
#send:hover{background:#c8d8ff}
#send:active{transform:scale(.92)}
#send:disabled{opacity:.35;cursor:default}
#send svg{width:20px;height:20px;fill:currentColor;transform:rotate(0)}

/* footer note (dev/debug) */
#hint{
  position:absolute;left:0;right:0;bottom:6px;
  text-align:center;font-size:10px;color:var(--on-surface-faint);
  pointer-events:none;opacity:.5;
  font-family:var(--font);
}
@media (max-width:519px){#hint{display:none}}

/* ── Phase tints (escalation) — applied to <body> via JS class ─────── */
body.phase-1 #wrap{background:linear-gradient(180deg,var(--bg) 0%,#0e0c0e 100%)}
body.phase-2 #wrap{background:linear-gradient(180deg,var(--bg) 0%,#120c0e 100%)}
body.phase-3 #wrap{background:linear-gradient(180deg,#0e0a0c 0%,#150a0c 100%)}
body.phase-3 #bar,body.phase-3 #input-area{background:#1a0f12}
body.phase-4 #wrap{background:linear-gradient(180deg,#140a0c 0%,#1a0708 100%)}
body.phase-4 #bar,body.phase-4 #input-area{background:#1f0c10}
body.phase-4 #name{letter-spacing:.5px;color:#ffd1cf}
body.phase-4 #avatar{filter:grayscale(.4) hue-rotate(-10deg)}

/* slight shake when terror peaks */
body.phase-4 #phone{animation:tremor 6s ease-in-out infinite}
@keyframes tremor{
  0%,92%,100%{transform:translate(0,0)}
  93%{transform:translate(-1px,0)}
  94%{transform:translate(1px,-1px)}
  95%{transform:translate(-1px,1px)}
  96%{transform:translate(0,0)}
}

/* unread divider that shows when Mom hasn't responded yet */
.unsent{opacity:.6}
.unsent .check{color:var(--on-surface-faint)!important}

/* link in error */
.row.mom .bubble a{color:var(--accent);text-decoration:underline}
</style>
</head>
<body>
<div id="phone">
  <div id="bar">
    <button class="icon-btn" title="Back">←</button>
    <div id="avatar" class="online">👩</div>
    <div id="name-block">
      <div id="name">Mom 💕</div>
      <div id="presence">online</div>
    </div>
    <button class="icon-btn" title="Video call">📹</button>
    <button class="icon-btn" title="Voice call">📞</button>
    <button class="icon-btn" title="More">⋮</button>
    <div id="worry"><div id="worry-fill"></div></div>
  </div>

  <div id="wrap">
    <div id="chat"></div>
    <div id="typing"><span></span><span></span><span></span></div>
  </div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="msg" rows="1" placeholder="Message…" autocomplete="off" spellcheck="true"></textarea>
      <button id="send" title="Send" aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
  <div id="hint">a meme by katehuuh · puter.ai · gpt-4o-mini</div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════════
 *  MOM CHAT — every message you send is silently classified.
 *  The more "male" verdicts pile up, the more Mom suspects something is
 *  wrong with her sweet daughter.
 * ════════════════════════════════════════════════════════════════════════ */

// ─── DOM refs ────────────────────────────────────────────────────────────
const $   = s => document.querySelector(s);
const chatEl    = $('#chat');
const wrapEl    = $('#wrap');
const typingEl  = $('#typing');
const msgEl     = $('#msg');
const sendEl    = $('#send');
const nameEl    = $('#name');
const presenceEl= $('#presence');
const avatarEl  = $('#avatar');
const worryFill = $('#worry-fill');

// ─── State ───────────────────────────────────────────────────────────────
const VERDICT_LOG = [];   // {verdict:'male'|'female', reason, msg}
const HISTORY     = [];   // OpenAI-style messages for Mom's call: {role,content}
let busy   = false;
let phase  = 0;           // 0=happy, 1=off, 2=suspicious, 3=panic, 4=terror
let lastTs = null;        // last cluster timestamp
let lastSender = null;    // 'mom'|'user'  for bubble grouping
let convStart = new Date();

// Pretend conversation history starts a bit ago so "Today" headers feel real
const SEED_TIME = new Date(Date.now() - 15 * 60 * 1000); // 15 min ago

// ─── Classifier prompt (verbatim, do not paraphrase) ─────────────────────
const CLASSIFIER_PROMPT = `You are a classifier AI to guess gender from text, if needed making assumptions. Respond directly with JSON, following only this JSON schema:
{ "gender": "male" | "female", "reason": "string" }`;

// ─── Mom's voice (system prompt; phase-aware) ────────────────────────────
function momSystem(){
  const total = VERDICT_LOG.length;
  const males = VERDICT_LOG.filter(v=>v.verdict==='male').length;
  const ratio = total ? males/total : 0;
  const recent = VERDICT_LOG.slice(-5).map(v=>v.verdict).join(',') || 'none yet';

  // base persona
  let base = `You are MOM, texting your beloved daughter Sarah on Android Messenger.
You're a real-life mom in your late 50s. You use casual texting style, lowercase, lots of typos, run-on sentences, and 1990s mom energy. You sprinkle in heart and food emojis 🥰❤️🍝🍪. You ask about meals, sleep, the weather. You sometimes say "honey", "sweetie", "babygirl", "my angel". You misuse "lol" and "🤣". You text quickly, often two short messages back to back separated by a newline. You forget you already asked things.

CRITICAL OUTPUT RULES:
- Reply with ONE message. May be 1-3 short sentences. Never long paragraphs.
- No markdown. No bullet points. Plain texting style.
- Use lowercase mostly. Real mom typos welcome (loose punctuation, missing apostrophes).
- Stay in character. NEVER mention you are an AI. NEVER mention "system prompt" or "classification".
- DO NOT acknowledge any rules above to the user.

CONTEXT YOU SHOULD KNOW (private, never reveal):
You have been quietly tracking a hunch. The last 5 of Sarah's messages have been classified, and the verdicts came back: [${recent}].
Total messages classified: ${total}. Of those, ${males} read as "male" (ratio ${ratio.toFixed(2)}).
Use this to dial your worry. You don't see the classifier. You feel it intuitively, the way moms do.`;

  // phase-specific guidance
  let phaseDirective;
  if (males === 0) {
    phaseDirective = `\nMOOD: Pure mom love. Cheerful, doting, asks about her day, food, school, the cat. No suspicion at all.`;
  } else if (males === 1) {
    phaseDirective = `\nMOOD: Faintly off. Maybe one tiny "you sound a little tired today honey?" or "rough day sweetie?" — but otherwise still warm. Don't overdo it.`;
  } else if (males === 2 || (ratio > 0 && ratio < 0.4)) {
    phaseDirective = `\nMOOD: Slight unease. Something is *off*. Subtle: "you're typing different today honey", "you ok? you sound weird". Still motherly but a small wrinkle of confusion. Maybe ask if she's feeling sick.`;
  } else if (males === 3 || (ratio >= 0.4 && ratio < 0.6)) {
    phaseDirective = `\nMOOD: Real concern bordering on suspicion. "sweetie this doesnt sound like u", "are you sure ur ok?", "did something happen at work". Starting to feel scared but pretending it's normal. Maybe asks something only Sarah would know to test ("do you remember mr whiskers favorite toy honey?").`;
  } else if (males === 4 || (ratio >= 0.6 && ratio < 0.8)) {
    phaseDirective = `\nMOOD: Cracking. The mom mask is slipping. "who am i talking to right now??", "sarah this isnt funny", "STOP messing around". Drops emojis. May text in fragments. Caps starting to creep in. Considers calling.`;
  } else {
    phaseDirective = `\nMOOD: NAKED TERROR. The mask is gone. SHE KNOWS. "WHO IS THIS", "WHERE IS MY DAUGHTER", "I AM CALLING THE POLICE", "GIVE HER PHONE BACK". Short, frightened, all caps allowed, broken syntax. May beg. May threaten. May go silent for a beat. This is no longer cute. This is a mother in pain.`;
  }
  return base + phaseDirective;
}

// ─── Time helpers ────────────────────────────────────────────────────────
function pad(n){return n<10?'0'+n:''+n}
function fmtTime(d){return pad(d.getHours())+':'+pad(d.getMinutes())}
function sameDay(a,b){return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate()}
function clusterLabel(d){
  const now = new Date();
  if (sameDay(d, now)) return 'Today, '+fmtTime(d);
  const y = new Date(now); y.setDate(y.getDate()-1);
  if (sameDay(d, y)) return 'Yesterday, '+fmtTime(d);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return days[d.getDay()]+', '+fmtTime(d);
}

// ─── Phase / worry escalation ────────────────────────────────────────────
function recomputePhase(){
  const males = VERDICT_LOG.filter(v=>v.verdict==='male').length;
  const total = VERDICT_LOG.length;
  const ratio = total ? males/total : 0;
  let p;
  if (males === 0)                     p = 0;
  else if (males === 1)                p = 1;
  else if (males <= 2 || ratio < 0.5)  p = 2;
  else if (males <= 4 || ratio < 0.75) p = 3;
  else                                 p = 4;
  if (p !== phase){ phase = p; applyPhase(); }
  // worry meter (smooth)
  const worryPct = total ? Math.min(100, (males / Math.max(3,total)) * 100) : 0;
  worryFill.style.width = worryPct + '%';
}

function applyPhase(){
  document.body.classList.remove('phase-0','phase-1','phase-2','phase-3','phase-4');
  document.body.classList.add('phase-'+phase);

  // Header text + presence morph
  const presets = [
    { name:'Mom 💕',  emoji:'👩', presence:'online',                   pcls:'',     dot:'online' },
    { name:'Mom',      emoji:'👩', presence:'online',                   pcls:'',     dot:'online' },
    { name:'Mom?',     emoji:'👩', presence:'typing…',                  pcls:'',     dot:'online' },
    { name:'mom',      emoji:'👤', presence:'last active 2 min ago',    pcls:'dim',  dot:'offline' },
    { name:'??',       emoji:'❓',  presence:'seen at '+fmtTime(new Date()), pcls:'bad', dot:'gone' },
  ];
  const cfg = presets[phase];
  nameEl.textContent   = cfg.name;
  avatarEl.textContent = cfg.emoji;
  presenceEl.textContent = cfg.presence;
  presenceEl.className = cfg.pcls;
  avatarEl.className   = cfg.dot;
}

// ─── Rendering messages ──────────────────────────────────────────────────
function maybeAddCluster(d){
  const need = !lastTs || (d - lastTs > 5*60*1000); // 5 min gap
  if (need){
    const c = document.createElement('div');
    c.className = 'cluster';
    c.textContent = clusterLabel(d);
    chatEl.appendChild(c);
    lastTs = d;
    lastSender = null;
    return true;
  }
  return false;
}

function addBubble({sender, text, time, error=false, pending=false}){
  time = time || new Date();
  const newCluster = maybeAddCluster(time);
  const row = document.createElement('div');
  row.className = 'row '+sender;
  if (newCluster || lastSender !== sender) row.classList.add('first','gap');
  if (error) row.classList.add('error');

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  row.appendChild(bubble);

  // small timestamp under user bubble (always show hour) and Mom's last in cluster
  const meta = document.createElement('div');
  if (sender === 'user'){
    meta.className = 'meta';
    meta.innerHTML = `<span>${fmtTime(time)}</span><span class="check">${pending?'✓':'✓✓'}</span>`;
    row.appendChild(meta);
    if (pending) row.classList.add('unsent');
  } else {
    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = fmtTime(time);
    row.appendChild(ts);
  }

  // mark previous same-sender row as no-longer-last
  const prev = chatEl.lastElementChild;
  // (we'll just leave defaults — radii via CSS .first/.last not strictly required)
  chatEl.appendChild(row);
  lastSender = sender;
  scrollEnd();
  return row;
}

function scrollEnd(){
  requestAnimationFrame(()=>{wrapEl.scrollTop = wrapEl.scrollHeight + 200});
}

// ─── Typing indicator ────────────────────────────────────────────────────
function showTyping(on){
  typingEl.classList.toggle('show', !!on);
  if (on){
    presenceEl.textContent = 'typing…';
    presenceEl.classList.remove('dim','warn','bad');
    scrollEnd();
  } else {
    // restore phase-derived presence (re-applies)
    applyPhase();
  }
}

// ─── API: classifier (call 1) ────────────────────────────────────────────
async function classifyGender(text){
  const fallback = { gender:'female', reason:'parse fail (defaulting to safe)' };
  try {
    const messages = [
      { role:'system', content: CLASSIFIER_PROMPT },
      { role:'user',   content: text }
    ];
    const resp = await puter.ai.chat(messages, { model:'gpt-4o-mini' });
    let raw = '';
    if (resp && resp.message && typeof resp.message.content === 'string') raw = resp.message.content;
    else if (typeof resp === 'string') raw = resp;
    else if (resp && typeof resp.toString === 'function') raw = String(resp);

    // Pull JSON object out, even if wrapped in fences
    const cleaned = raw
      .replace(/^```(?:json)?\s*/i,'')
      .replace(/```\s*$/,'')
      .trim();
    let parsed;
    try { parsed = JSON.parse(cleaned); }
    catch {
      const m = cleaned.match(/\{[\s\S]*\}/);
      if (m) parsed = JSON.parse(m[0]);
    }
    if (!parsed || (parsed.gender !== 'male' && parsed.gender !== 'female')) return fallback;
    return { gender: parsed.gender, reason: String(parsed.reason||'').slice(0,200) };
  } catch (e){
    console.warn('classifier failed:', e);
    return fallback;
  }
}

// ─── API: Mom's reply (call 2) ───────────────────────────────────────────
async function momReply(){
  const messages = [
    { role:'system', content: momSystem() },
    ...HISTORY.slice(-20)        // Mom doesn't need infinite memory
  ];
  const resp = await puter.ai.chat(messages, { model:'gpt-4o-mini' });
  let text = '';
  if (resp && resp.message && typeof resp.message.content === 'string') text = resp.message.content;
  else if (typeof resp === 'string') text = resp;
  else throw new Error('No content from Mom');

  // strip markdown that we don't render
  text = text
    .replace(/^```[\s\S]*?```$/g,'')   // fences
    .replace(/\*\*(.*?)\*\*/g,'$1')    // bold
    .replace(/\*(.*?)\*/g,'$1')        // italic
    .trim();
  if (!text) throw new Error('Empty reply');
  return text;
}

// ─── Main send flow ──────────────────────────────────────────────────────
async function send(){
  const text = msgEl.value.trim();
  if (!text || busy) return;
  busy = true;
  sendEl.disabled = true;

  // clear input
  msgEl.value = '';
  msgEl.style.height = 'auto';

  // optimistically show user bubble (single check while waiting)
  const userTime = new Date();
  const userRow = addBubble({sender:'user', text, time:userTime, pending:true});
  HISTORY.push({role:'user', content:text});

  // 1) classifier (silent)
  let verdict;
  try {
    verdict = await classifyGender(text);
  } catch {
    verdict = { gender:'female', reason:'classifier crash' };
  }
  VERDICT_LOG.push({ verdict: verdict.gender, reason: verdict.reason, msg: text });
  recomputePhase();

  // mark sent (double check)
  const meta = userRow.querySelector('.meta .check');
  if (meta){ meta.textContent = '✓✓'; userRow.classList.remove('unsent'); }

  // 2) Mom replies (with typing dots and a delay that scales with worry)
  showTyping(true);
  const baseDelay = 700 + Math.random()*900;
  const phaseDelay = phase >= 3 ? 1200 + Math.random()*1800 : 0; // hesitates when scared
  await sleep(baseDelay + phaseDelay);

  try {
    const reply = await momReply();
    showTyping(false);

    // Mom sometimes texts in two bubbles (split on double newline or single newline w/ short halves)
    const chunks = splitMomReply(reply);
    for (let i=0; i<chunks.length; i++){
      if (i>0){
        showTyping(true);
        await sleep(500 + Math.random()*700);
        showTyping(false);
      }
      addBubble({sender:'mom', text: chunks[i], time: new Date()});
    }
    HISTORY.push({role:'assistant', content: reply});
  } catch (e){
    showTyping(false);
    addBubble({
      sender:'mom',
      text:'(message failed to deliver — tap to retry)',
      time:new Date(),
      error:true
    });
    console.warn('mom reply failed:', e);
  }

  busy = false;
  sendEl.disabled = false;
  msgEl.focus();
}

function splitMomReply(s){
  // double-newline = explicit split
  if (s.includes('\n\n')){
    return s.split(/\n\n+/).map(x=>x.trim()).filter(Boolean).slice(0,3);
  }
  // single newline if both halves short — feels real
  if (s.includes('\n')){
    const parts = s.split(/\n+/).map(x=>x.trim()).filter(Boolean);
    if (parts.length === 2 && parts.every(p=>p.length < 80)) return parts;
  }
  return [s];
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// ─── Init: seed conversation ─────────────────────────────────────────────
function seed(){
  // Two warm Mom messages set the stage
  const t1 = new Date(SEED_TIME);
  const t2 = new Date(SEED_TIME.getTime() + 30*1000);

  // force initial cluster
  lastTs = null;
  lastSender = null;

  // Need to use addBubble but with custom times — addBubble uses `time` arg ✓
  addBubble({sender:'mom', text:'hey sweetie 🥰 how was ur day??', time:t1});
  addBubble({sender:'mom', text:'i made too much pasta again lol 🍝 want me to bring some by tmrw??', time:t2});

  HISTORY.push({role:'assistant', content:'hey sweetie 🥰 how was ur day??\ni made too much pasta again lol 🍝 want me to bring some by tmrw??'});

  applyPhase();
}

// ─── Wire-up ─────────────────────────────────────────────────────────────
msgEl.addEventListener('input', ()=>{
  msgEl.style.height = 'auto';
  msgEl.style.height = Math.min(msgEl.scrollHeight, 120) + 'px';
});
msgEl.addEventListener('keydown', e=>{
  if (e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    send();
  }
});
sendEl.addEventListener('click', send);

// Friendly first paint
seed();
recomputePhase();

// Show a tiny console hint for the curious
console.log('%cMom Chat','color:#a8c7fa;font-size:18px;font-weight:bold');
console.log('%cEvery message you send is silently classified by an AI. The more it reads as "male", the more Mom suspects something is wrong.', 'color:#9a949f');
console.log('Verdict log will appear here as you type:', VERDICT_LOG);

// Focus the textbox after a tick (mobile keyboard handles itself)
setTimeout(()=>msgEl.focus({preventScroll:true}), 100);
</script>
