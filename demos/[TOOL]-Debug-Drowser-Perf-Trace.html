<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Compact, dark, single-file app -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trace Summarizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b0b0b; --panel:#111; --fg:#f5f5f5; --muted:#9aa0a6; --line:#222; --accent:#4c8dff;
      --radius:12px; --gap:12px; --pad:14px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font-family:"Noto Sans",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    .app{max-width:1100px;margin:0 auto;padding:16px}
    .topbar{display:flex;align-items:center;gap:10px;justify-content:space-between;margin-bottom:12px}
    .brand{display:flex;align-items:center;gap:10px}
    .brand h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.3px}
    .pill{font-size:11px;color:var(--muted);border:1px solid var(--line);padding:4px 8px;border-radius:999px}
    .uploader{flex:1;display:flex;align-items:center;gap:10px}
    #fileInput{display:none}
    .drop{flex:1;border:1px dashed var(--line);border-radius:var(--radius);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--panel)}
    .drop:hover{border-color:#333}
    .drop .hint{color:var(--muted);font-size:12px}
    .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .num,.chk{display:flex;gap:6px;align-items:center;background:var(--panel);border:1px solid var(--line);padding:6px 8px;border-radius:10px}
    .num input{width:80px;background:transparent;border:none;color:var(--fg);outline:none}
    .chk input{width:16px;height:16px;accent-color:var(--accent)}
    button.primary{background:#fff;color:#000;border:none;padding:8px 12px;border-radius:10px;cursor:pointer}
    button.ghost{background:transparent;color:var(--fg);border:1px solid var(--line);padding:8px 12px;border-radius:10px;cursor:pointer}
    button:disabled{opacity:.5;cursor:not-allowed}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:var(--gap)}
    .panel{grid-column: span 12;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:var(--pad)}
    @media(min-width:900px){
      .panel.stats{grid-column:span 4}
      .panel.list{grid-column:span 6}
      .panel.list.wide{grid-column:span 8}
      .panel.list.slim{grid-column:span 4}
    }
    .stat{display:flex;flex-direction:column;gap:6px}
    .stat .label{font-size:12px;color:var(--muted)}
    .stat .value{font-size:18px;font-weight:600}
    .progress{display:grid;gap:8px;margin:12px 0}
    .spinner{width:18px;height:18px;border:2px solid #333;border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .bar{height:6px;background:#181818;border-radius:999px;overflow:hidden;border:1px solid #1e1e1e}
    .bar-fill{height:100%;background:var(--fg);width:0%;transition:width .2s ease}
    h3{margin:0 0 10px;font-size:14px;letter-spacing:.2px}
    ol{margin:0;padding-left:18px;max-height:280px;overflow:auto}
    li{padding:4px 0;color:#e5e5e5}
    .row{display:flex;align-items:center;gap:10px;justify-content:space-between}
    .mono{font-variant-numeric:tabular-nums}
    .muted{color:var(--muted)}
    details{border:1px dashed #222;padding:10px;border-radius:10px}
    summary{cursor:pointer}
    .item-bar-bg{flex-shrink:0;width:100px;height:6px;background:#222;border-radius:3px}
    .item-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .2s ease}
    li .name{color:var(--fg)}
    li .meta{font-size:11px;color:var(--muted)}

    /* Markdown-output layout (replaces the panel grid). The point of this
       page is to dump LLM-ready markdown — render exactly that, with a few
       quick stats above and an AI verdict box. Everything else is one big
       <pre> the user can copy. */
    .md-meta{font-size:12px;color:var(--muted);margin:8px 0 12px;display:flex;flex-wrap:wrap;gap:6px 18px}
    .md-meta strong{color:var(--fg)}
    .md-meta .noise{color:#ff8a4c}
    .ai-box{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:var(--pad);margin-bottom:12px}
    .ai-box .ai-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:600}
    #aiSummary{font-family:'SF Mono','JetBrains Mono','Fira Code',Consolas,monospace;font-size:13px;line-height:1.6;white-space:pre-wrap;margin:0;color:var(--fg)}
    .md-output-wrap{position:relative}
    .md-output{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;font-family:'SF Mono','JetBrains Mono','Fira Code',Consolas,monospace;font-size:11.5px;line-height:1.55;white-space:pre;overflow:auto;color:var(--fg);max-height:70vh;tab-size:2;margin:0}
    /* StackOverflow-style copy: icon button anchored top-right of the code block */
    .md-copy-btn{position:absolute;top:8px;right:8px;z-index:2;display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;padding:0;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--muted);border-radius:8px;cursor:pointer;transition:background .15s,color .15s,border-color .15s,opacity .15s;opacity:.6}
    .md-copy-btn:hover{opacity:1;color:var(--fg);background:rgba(255,255,255,.12)}
    .md-copy-btn:active{transform:scale(.95)}
    .md-copy-btn.copied{opacity:1;color:#22c55e;background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.35)}
    .md-copy-btn svg{width:16px;height:16px;display:block;pointer-events:none}
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <span class="pill">Chrome Trace is useful for LLM context when optimizing performance.</span>
        <h1>Trace Summarizer: F12 → Performance → Record</h1>
      </div>
      <div class="uploader" id="dropzone">
        <input id="fileInput" type="file" accept=".json" />
        <div class="drop">
          <span class="hint">Drop or pick Trace-*.json</span>
          <button class="ghost" id="pickBtn">Browse</button>
        </div>
      </div>
      <div class="controls">
        <div class="num">
          <span class="muted">Top</span>
          <input id="topN" type="number" min="5" max="100" value="50" />
        </div>
        <div class="num">
          <span class="muted">Long ≥</span>
          <input id="longTaskMs" type="number" min="10" max="200" value="50" />
          <span class="muted">ms</span>
        </div>
        <label class="chk">
          <input id="onlyMain" type="checkbox" checked />
          <span class="muted">Main only</span>
        </label>
        <button id="analyzeBtn" class="primary" hidden>Analyze</button>
      </div>
    </div>

    <div id="progress" class="panel" hidden>
      <div class="row">
        <div class="row" style="gap:8px">
          <div class="spinner" aria-hidden="true"></div>
          <div class="muted" id="status">Reading…</div>
        </div>
        <div class="mono muted" id="pct">0%</div>
      </div>
      <div class="bar"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
    </div>

    <div id="summary" hidden>
      <div class="ai-box">
        <div class="ai-label">AI verdict</div>
        <pre id="aiSummary">Analyzing…</pre>
      </div>
      <div class="md-output-wrap">
        <button class="md-copy-btn" id="copyMd" type="button" aria-label="Copy markdown" title="Copy markdown">
          <svg class="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <svg class="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
        <pre id="mdOutput" class="md-output"></pre>
      </div>
    </div>
  </div>

  <script type="module">
    /* @tweakable primary accent color */
    const THEME_ACCENT = "#4c8dff";
    /* @tweakable base panel corner radius */
    const THEME_RADIUS = 12;
    /* @tweakable default Top N items */
    let DEFAULT_TOP_N = 50;
    /* @tweakable default long task threshold in ms */
    let DEFAULT_LONG_TASK_MS = 50;
    /* @tweakable debounce delay for auto re-run (ms) */
    const DEBOUNCE_MS = 250;
    /* @tweakable Pollinations text model — anonymous tier currently exposes only `openai-fast` (gpt-oss-20b reasoning); aliases: openai, gpt-oss */
    const AI_MODEL = "openai";
    /* @tweakable max words in AI summary (instruction to the model) */
    const AI_MAX_WORDS = 90;
    /* @tweakable hard token ceiling on the API call. Reasoning models (gpt-oss-20b) burn tokens on hidden chain-of-thought BEFORE producing visible output; on a complex trace (~100k events) the CoT alone can eat 2000+ tokens, so this needs to be generous or the response comes back empty with finish_reason=length */
    const AI_MAX_TOKENS = 4000;
    /* @tweakable reasoning effort hint — "low" tells reasoning models to think briefly so visible output gets tokens. Some models ignore this; that's fine */
    const AI_REASONING_EFFORT = "low";

    // apply theme tweaks
    document.documentElement.style.setProperty('--accent', THEME_ACCENT);
    document.documentElement.style.setProperty('--radius', THEME_RADIUS + 'px');

    // Elements
    const fileInput = document.getElementById('fileInput');
    const pickBtn = document.getElementById('pickBtn');
    const dropzone = document.getElementById('dropzone');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const progress = document.getElementById('progress');
    const statusEl = document.getElementById('status');
    const pctEl = document.getElementById('pct');
    const barFill = document.getElementById('barFill');
    const topNEl = document.getElementById('topN');
    const longTaskMsEl = document.getElementById('longTaskMs');
    const onlyMainEl = document.getElementById('onlyMain');
    const aiSummaryEl = document.getElementById('aiSummary');
    const summary = document.getElementById('summary');
    const mdOutput = document.getElementById('mdOutput');
    const copyMdBtn = document.getElementById('copyMd');
    const copyIconCopy = copyMdBtn.querySelector('.icon-copy');
    const copyIconCheck = copyMdBtn.querySelector('.icon-check');

    let selectedFile = null;

    function setProgress(vis, msg = '', pct = 0) {
      progress.hidden = !vis;
      statusEl.textContent = msg;
      pctEl.textContent = Math.round(pct) + '%';
      barFill.style.width = pct + '%';
    }
    function enableAnalyze(enabled) { analyzeBtn.disabled = !enabled; }

    pickBtn.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('click', (e) => {
      // avoid click scattering to nested buttons
      if (e.target.id !== 'pickBtn') fileInput.click();
    });
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); });
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      const f = e.dataTransfer.files?.[0];
      if (f) handleFile(f);
    });
    fileInput.addEventListener('change', (e) => {
      const f = e.target.files?.[0];
      if (f) handleFile(f);
    });

    function handleFile(f) {
      selectedFile = f;
      enableAnalyze(true);
      summary.hidden = true;
      setProgress(false, '', 0);
      pickBtn.textContent = 'Change';
      statusEl.textContent = '';
      runAnalyze(); // auto-analyze on select
    }

    // Inline Worker via Blob URL
    // Aggregator design notes:
    //   - WRAPPER_NAMES (RunTask, RunMicrotasks, v8.callFunction, FireAnimationFrame raw)
    //     have dur = sum-of-children. We list them in their own bucket so they
    //     don't double-count in TopEvents rankings.
    //   - NOISE_URL_RE filters chrome-extension://, userscript.html, websim host-chrome
    //     and analytics URLs out of TopJS (they're not the page-under-test).
    //   - Init phase ends at the first FireAnimationFrame on the main thread —
    //     events before that are page-load work. Each TopJS/TopEvent entry
    //     reports init vs steady-state counts/totals separately.
    //   - We collect per-key dur samples (capped at PERCENTILE_SAMPLE_CAP) so we
    //     can compute median + p95 + p99. Mean alone misleads under outliers.
    const workerUrl = URL.createObjectURL(new Blob([`
      const USE_ONLY_COMPLETE_EVENTS = true;
      const JS_EVENT_NAMES = new Set(['FunctionCall','EvaluateScript','V8.Execute','v8.run','CompileCode','JSEvaluate']);
      const RENDER_EVENTS = new Set([
        'AnimationFrame','AnimationFrame::Start','AnimationFrame::Fire','AnimationFrame::Process',
        'Layout','RecalculateStyles','RecalculateStyle','Paint','RasterTask',
        'CompositeLayers','UpdateLayerTree','HitTest','ParseHTML',
        'BeginMainThreadFrame','BeginMainFrame','Commit','ActivateLayerTree',
      ]);
      const WRAPPER_NAMES = new Set(['RunTask','RunMicrotasks','v8.callFunction','FireAnimationFrame']);
      const NOISE_URL_RE = /^chrome-extension:\\/\\/|userscript\\.html|^https?:\\/\\/[^\\/]*\\.wbsm\\.ai\\/|^https?:\\/\\/websim\\.com\\/assets\\//i;
      const INIT_FALLBACK_US = 1500 * 1000;
      const PERCENTILE_SAMPLE_CAP = 1000;

      self.onmessage = async (e) => {
        const { type, file, topN, longTaskMs, onlyMain } = e.data || {};
        if (type !== 'analyze') return;
        try {
          postProgress('Reading file…', 10);
          const text = await file.text();
          postProgress('Parsing JSON…', 25);
          const obj = JSON.parse(text);
          const traceEvents = Array.isArray(obj) ? obj : (obj.traceEvents || obj.events || []);
          if (!Array.isArray(traceEvents)) throw new Error('Unrecognized trace JSON format');
          postProgress('Indexing…', 40);
          const meta = extractMetadata(traceEvents);
          postProgress('Aggregating…', 65);
          const res = aggregate(traceEvents, {
            mainPid: meta.mainThread && meta.mainThread.pid,
            mainTid: meta.mainThread && meta.mainThread.tid,
            onlyMain,
            longTaskThresholdUs: (longTaskMs || 50) * 1000,
            topN: Math.min(100, Math.max(5, topN || 50)),
          });
          postProgress('Finalizing…', 90);
          postMessage({ type: 'result', data: buildOutput(res, meta) });
        } catch (err) {
          postMessage({ type: 'error', data: { message: 'Error: ' + err.message } });
        }
      };

      function postProgress(message, percent) {
        postMessage({ type: 'progress', data: { message, percent } });
      }

      function extractMetadata(events) {
        const threadNames = new Map();
        const processNames = new Map();
        let minTs = Number.POSITIVE_INFINITY;
        let maxTs = 0;
        for (const ev of events) {
          if (ev.ts != null) {
            minTs = Math.min(minTs, ev.ts);
            const endTs = ev.dur != null ? ev.ts + ev.dur : ev.ts;
            maxTs = Math.max(maxTs, endTs);
          }
          if (ev.ph === 'M' && ev.name === 'thread_name' && ev.args && ev.args.name) {
            threadNames.set(ev.pid + ':' + ev.tid, ev.args.name);
          }
          if (ev.ph === 'M' && ev.name === 'process_name' && ev.args && ev.args.name) {
            processNames.set(ev.pid, ev.args.name);
          }
        }
        let main = null;
        for (const [key, name] of threadNames.entries()) {
          if (/CrRendererMain|RendererMain/i.test(name)) {
            const [pid, tid] = key.split(':').map(Number);
            main = { pid, tid, name }; break;
          }
        }
        if (!main) {
          const totals = new Map();
          for (const ev of events) {
            if (USE_ONLY_COMPLETE_EVENTS && ev.ph !== 'X') continue;
            if (!String(ev.cat || '').includes('devtools.timeline')) continue;
            const key = ev.pid + ':' + ev.tid;
            totals.set(key, (totals.get(key) || 0) + (ev.dur || 0));
          }
          let bestKey = null, bestVal = -1;
          for (const [k, v] of totals.entries()) if (v > bestVal) { bestVal = v; bestKey = k; }
          if (bestKey) {
            const [pid, tid] = bestKey.split(':').map(Number);
            main = { pid, tid, name: threadNames.get(bestKey) || 'Main (?)' };
          }
        }
        const mainProcName = main ? (processNames.get(main.pid) || '') : '';
        return {
          threadNames, processNames,
          mainThread: main, processName: mainProcName,
          totalWindowUs: Math.max(0, maxTs - (isFinite(minTs) ? minTs : 0)),
          traceMinUs: isFinite(minTs) ? minTs : 0,
        };
      }

      function aggregate(events, opts) {
        const { mainPid, mainTid, onlyMain, longTaskThresholdUs, topN } = opts;

        // Pass A: locate first FireAnimationFrame on main thread → init/steady boundary
        let traceMinUs = Number.POSITIVE_INFINITY;
        for (const ev of events) if (ev.ts != null) traceMinUs = Math.min(traceMinUs, ev.ts);
        if (!isFinite(traceMinUs)) traceMinUs = 0;
        let initEndAbsUs = traceMinUs + INIT_FALLBACK_US;
        for (const ev of events) {
          if (ev.name === 'FireAnimationFrame' && ev.ph === 'X' &&
              (mainPid == null || (ev.pid === mainPid && ev.tid === mainTid))) {
            initEndAbsUs = ev.ts; break;
          }
        }

        const totalsByEvent = new Map();
        const totalsRendering = new Map();
        const totalsJS = new Map();
        const totalsJSNoise = new Map();
        const totalsThree = new Map();
        const longTasks = [];
        let eventsParsed = 0, totalMainDurUs = 0;
        let noiseDropTotalUs = 0, noiseDropCount = 0;

        const get = (obj, path) => {
          const parts = path.split('.');
          let cur = obj;
          for (const p of parts) { if (cur == null) return undefined; cur = cur[p]; }
          return cur;
        };

        // Pass B: aggregate
        for (const ev of events) {
          eventsParsed++;
          if (USE_ONLY_COMPLETE_EVENTS && ev.ph !== 'X') continue;
          const isMain = (ev.pid === mainPid && ev.tid === mainTid);
          if (onlyMain && !isMain) continue;

          const dur = ev.dur || 0;
          const ts = ev.ts || 0;
          const isInit = ts < initEndAbsUs;

          if (isMain) totalMainDurUs += dur;
          addToMap(totalsByEvent, ev.name, dur, isInit);

          if (RENDER_EVENTS.has(ev.name)) addToMap(totalsRendering, ev.name, dur, isInit);

          // Long tasks: skip wrappers (RunTask wraps everything) — single leaf events only
          if (!WRAPPER_NAMES.has(ev.name) && isLongTaskName(ev.name) && dur >= longTaskThresholdUs) {
            longTasks.push({ name: ev.name, startUs: ts, durUs: dur, isInit, pid: ev.pid, tid: ev.tid });
          }

          const url = get(ev, 'args.data.url') || get(ev, 'args.beginData.url') || '';
          const fn = get(ev, 'args.data.functionName') || get(ev, 'args.beginData.functionName') || '';
          const line = get(ev, 'args.data.lineNumber') ?? get(ev, 'args.beginData.lineNumber');
          const col = get(ev, 'args.data.columnNumber') ?? get(ev, 'args.beginData.columnNumber');
          const loc = (line != null) ? (':' + line + (col != null ? ':' + col : '')) : '';
          const hasJsName = JS_EVENT_NAMES.has(ev.name);
          const jsKey = hasJsName || url || fn
            ? [fn || '', url || '', ev.name].filter(Boolean).join(' @ ') + (loc || '')
            : null;

          if (jsKey) {
            const isNoise = NOISE_URL_RE.test(url) || NOISE_URL_RE.test(jsKey);
            if (isNoise) {
              noiseDropTotalUs += dur; noiseDropCount += 1;
              addToMap(totalsJSNoise, jsKey, dur, isInit);
            } else {
              addToMap(totalsJS, jsKey, dur, isInit);
            }
          }

          if ((url && /three(\\.module)?\\.js|threejs/i.test(url)) || /three/i.test(fn)) {
            const key = [fn || ev.name, url || ''].filter(Boolean).join(' @ ') + (loc || '');
            addToMap(totalsThree, key, dur, isInit);
          }
        }

        const finishItem = ([name, v]) => ({
          name,
          totalUs: v.total, count: v.count,
          initTotalUs: v.initTotal, initCount: v.initCount,
          steadyTotalUs: v.steadyTotal, steadyCount: v.steadyCount,
          medianUs: percentile(v.durs, 0.5), p95Us: percentile(v.durs, 0.95), p99Us: percentile(v.durs, 0.99),
          isWrapper: WRAPPER_NAMES.has(name),
        });
        const finishJs = ([key, v]) => ({
          key,
          totalUs: v.total, count: v.count,
          initTotalUs: v.initTotal, initCount: v.initCount,
          steadyTotalUs: v.steadyTotal, steadyCount: v.steadyCount,
          medianUs: percentile(v.durs, 0.5), p95Us: percentile(v.durs, 0.95), p99Us: percentile(v.durs, 0.99),
        });
        const sortDesc = (a, b) => b.totalUs - a.totalUs;

        const allEvents = Array.from(totalsByEvent.entries()).map(finishItem).sort(sortDesc);
        const topEvents = allEvents.filter(e => !e.isWrapper).slice(0, topN);
        const wrappers = allEvents.filter(e => e.isWrapper).slice(0, 10);
        const rendering = Array.from(totalsRendering.entries()).map(finishItem).sort(sortDesc).slice(0, topN);
        const topJs = Array.from(totalsJS.entries()).map(finishJs).sort(sortDesc).slice(0, topN);
        const topJsNoise = Array.from(totalsJSNoise.entries()).map(finishJs).sort(sortDesc).slice(0, 10);
        const three = Array.from(totalsThree.entries()).map(finishJs).sort(sortDesc).slice(0, topN);

        longTasks.sort((a, b) => b.durUs - a.durUs);
        return {
          eventsParsed, initEndAbsUs, traceMinUs,
          topEvents, wrappers, rendering, topJs, topJsNoise, three,
          longTasks: longTasks.slice(0, topN),
          totalMainDurUs, noiseDropTotalUs, noiseDropCount,
          debug: { counts: { eventsParsed, longTasksFound: longTasks.length, jsNoiseKeys: totalsJSNoise.size, noiseDropMs: (noiseDropTotalUs/1000).toFixed(1) } }
        };
      }

      function addToMap(map, key, dur, isInit) {
        let cur = map.get(key);
        if (!cur) {
          cur = { total: 0, count: 0, initTotal: 0, initCount: 0, steadyTotal: 0, steadyCount: 0, durs: [] };
          map.set(key, cur);
        }
        cur.total += dur;
        cur.count += 1;
        if (isInit) { cur.initTotal += dur; cur.initCount += 1; }
        else { cur.steadyTotal += dur; cur.steadyCount += 1; }
        if (cur.durs.length < PERCENTILE_SAMPLE_CAP) cur.durs.push(dur);
      }

      function percentile(durs, q) {
        if (!durs || durs.length === 0) return 0;
        const sorted = durs.slice().sort((a, b) => a - b);
        const idx = Math.min(sorted.length - 1, Math.floor(sorted.length * q));
        return sorted[idx];
      }

      function isLongTaskName(name) {
        return /Task|ProcessTask|EventDispatch|MessageLoop/i.test(name);
      }

      function buildOutput(agg, meta) {
        return {
          meta: {
            eventsParsed: agg.eventsParsed,
            mainThread: meta.mainThread,
            processName: meta.processName,
            totalWindowUs: meta.totalWindowUs,
            totalMainDurUs: agg.totalMainDurUs,
            traceMinUs: agg.traceMinUs,
            initEndAbsUs: agg.initEndAbsUs,
            initWindowUs: Math.max(0, agg.initEndAbsUs - agg.traceMinUs),
            steadyWindowUs: Math.max(0, meta.totalWindowUs - (agg.initEndAbsUs - agg.traceMinUs)),
            noiseDropTotalUs: agg.noiseDropTotalUs,
            noiseDropCount: agg.noiseDropCount,
          },
          topEvents: agg.topEvents,
          wrappers: agg.wrappers,
          rendering: agg.rendering,
          topJs: agg.topJs,
          topJsNoise: agg.topJsNoise,
          three: agg.three,
          longTasks: agg.longTasks,
          debug: agg.debug,
        };
      }
    `], { type: 'application/javascript' }));
    const worker = new Worker(workerUrl, { type: 'module' });

    analyzeBtn.addEventListener('click', () => {
      if (!selectedFile) return;
      const topN = Math.min(100, Math.max(5, Number(topNEl.value) || DEFAULT_TOP_N));
      const longTaskMs = Math.min(200, Math.max(10, Number(longTaskMsEl.value) || DEFAULT_LONG_TASK_MS));
      const onlyMain = !!onlyMainEl.checked;

      setProgress(true, 'Parsing trace…', 5);
      worker.postMessage({ type: 'analyze', file: selectedFile, topN, longTaskMs, onlyMain });
    });

    worker.onmessage = (e) => {
      const { type, data } = e.data;
      if (type === 'progress') {
        setProgress(true, data.message, data.percent);
        return;
      }
      if (type === 'result') {
        setProgress(false, '', 0);
        renderResults(data);
        aiSummaryEl.textContent = 'Generating AI summary...';
        getAiSummary(data).then(t=> aiSummaryEl.innerHTML = String(t).replace(/\n/g,'<br>'));
      }
      if (type === 'error') {
        showError(data.message || 'Failed to parse trace.');
      }
    };

    function ms(us) { return (us/1000).toFixed(2) + ' ms'; }

    function showError(message){
      progress.hidden = false;
      statusEl.textContent = message;
      statusEl.style.color = '#ff8080';
      document.querySelector('#progress .spinner').hidden = true;
      pctEl.textContent = 'Error';
      barFill.style.width = '100%';
      barFill.style.background = '#ff8080';
    }

    const debounce=(fn,ms)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}};

    function runAnalyze(){
      if(!selectedFile) return;
      const topN = Math.min(100, Math.max(5, Number(topNEl.value) || DEFAULT_TOP_N));
      const longTaskMs = Math.min(200, Math.max(10, Number(longTaskMsEl.value) || DEFAULT_LONG_TASK_MS));
      const onlyMain = !!onlyMainEl.checked;
      setProgress(true, 'Parsing trace…', 5);
      document.querySelector('#progress .spinner').hidden = false;
      barFill.style.background = 'var(--fg)';
      worker.postMessage({ type: 'analyze', file: selectedFile, topN, longTaskMs, onlyMain });
    }
    const rerun = debounce(runAnalyze, DEBOUNCE_MS);
    topNEl.addEventListener('input', rerun);
    longTaskMsEl.addEventListener('input', rerun);
    onlyMainEl.addEventListener('change', rerun);

    async function getAiSummary(data){
      // Pollinations.ai: free, no key, no login, CORS-enabled.
      // The CPU-side aggregator already pre-filters chrome-extension/userscript/host-CDN
      // noise, separates wrappers (RunTask etc.), and splits init vs steady-state.
      // The prompt uses ms-formatted numbers + rules-in-order rubric to force
      // the LLM to honour those distinctions instead of pattern-matching big
      // numbers as bottlenecks.
      const ms = us => (us/1000).toFixed(2);
      const avg = (us, n) => (us/1000/Math.max(1,n)).toFixed(3);
      const trim = (s, n=72) => s && s.length > n ? s.slice(0,n)+'…' : s;
      const tStart = data.meta.traceMinUs || 0;
      const fmtJs = items => items.slice(0,8).map(i => {
        const initMs = ms(i.initTotalUs||0), steadyMs = ms(i.steadyTotalUs||0);
        const medMs = ms(i.medianUs||0), p95Ms = ms(i.p95Us||0);
        return `  ${trim(i.key)}\n    total=${ms(i.totalUs)} ms x${i.count} | mean=${avg(i.totalUs,i.count)} median=${medMs} p95=${p95Ms} ms | init=${initMs}/x${i.initCount||0} steady=${steadyMs}/x${i.steadyCount||0}`;
      }).join('\n');
      const fmtRender = items => items.slice(0,6).map(i =>
        `  ${i.name} | total=${ms(i.totalUs)} ms x${i.count} | init=${ms(i.initTotalUs||0)}/x${i.initCount||0} steady=${ms(i.steadyTotalUs||0)}/x${i.steadyCount||0}`
      ).join('\n');
      const fmtLong = items => items.slice(0,5).map(i => {
        const phase = i.isInit ? 'INIT' : 'STEADY';
        const at = ms((i.startUs||0) - tStart);
        return `  [${phase}] ${i.name} | dur=${ms(i.durUs)} ms at t+${at} ms`;
      }).join('\n');
      const fmtWrap = items => items.slice(0,5).map(i =>
        `  ${i.name} (wrapper, total=${ms(i.totalUs)} ms x${i.count}) — ignore for ranking`
      ).join('\n');
      const noiseLine = data.meta.noiseDropCount
        ? `(pre-filtered: chrome-extension/userscript/host-CDN — ${ms(data.meta.noiseDropTotalUs)} ms across ${data.meta.noiseDropCount} events were dropped)`
        : '(no noise URLs found)';

      const prompt =
        `You are a senior web-perf engineer reviewing a pre-cleaned Chrome trace.\n` +
        `Apply tags IN ORDER, FIRST MATCH WINS:\n` +
        `  1. [NOISE]    if name contains "Debugger" / "CDP" / "Profiler", or it's listed in the Wrappers section below\n` +
        `  2. [LOW]      if name is one of {ParseHTML, ScriptCompiled, EvaluateScript, v8.compile, v8.run, v8.evaluateModule} (these are init/load-only by definition)\n` +
        `  3. [LOW]      if steady_count == 0 (init-only work, regardless of total or avg)\n` +
        `  4. [LOW]      if steady_count >= 100 AND p95 < 5 ms (steady-state animation hot path running healthy)\n` +
        `  5. [HIGH]     if p95 > 5 ms in steady state, OR a [STEADY] long-task > 50 ms\n` +
        `  6. [CRITICAL] if median > 16.67 ms in steady state (consistently blowing the 60 Hz frame budget)\n\n` +
        `Heuristics:\n` +
        `  - low call count (1-10) ⇒ init-only, regardless of avg\n` +
        `  - high call count (>100) ⇒ steady-state; only HIGH/CRITICAL if p95 is genuinely large\n` +
        `  - mean lies under outliers; trust median and p95 over mean\n` +
        `  - long tasks marked [INIT] are page-load artifacts → [LOW]; only [STEADY] long tasks block real-time\n\n` +
        `Output 3-5 tagged lines in the form: \`[TAG] one-line evidence — concrete fix\`. ` +
        `Reply in under ${AI_MAX_WORDS} words total. End with one final line: \`verdict: <fine | minor wins | needs work>\`. ` +
        `No headers, no preamble, no markdown bold.\n\n` +
        `Frame budget at 60 Hz = 16.67 ms. ALL TIMES BELOW ARE IN MILLISECONDS.\n\n` +
        `Trace window: ${ms(data.meta.totalWindowUs)} ms total (init=${ms(data.meta.initWindowUs)} ms, steady=${ms(data.meta.steadyWindowUs)} ms). ${noiseLine}\n\n` +
        `TopJS (page code only, noise filtered):\n${fmtJs(data.topJs)}\n\n` +
        `Rendering:\n${fmtRender(data.rendering)}\n\n` +
        `Long tasks:\n${fmtLong(data.longTasks)}\n\n` +
        `Wrappers (listed for transparency only — do NOT use as bottlenecks; their dur is the sum of children):\n${fmtWrap(data.wrappers||[])}`;

      try {
        const res = await fetch('https://text.pollinations.ai/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: AI_MODEL,
            messages: [{ role: 'user', content: prompt }],
            max_tokens: AI_MAX_TOKENS,
            reasoning_effort: AI_REASONING_EFFORT,
          }),
        });
        if (!res.ok) {
          const errText = await res.text().catch(() => '');
          throw new Error(`HTTP ${res.status}${errText ? ': ' + errText.slice(0,140) : ''}`);
        }
        const json = await res.json();
        const choice = json?.choices?.[0];
        const content = choice?.message?.content || '';
        if (choice?.finish_reason === 'length') {
          return content.trim() + '\n\n*[truncated — bump AI_MAX_TOKENS]*';
        }
        return content.trim() || 'No summary produced (model returned empty — try reload).';
      } catch (e) {
        console.error(e); return 'AI summary unavailable: ' + e.message;
      }
    }

    /* ASCII bar — solid block + dotted remainder. Width is character count. */
    function bar(value, max, width=22) {
      if (max <= 0) return ' '.repeat(width);
      const filled = Math.max(0, Math.min(width, Math.round((value / max) * width)));
      return '█'.repeat(filled) + '░'.repeat(width - filled);
    }

    /* The whole point of this page: dump a clean, copy-paste-ready markdown
       block that any LLM (Claude, ChatGPT, local Ollama) can ingest and reason
       over. ASCII bars give a human reader proportions at a glance without
       needing the page UI to be visible. Sections are stable headings so a
       downstream LLM can address them by name ("look at TopJS line 3"). */
    function buildMarkdown(r) {
      const fmt = us => (us/1000).toFixed(2);
      const tStart = (r.meta && r.meta.traceMinUs) || 0;
      const out = [];

      // Header / summary
      out.push('# Trace summary');
      out.push('');
      out.push('- **File**: `' + (selectedFile && selectedFile.name || '?') + '` (' +
               ((selectedFile && selectedFile.size || 0)/1024/1024).toFixed(1) + ' MB)');
      out.push('- **Thread**: ' + (r.meta.mainThread && r.meta.mainThread.name || '?') +
               ' (pid ' + (r.meta.mainThread && r.meta.mainThread.pid) +
               ', tid ' + (r.meta.mainThread && r.meta.mainThread.tid) + ')');
      out.push('- **Window**: ' + fmt(r.meta.totalWindowUs) + ' ms total | init ' +
               fmt(r.meta.initWindowUs||0) + ' ms | steady ' + fmt(r.meta.steadyWindowUs||0) + ' ms');
      out.push('- **Main thread time**: ' + fmt(r.meta.totalMainDurUs) + ' ms');
      out.push('- **Events**: ' + r.meta.eventsParsed.toLocaleString() +
               (r.meta.noiseDropCount ? ' (' + r.meta.noiseDropCount + ' noise events / ' +
                fmt(r.meta.noiseDropTotalUs) + ' ms filtered: chrome-extension, userscript, host-CDN)' : ''));
      out.push('');

      // Top JS (page code, noise filtered)
      if (r.topJs && r.topJs.length) {
        const max = r.topJs[0].totalUs || 1;
        out.push('## Top JavaScript (page code, noise-filtered)');
        out.push('```');
        for (const i of r.topJs) {
          const trimmed = i.key.length > 44 ? i.key.slice(0,41) + '...' : i.key;
          const padded = trimmed.padEnd(44);
          const meanS = fmt(i.totalUs/Math.max(1,i.count));
          const medS = fmt(i.medianUs||0);
          const p95S = fmt(i.p95Us||0);
          const phase = (i.steadyCount > 0)
            ? `init=${fmt(i.initTotalUs||0)}/x${i.initCount||0}, steady=${fmt(i.steadyTotalUs||0)}/x${i.steadyCount||0}`
            : `init-only x${i.initCount||0}`;
          out.push(padded + ' [' + bar(i.totalUs, max) + '] ' + fmt(i.totalUs) + ' ms x' + i.count +
                   ' | mean=' + meanS + ' med=' + medS + ' p95=' + p95S + ' | ' + phase);
        }
        out.push('```');
        out.push('');
      }

      // Long tasks (with init/steady marker)
      if (r.longTasks && r.longTasks.length) {
        out.push('## Long tasks (above ' + ((r.longTasks[0]?.durUs||0) ? '50' : '?') + ' ms threshold)');
        out.push('```');
        for (const t of r.longTasks) {
          const phase = t.isInit ? 'INIT  ' : 'STEADY';
          out.push('[' + phase + '] ' + t.name.padEnd(28) + ' dur=' + fmt(t.durUs) + ' ms at t+' +
                   fmt((t.startUs||0)-tStart) + ' ms');
        }
        out.push('```');
        out.push('');
      }

      // Rendering / Layout
      if (r.rendering && r.rendering.length) {
        const max = r.rendering[0].totalUs || 1;
        out.push('## Rendering / Layout');
        out.push('```');
        for (const i of r.rendering) {
          out.push(i.name.padEnd(22) + ' [' + bar(i.totalUs, max) + '] ' +
                   fmt(i.totalUs) + ' ms x' + i.count);
        }
        out.push('```');
        out.push('');
      }

      // Top events (real, wrappers excluded)
      if (r.topEvents && r.topEvents.length) {
        const max = r.topEvents[0].totalUs || 1;
        out.push('## Top events (wrappers excluded)');
        out.push('```');
        for (const i of r.topEvents.slice(0, 18)) {
          out.push(i.name.padEnd(34) + ' [' + bar(i.totalUs, max) + '] ' +
                   fmt(i.totalUs) + ' ms x' + i.count);
        }
        out.push('```');
        out.push('');
      }

      // Wrappers (transparency, do not rank)
      if (r.wrappers && r.wrappers.length) {
        out.push('## Wrappers (do NOT rank — their dur is the sum of children)');
        out.push('```');
        for (const i of r.wrappers) {
          out.push(i.name.padEnd(28) + ' ' + fmt(i.totalUs) + ' ms x' + i.count);
        }
        out.push('```');
        out.push('');
      }

      // Three.js (if any)
      if (r.three && r.three.length) {
        out.push('## Three.js hotspots');
        out.push('```');
        for (const i of r.three) {
          const trimmed = i.key.length > 60 ? i.key.slice(0,57) + '...' : i.key;
          out.push(trimmed.padEnd(60) + ' ' + fmt(i.totalUs) + ' ms x' + i.count);
        }
        out.push('```');
        out.push('');
      }

      // Filtered noise (transparency)
      if (r.topJsNoise && r.topJsNoise.length) {
        out.push('## Filtered noise (chrome-extension, userscript, host-CDN/analytics)');
        out.push('```');
        for (const i of r.topJsNoise.slice(0, 8)) {
          const trimmed = i.key.length > 70 ? i.key.slice(0,67) + '...' : i.key;
          out.push(trimmed + ' | ' + fmt(i.totalUs) + ' ms x' + i.count);
        }
        out.push('```');
        out.push('');
      }

      return out.join('\n');
    }

    function renderResults(r) {
      summary.hidden = false;
      // No separate metadata strip in the page UI — all stats live inside
      // the markdown block (header bullets) so the copy-paste output is
      // self-contained.
      const md = buildMarkdown(r);
      mdOutput.textContent = md;

      copyMdBtn.onclick = async () => {
        try {
          await navigator.clipboard.writeText(md);
          copyMdBtn.classList.add('copied');
          copyIconCopy.style.display = 'none';
          copyIconCheck.style.display = 'block';
          copyMdBtn.title = 'Copied!';
          setTimeout(() => {
            copyMdBtn.classList.remove('copied');
            copyIconCopy.style.display = 'block';
            copyIconCheck.style.display = 'none';
            copyMdBtn.title = 'Copy markdown';
          }, 1500);
        } catch {
          copyMdBtn.title = 'Copy failed';
        }
      };
    }
  </script>
</body>
</html>
