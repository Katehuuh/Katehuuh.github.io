<!--
  ============================================================================
  Infinite Craft - combine two elements to discover a new one. AI-generated.

  Bootstrap:
  - 4 starter elements: Water 💧, Fire 🔥, Earth 🌍, Wind 🌬️. They live in a
    side grid (right).
  - Workspace (centre/left) is an empty drop zone where the user drags
    elements to combine.

  Mechanics:
  - Drag an element from the grid into the workspace. Drag a second one
    onto the first. The two elements combine.
  - Look up combo[a+b] in the merged cache (sorted-pair key, lowercased).
    If present, instant result, no LLM call.
  - If absent: call the text LLM with both names + the list of already-used
    name->emoji pairs -> returns
      { "name": "<short noun>", "emoji": "<one emoji or 2-emoji pair>",
        "description": "<one short sentence>" }
    Then validate emoji uniqueness vs the elements map; retry up to 3 times
    with feedback if the emoji is already used for a DIFFERENT name.
  - New result is added to the grid. "First Discovery!" toast when the
    local user genuinely creates a result that wasn't in the merged remote
    set; otherwise a smaller "Already discovered by ___" line.
  - Clicking a placed element in the workspace removes it. Workspace holds
    at most 2 items pending combination.

  Visuals (emoji-only, NO image gen):
  - Apple-inspired: squircle elements (border-radius: 18px + subtle inner
    gloss + outer shadow), Inter-or-system sans, generous spacing.
  - Dark by default (#0d0d10 bg, #f4f4f6 text, accent #7aa2ff). Theme
    toggle uses prefers-color-scheme initially, persists explicit toggle.
  - Element card visual = big emoji glyph (or 2-emoji pair) + name beneath.
    Tooltip with description on hover/long-press.
  - Smooth fusion animation: scale-in toward each other, brief flash, new
    card pops in via cubic-bezier(.34, 1.56, .64, 1).
  - Loading shimmer (morphing-blob) on the two merging cards while the LLM
    call is in flight; the rest of the UI stays responsive.

  Emoji uniqueness invariant (mandatory):
  - Same result name => same emoji always (Water+Fire->Steam reuses ♨️).
  - Different names => MUST have different emoji. The validator rejects
    any LLM response whose emoji is already taken by a different name and
    re-prompts the model with explicit feedback. Cap at 3 retries; final
    fallback appends ✨ to disambiguate and warns in debug.

  UI panels:
  - Top bar: title left; sync-status dot, theme toggle, "Copy debug log"
    right.
  - Right side: scrollable element grid (sorted by discoveredAt desc with
    starters anchored), search filter at top.
  - Centre/left: workspace drop zone with two slots; below it, a history
    strip of the last 8 local discoveries.

  Auto-start:
  - No Start button. The 4 starter elements appear immediately, workspace
    is interactive on first paint. Remote cache is fetched in the
    background and merged when ready.

  Failure handling:
  - Pollinations text 5xx/timeout: inline retry button on the workspace,
    never blocks UI.
  - LLM returns non-JSON: parseLooseJSON (strip ```json fences, trim,
    JSON.parse); if still bad, "couldn't combine these - try again"; the
    slots stay populated so the user can retry without re-dragging.
  - Sync GET fail: run solo with red dot, retry on next discovery.
  - Sync PUT fail: queue, amber dot, retry on next discovery or on
    visibility change. Exponential backoff capped at 30s.

  Single-file constraints:
  - Inline EVERYTHING. No .css/.js/.png/.mp3 companions.
  - Vanilla DOM, no frameworks.
  - Mobile-first responsive: < 720px stacks workspace above grid.
  - body scrolls (min-height: 100dvh, no overflow:hidden on body); no
    rigid aspect-ratio without a max-height: 80dvh cap.
  - <meta name="description"> in <head>: "Infinite Craft clone - drag two
    elements to discover a new one, generated live by AI."

  LocalStorage keys:
  - infiniteCraft.elements.v1: { "<lowercased name>": {
        name, emoji, description, parents:[a,b]|null, createdAt,
        discoveredBy } }
  - infiniteCraft.combos.v1:   { "<sortedPairKey>": "<lowercased name>" }
  - infiniteCraft.theme:       "dark" | "light"  (only when user toggles)
  - infiniteCraft.debug.v1:    ring buffer of last 100 log entries
  - infiniteCraft.userId.v1:   "anon-<random-suffix>" - stable per-browser
  - infiniteCraft.blobId.v1:   override of SHARED_BLOB_ID after bootstrap

  Shared discovery cache (multiplayer):
  - Backend: JSONBlob (https://jsonblob.com/api/jsonBlob). Free, no
    signup, no auth, CORS open. Verified: POST 201, GET 200, PUT 200.
  - SHARED_BLOB_ID constant defaults to a pre-bootstrapped blob. Setting
    it to the literal "TODO_GENERATE_ON_FIRST_LOAD" makes the demo POST a
    fresh blob on first load, save the id to localStorage, and surface a
    banner with a copy button so Katehuuh can paste it back into source.
  - Blob schema:
      { schema: 1,
        elements: { "<lowercased name>": { name, emoji, description,
                                           parents, discoveredAt,
                                           discoveredBy } },
        combos:   { "<sortedPairKey>": "<lowercased name>" } }
  - Read-modify-write pattern:
      boot:      GET blob -> merge into local cache. Remote wins for
                 already-known names; local wins for names not yet
                 uploaded.
      discover:  cache hit (remote OR local) = no LLM call. Miss = LLM,
                 write local immediately, schedule debounced (~3s)
                 read-modify-write PUT.
      PUT path:  fresh GET -> merge in everything that arrived since last
                 read -> PUT the merged set; collisions resolved
                 last-write-wins per-key, other keys preserved.
  - Status dot: green (synced), amber (pending push or merging), red
    (offline). Tooltip shows last sync time.
  - No WebSocket, no presence: this is a shared *cache*, not live chat.

  Debug log:
  - Copy debug log button serialises ring buffer to JSON, copies via
    navigator.clipboard.writeText with textarea + execCommand fallback.
  - Each entry: { t, kind:"text"|"sync"|"error", elapsedMs,
    requestSummary, responseSummary }.
  ============================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>element-fusion</title>
<meta name="description" content="Inspired by the game Infinite Craft: neal.fun/infinite-craft" />
<!-- Puter SDK relays JSONBlob requests server-side, bypassing CORS that
     blocks direct browser-to-jsonblob.com calls from github.io origins. -->
<script src="https://js.puter.com/v2/" async></script>
<style>
:root {
    --bg: #0d0d10;
    --surface: #16161b;
    --surface-2: #1d1d24;
    --surface-3: #25252e;
    --border: #2a2a33;
    --border-strong: #3a3a44;
    --text: #f4f4f6;
    --muted: #9a9aa6;
    --accent: #7aa2ff;
    --accent-soft: rgba(122, 162, 255, 0.16);
    --good: #4ade80;
    --bad: #f87171;
    --warn: #f5b252;
    --gloss: rgba(255, 255, 255, 0.06);
    --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.35);
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 18px;
    --radius-xl: 24px;
    --bezier-pop: cubic-bezier(.34, 1.56, .64, 1);
    --transition: 220ms ease;
}
html[data-theme="light"] {
    --bg: #f6f6f8;
    --surface: #ffffff;
    --surface-2: #f0f0f4;
    --surface-3: #e6e6ec;
    --border: #d8d8e0;
    --border-strong: #c4c4cc;
    --text: #18181c;
    --muted: #6a6a76;
    --accent: #3b6cff;
    --accent-soft: rgba(59, 108, 255, 0.14);
    --gloss: rgba(255, 255, 255, 0.55);
    --shadow: 0 1px 2px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Text", "Segoe UI", Roboto, system-ui, sans-serif;
    font-size: 18px;
    line-height: 1.5;
    min-height: 100dvh;
    overflow-y: auto;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
}

button {
    font: inherit;
    color: inherit;
    background: none;
    border: 0;
    cursor: pointer;
    padding: 0;
}
input, button { -webkit-tap-highlight-color: transparent; }

/* Top bar */
.topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 22px;
    background: color-mix(in oklab, var(--bg) 80%, transparent);
    -webkit-backdrop-filter: saturate(140%) blur(14px);
    backdrop-filter: saturate(140%) blur(14px);
    border-bottom: 1px solid var(--border);
}
.brand {
    font-weight: 600;
    letter-spacing: -0.01em;
    font-size: 17px;
}
.brand .glyph { display: inline-block; transform: translateY(1px); margin-right: 4px; }
.top-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
.btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-radius: var(--radius-md);
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    font-size: 13px;
    transition: background var(--transition), border-color var(--transition), transform 120ms ease;
}
.btn:hover { background: var(--surface-3); border-color: var(--border-strong); }
.btn:active { transform: scale(0.97); }
.btn[aria-pressed="true"] { background: var(--accent-soft); border-color: var(--accent); }

/* Sync dot */
.sync-btn { padding-left: 10px; }
.sync-btn .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 220ms ease;
}
.sync-btn[data-state="ok"]      .dot { background: var(--good); }
.sync-btn[data-state="pending"] .dot { background: var(--warn); animation: pulseDot 1.4s ease-in-out infinite; }
.sync-btn[data-state="off"]     .dot { background: var(--bad); }
@keyframes pulseDot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.55; transform: scale(0.8); }
}

/* Bootstrap banner (shown only after a fresh blob is POSTed) */
.bootstrap-banner {
    background: linear-gradient(180deg, var(--accent-soft), var(--surface));
    border: 1px solid var(--accent);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-size: 13px;
    margin: 12px auto 0;
    max-width: 1236px;
    width: calc(100% - 44px);
}
.bootstrap-banner code {
    background: var(--surface-3);
    padding: 1px 6px;
    border-radius: 6px;
    font-size: 12px;
    word-break: break-all;
}
.bootstrap-banner .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.bootstrap-banner .close { margin-left: auto; }

/* Layout */
.app {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    gap: 22px;
    padding: 22px;
    max-width: 1280px;
    margin: 0 auto;
}
@media (max-width: 900px) {
    .app { grid-template-columns: minmax(0, 1fr) 320px; gap: 16px; padding: 16px; }
}
@media (max-width: 720px) {
    .app { grid-template-columns: 1fr; gap: 14px; padding: 14px; }
}

/* Workspace */
.workspace-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 0;
}
.workspace {
    position: relative;
    background: var(--surface);
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-xl);
    padding: 28px 24px;
    min-height: 280px;
    max-height: 80dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    transition: border-color var(--transition), background var(--transition);
}
.workspace.is-drop-target {
    border-color: var(--accent);
    background: color-mix(in oklab, var(--accent) 10%, var(--surface));
}
.workspace-hint {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    max-width: 360px;
}
.slots {
    display: flex;
    align-items: center;
    gap: 22px;
    flex-wrap: wrap;
    justify-content: center;
}
.plus { font-size: 24px; color: var(--muted); user-select: none; }
.workspace-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.error-banner {
    background: color-mix(in oklab, var(--bad) 16%, var(--surface));
    border: 1px solid color-mix(in oklab, var(--bad) 50%, var(--border));
    color: var(--text);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    width: 100%;
    max-width: 480px;
}
.error-banner .btn { background: var(--surface); }

/* Element card */
.card {
    position: relative;
    width: 110px;
    height: 110px;
    border-radius: var(--radius-lg);
    background:
      linear-gradient(180deg, var(--gloss) 0%, transparent 50%),
      var(--surface-2);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px;
    cursor: grab;
    user-select: none;
    transition: transform var(--transition), background var(--transition), border-color var(--transition);
}
.card:hover { transform: translateY(-3px) scale(1.05); border-color: var(--border-strong); z-index: 5; }
.card:active { cursor: grabbing; transform: translateY(0) scale(0.97); z-index: 5; }
.card.dragging { opacity: 0.4; }
.card .emoji {
    font-size: 38px;
    line-height: 1;
    pointer-events: none;
    -webkit-user-select: none;
    user-select: none;
}
.card .name {
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    color: var(--text);
    pointer-events: none;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: 100%;
}
.card.size-sm { width: 104px; height: 104px; border-radius: var(--radius-md); padding: 8px; }
.card.size-sm .emoji { font-size: 38px; }
.card.size-sm .name  { font-size: 14px; }
.card.size-lg { width: 168px; height: 168px; border-radius: 22px; }
.card.size-lg .emoji { font-size: 64px; }
.card.size-lg .name  { font-size: 17px; }

/* Discoverer initials chip */
.card .discoverer {
    position: absolute;
    top: 4px;
    right: 4px;
    min-width: 18px;
    height: 18px;
    padding: 0 4px;
    border-radius: 9px;
    background: var(--surface-3);
    border: 1px solid var(--border-strong);
    color: var(--muted);
    font-size: 9px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    pointer-events: none;
}
.card.size-sm .discoverer { min-width: 14px; height: 14px; font-size: 8px; padding: 0 3px; border-radius: 7px; }
.card .discoverer.is-me { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

/* Shimmer (in-flight LLM combine) */
.card.shimmer::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background:
      radial-gradient(120% 80% at 30% 20%, color-mix(in oklab, var(--accent) 22%, transparent), transparent 60%),
      radial-gradient(140% 80% at 70% 80%, color-mix(in oklab, var(--accent) 16%, transparent), transparent 65%);
    animation: blob 2.4s ease-in-out infinite alternate;
    pointer-events: none;
}
.card.shimmer::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(110deg, transparent 30%, color-mix(in oklab, var(--text) 14%, transparent) 50%, transparent 70%);
    background-size: 220% 100%;
    animation: shimmer 1.6s linear infinite;
    pointer-events: none;
    mix-blend-mode: screen;
}
@keyframes blob {
    0%   { transform: scale(1) translate(0, 0); }
    100% { transform: scale(1.08) translate(2%, -2%); }
}
@keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -100% 0; }
}

.card.is-fusing { animation: fuse 380ms ease-in forwards; }
@keyframes fuse {
    0%   { transform: scale(1); }
    60%  { transform: scale(1.18); filter: brightness(1.4); }
    100% { transform: scale(0.6); opacity: 0; }
}
.card.is-popped { animation: popIn 540ms var(--bezier-pop) both; }
@keyframes popIn {
    0%   { transform: scale(0.4); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
}

/* Side panel */
.side-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: calc(100dvh - 120px);
    position: sticky;
    top: 78px;
    overflow-y: auto;
}
@media (max-width: 720px) {
    .side-panel { position: static; max-height: none; }
}
.side-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.side-title { font-weight: 600; font-size: 14px; }
.side-count { color: var(--muted); font-size: 12px; }

/* Sticky search keeps the input in view while the grid scrolls. z-index sits
   below `.card:hover` so a hovered card visually rises ABOVE the search bar. */
.search {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 8px 12px;
    position: sticky;
    top: 0;
    z-index: 1;
}
.search input {
    flex: 1;
    background: transparent;
    border: 0;
    outline: 0;
    color: var(--text);
    font-size: 14px;
    min-width: 0;
}
.search input::placeholder { color: var(--muted); }

/* Scroll lives on .side-panel; grid is overflow:visible so a hovered card
   can scale UP and translate UP without the grid clipping its border. */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 10px;
    padding: 4px;
}
.grid.is-empty { color: var(--muted); font-size: 13px; padding: 12px; }

/* History strip */
.history { display: flex; flex-direction: column; gap: 8px; }
.history-title { font-size: 13px; color: var(--muted); margin-left: 4px; }
.history-strip {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 4px;
    min-height: 90px;
}
.history-strip:empty::after {
    content: "Discoveries you make will appear here.";
    color: var(--muted);
    font-size: 13px;
    align-self: center;
    margin: 0 auto;
}

/* Toast */
.toast-host {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
    pointer-events: none;
}
.toast {
    background: var(--surface-3);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 10px 16px;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow);
    font-size: 14px;
    animation: toastIn 320ms var(--bezier-pop), toastOut 320ms ease 2.6s forwards;
    pointer-events: auto;
    max-width: 360px;
    text-align: center;
}
.toast.is-discovery {
    background: linear-gradient(180deg, var(--accent-soft), var(--surface-3));
    border-color: var(--accent);
}
.toast.is-info { font-size: 13px; color: var(--muted); }
@keyframes toastIn {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
}
@keyframes toastOut { to { transform: translateY(20px); opacity: 0; } }

/* Tooltip */
.tooltip {
    position: fixed;
    z-index: 60;
    background: var(--surface-3);
    color: var(--text);
    border: 1px solid var(--border-strong);
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    max-width: 220px;
    white-space: pre-line;
    text-align: center;
    pointer-events: none;
    box-shadow: var(--shadow);
    opacity: 0;
    transform: translate(-50%, 4px);
    transition: opacity 120ms ease, transform 120ms ease;
}
.tooltip.is-visible { opacity: 1; transform: translate(-50%, 0); }

/* Per-attempt LLM call log shown in the workspace below the slots. Compact,
   monospace numerals so the times line up. */
.attempts-log {
    font: 500 14px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 12px;
    margin-top: 6px;
    overflow-x: auto;
    white-space: nowrap;
}

/* Magic "+" card: rainbow gradient border + sparkle. Only shown when the
   user has earned >= POINTS_REVEAL_AT discoveries. */
.card.magic-add {
    background: linear-gradient(135deg, rgba(255, 80, 120, 0.15), rgba(255, 200, 60, 0.15), rgba(60, 220, 160, 0.15), rgba(80, 140, 255, 0.15), rgba(200, 100, 255, 0.15));
    border: 2px solid transparent;
    background-clip: padding-box;
    position: relative;
    cursor: pointer;
}
.card.magic-add::before {
    content: "";
    position: absolute; inset: -2px;
    border-radius: inherit;
    padding: 2px;
    background: linear-gradient(135deg, #ff5078, #ffc83c, #3cdca0, #508cff, #c864ff);
    mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
    animation: magicShimmer 6s linear infinite;
}
.card.magic-add .emoji { filter: drop-shadow(0 0 6px rgba(255, 200, 100, 0.5)); }
.card.magic-add .name  { color: var(--text); font-weight: 600; }
@keyframes magicShimmer { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

/* Custom-element modal */
.modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: grid; place-items: center;
    z-index: 1000;
    animation: modalFade 0.18s ease-out both;
}
.modal-dialog {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 16px;
    padding: 22px 22px 18px;
    width: min(92vw, 420px);
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
}
.modal-dialog h3 { margin: 0 0 4px; font-size: 22px; }
.modal-sub { margin: 0 0 14px; color: var(--muted); font-size: 14px; }
.modal-input {
    width: 100%; padding: 12px 14px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    font: inherit; font-size: 18px;
    outline: none;
}
.modal-input:focus { border-color: var(--accent, #6c8eff); }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 14px; }
.modal-btns .btn { padding: 10px 16px; font-size: 16px; }
.modal-btns .btn.primary { background: var(--accent, #6c8eff); color: #000; font-weight: 600; }
@keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }

/* Mobile: stack workspace + grid, bigger touch targets */
@media (max-width: 720px) {
    body { font-size: 17px; }
    .card.size-sm { width: 96px; height: 96px; }
    .card.size-sm .emoji { font-size: 36px; }
    .card.size-lg { width: 140px; height: 140px; }
    .card.size-lg .emoji { font-size: 52px; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001s !important; transition-duration: 0.001s !important; }
}
</style>
</head>
<body>

<header class="topbar">
    <div class="brand"><span class="glyph">🧪</span> Infinite Craft</div>
    <div class="top-actions">
        <button class="btn sync-btn" id="syncStatus" type="button"
                title="Shared discovery cache status" aria-label="Sync status">
            <span class="dot" id="syncDot" aria-hidden="true"></span>
            <span id="syncLabel">Connecting…</span>
        </button>
        <button class="btn" id="themeToggle" type="button" title="Toggle theme">
            <span id="themeIcon">🌙</span>
            <span id="themeLabel">Dark</span>
        </button>
    </div>
</header>

<div id="bootstrapHost"></div>

<main class="app">
    <section class="workspace-panel" aria-label="Combination workspace">
        <div class="workspace" id="workspace" aria-dropeffect="move">
            <div class="workspace-hint" id="workspaceHint">
                Drag two elements here to combine them.
            </div>
            <div class="slots" id="slots" aria-live="polite"></div>
            <div class="workspace-actions" id="workspaceActions"></div>
        </div>

        <div class="history" aria-label="Recent discoveries">
            <div class="history-title">Recent discoveries</div>
            <div class="history-strip" id="historyStrip"></div>
        </div>
    </section>

    <aside class="side-panel" aria-label="Element library">
        <div class="side-header">
            <div class="side-title">Elements</div>
            <div class="side-count" id="elementCount">0</div>
        </div>
        <div class="search">
            <span aria-hidden="true">🔍</span>
            <input id="searchInput" type="search" placeholder="Search elements" aria-label="Search elements">
        </div>
        <div class="grid" id="elementsGrid" aria-live="polite"></div>
    </aside>
</main>

<div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></div>
<div id="tooltip" class="tooltip" role="tooltip" aria-hidden="true"></div>

<script>
(function () {
    'use strict';

    // ------------------------------------------------------------------
    // Endpoints / constants
    // ------------------------------------------------------------------
    // LLM via puter.ai.chat (JS API, no CORS, no Pollinations rate limit).
    // Local Qwen3.5-2B with thinking can take 30-90s per call; 120s upper
    // bound aborts thinking-loop runaways without hanging the UI forever.
    const TEXT_TIMEOUT_MS = 120000;
    // Models supported by puter.ai.chat. First is default; rotation on retry
    // gives a different upstream if one model errors out. undefined = puter's
    // default (currently gpt-4o-mini equivalent).
    const TEXT_MODELS = [undefined, 'gpt-4o-mini', 'claude-3-haiku'];

    // Shared discovery cache (JSONBlob). Verified live: POST 201 Created
    // with Location: /api/jsonBlob/{id}; GET 200; PUT 200. CORS open.
    // SHARED_BLOB_ID below is a pre-bootstrapped blob - replace with the
    // literal "TODO_GENERATE_ON_FIRST_LOAD" to make the demo POST a fresh
    // one and surface the new id with a copy button on screen.
    const JSONBLOB_BASE = 'https://jsonblob.com/api/jsonBlob';
    const SHARED_BLOB_ID = '019ddfd7-1d33-7b4e-960f-1037430a7e28';
    const SYNC_DEBOUNCE_MS    = 3000;
    const SYNC_TIMEOUT_MS     = 12000;
    const SYNC_BACKOFF_BASE   = 1500;
    const SYNC_BACKOFF_MAX_MS = 30000;
    // Max consecutive PUT retries before sync goes silent until the next
    // user action. Prevents unbounded pile-up when the blob is gone or the
    // server is wedged.
    const SYNC_RETRY_MAX      = 3;

    // jsonblob.com and text.pollinations.ai don't serve Access-Control-Allow-Origin
    // to github.io, so direct fetch fails CORS preflight. puter.net.fetch makes
    // the request server-side and returns the response, bypassing CORS.
    //
    // Pitfalls already learned: puter's underlying socket can flip to CLOSED
    // after some idle time, and any subsequent puter.net.fetch will reject with
    // 'WebSocket is already in CLOSING or CLOSED state'. We catch that and fall
    // through to direct fetch (which will fail on CORS for these origins, but
    // at least surfaces a clean error instead of leaving the UI hanging).
    // jsonblob.com does NOT serve Access-Control-Allow-Origin so direct fetch
    // is blocked by the browser. Route through puter.net.fetch which proxies
    // server-side. If puter is unavailable / 401-ing, fall through to direct
    // so the failure surfaces cleanly instead of hanging.
    async function relayFetch(url, opts) {
      for (let i = 0; i < 30; i++) {
        if (typeof puter !== 'undefined' && puter && puter.net && typeof puter.net.fetch === 'function') break;
        await new Promise(r => setTimeout(r, 100));
      }
      const puterReady = typeof puter !== 'undefined' && puter && puter.net && typeof puter.net.fetch === 'function';
      if (puterReady) {
        try {
          return await puter.net.fetch(url, opts);
        } catch (e) {
          console.warn('[relayFetch] puter relay failed, trying direct fetch:', e && e.message || e);
        }
      }
      return fetch(url, opts);
    }

    const MAX_LLM_RETRIES_FOR_EMOJI = 3;
    // We now use local Qwen3 (32k ctx) + puter.ai gpt-4o-mini (128k ctx) so
    // dumping the full taken-emoji list every call is fine. 400 is enough to
    // cover most realistic discovery sets; sample randomly above that.
    const MAX_USED_LIST = 400;


    const LS_ELEMENTS = 'infiniteCraft.elements.v1';
    const LS_COMBOS   = 'infiniteCraft.combos.v1';
    const LS_THEME    = 'infiniteCraft.theme';
    const LS_DEBUG    = 'infiniteCraft.debug.v1';
    const LS_USER_ID  = 'infiniteCraft.userId.v1';
    const LS_BLOB_ID  = 'infiniteCraft.blobId.v1';
    const LS_POINTS   = 'infiniteCraft.points.v1';
    const DEBUG_MAX   = 100;
    // The "+" magic card in the Elements panel only appears once the user
    // has accumulated this many points (= first-discoveries) -> it's a
    // surprise reveal, not visible from the start.
    const POINTS_REVEAL_AT = 3;

    // Starter elements (always present, name-keyed)
    const STARTERS = [
        { name: 'Water', emoji: '💧', description: 'A clear, refreshing liquid.' },
        { name: 'Fire',  emoji: '🔥', description: 'A bright, hungry flame.' },
        { name: 'Earth', emoji: '🌍', description: 'Solid ground beneath us.' },
        { name: 'Wind',  emoji: '🌬️', description: 'Moving air across the world.' }
    ];

    // ------------------------------------------------------------------
    // State
    // ------------------------------------------------------------------
    const state = {
        elements: {},   // key: lowercased name -> { name,emoji,description,parents,createdAt,discoveredBy }
        combos:   {},   // key: sortedPairKey -> lowercased name
        debug:    [],
        theme:    null,
        userId:   null,
        slots:    [],   // up to 2 lowercased names
        history:  [],   // last 8 lowercased names (newest first)
        comboInFlight: null,
        lastError: null,
        // Per-combine attempt log (visible in the UI, not just debug):
        // each entry { n, path:'local'|'puter', elapsedMs, ok, error? }
        comboAttempts: [],
        comboLastSummary: null,         // { attempts: [...], totalMs }
        // 1 point per genuine first-discovery; spendable to "Add Element"
        // (custom name -> LLM-generated emoji+description).
        points: 0,

        // Sync
        blobId: null,                  // resolved blob id (constant or LS override)
        sync: {
            state: 'idle',             // 'idle'|'ok'|'pending'|'off'
            lastSyncAt: null,
            backoffMs: SYNC_BACKOFF_BASE,
            putTimer: null,
            putInFlight: false,
            dirty: false,              // local writes await PUT
            knownRemoteNames: new Set() // names that came from remote at boot
        }
    };

    // ------------------------------------------------------------------
    // Boot
    // ------------------------------------------------------------------
    document.addEventListener('DOMContentLoaded', init);

    function init() {
        loadPersisted();
        // Retroactively scrub historical lazy-concat entries (Dust + Water,
        // Steam Plant, etc.) that pre-date the validator. Runs every boot so
        // entries that come back via remote sync also get filtered.
        const dropped = pruneLazyLocalEntries();
        if (dropped > 0) {
            writeJSON(LS_ELEMENTS, state.elements);
            writeJSON(LS_COMBOS, state.combos);
            console.info('[element-fusion] pruned ' + dropped + ' lazy-concat element(s) from local cache.');
        }
        applyTheme();
        wireTopbar();
        wireSearch();
        wireWorkspaceDnd();
        renderAll();
        // Defer sync to keep first paint snappy
        setTimeout(initSync, 30);
    }

    function loadPersisted() {
        // Elements (object map)
        const rawEls = readJSON(LS_ELEMENTS, null);
        if (rawEls && typeof rawEls === 'object' && !Array.isArray(rawEls)) {
            state.elements = rawEls;
        } else {
            state.elements = {};
        }
        // Ensure starters are present
        for (const s of STARTERS) {
            const k = nameKey(s.name);
            if (!state.elements[k]) {
                state.elements[k] = {
                    name: s.name, emoji: s.emoji, description: s.description,
                    parents: null, createdAt: 0, discoveredBy: 'starter'
                };
            }
        }
        writeJSON(LS_ELEMENTS, state.elements);

        // Combos
        const rawCombos = readJSON(LS_COMBOS, {});
        state.combos = (rawCombos && typeof rawCombos === 'object') ? rawCombos : {};

        // Debug
        state.debug = readJSON(LS_DEBUG, []) || [];
        if (!Array.isArray(state.debug)) state.debug = [];

        // Points (1 per genuine first-discovery). Survives DEBUG=true since
        // it's a persistent reward, not a state cache.
        const ptRaw = parseInt(localStorage.getItem(LS_POINTS), 10);
        state.points = Number.isFinite(ptRaw) && ptRaw >= 0 ? ptRaw : 0;

        // Theme
        const t = localStorage.getItem(LS_THEME);
        state.theme = (t === 'light' || t === 'dark') ? t : null;

        // User id
        let uid = localStorage.getItem(LS_USER_ID);
        if (!uid || !/^anon-/.test(uid)) {
            uid = 'anon-' + Math.random().toString(36).slice(2, 8);
            localStorage.setItem(LS_USER_ID, uid);
        }
        state.userId = uid;

        // Blob id - localStorage override beats the constant (used after a
        // fresh bootstrap when Katehuuh hasn't yet pasted the id back into
        // source).
        const lsBlob = localStorage.getItem(LS_BLOB_ID);
        state.blobId = lsBlob || (SHARED_BLOB_ID === 'TODO_GENERATE_ON_FIRST_LOAD' ? null : SHARED_BLOB_ID);
    }

    // DEBUG=true makes every reload behave like a fresh visit: no localStorage
    // reads, no localStorage writes, no persisted cache. Useful while tuning
    // seeds/prompts so a normal browser refresh actually reflects current state
    // without a hard reload (Ctrl+Shift+R) every time. Flip to false to ship.
    const DEBUG = true;
    function readJSON(key, fallback) {
        if (DEBUG) return fallback;
        try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : fallback; }
        catch (e) { return fallback; }
    }
    function writeJSON(key, value) {
        if (DEBUG) return;
        try { localStorage.setItem(key, JSON.stringify(value)); }
        catch (e) { /* quota: silently drop */ }
    }
    function nameKey(name) { return String(name || '').trim().toLowerCase(); }

    // Detect a lazy LLM "result" that's just the inputs mashed together
    // (e.g. "Dust + Water", "Steam Plant", "Smoke + Earth"). Used at boot to
    // prune historical bad entries from local cache and from the seed-merge
    // pass, so the validator-fix retroactively cleans them up.
    // True when the emoji string is plain text (LLM returned the word "dry"
    // instead of a glyph), or empty.
    function isBadEmoji(emoji) {
        const e = String(emoji || '').trim();
        if (!e) return true;
        try {
            return !/\p{Extended_Pictographic}/u.test(e);
        } catch (_) { return false; }
    }

    function isLazyConcatName(name, parents) {
        const n = String(name || '').trim();
        if (!n) return true;
        if (/ [+&] | and | with /i.test(n)) return true;
        // Catch lazy "A B Mix" / "A B Combo" / "A B Hybrid" / "A B Blend"
        // patterns where A and B are both inputs with a generic suffix.
        if (parents && parents.length === 2) {
            const k = n.toLowerCase();
            const a = String(parents[0] || '').toLowerCase();
            const b = String(parents[1] || '').toLowerCase();
            if (k === a || k === b) return true;
            if (k === a + ' ' + b || k === b + ' ' + a) return true;
            if (k === a + b || k === b + a) return true;
            const suffixes = [' mix', ' combo', ' combination', ' blend', ' hybrid', ' fusion', ' mixture'];
            for (const s of suffixes) {
                if (k === a + ' ' + b + s || k === b + ' ' + a + s) return true;
                if (k === a + s || k === b + s) return true;
            }
        }
        return false;
    }
    function pruneLazyLocalEntries() {
        const drop = [];
        for (const [k, el] of Object.entries(state.elements)) {
            if (isStarter(k)) continue;
            if (!el) { drop.push(k); continue; }
            if (isLazyConcatName(el.name, el.parents) || isBadEmoji(el.emoji)) drop.push(k);
        }
        if (!drop.length) return 0;
        const dropSet = new Set(drop);
        for (const k of drop) delete state.elements[k];
        for (const cKey of Object.keys(state.combos)) {
            const target = state.combos[cKey];
            const [a, b] = cKey.split('+');
            if (dropSet.has(target) || dropSet.has(a) || dropSet.has(b)) {
                delete state.combos[cKey];
            }
        }
        // Also drop them from history so the strip doesn't show stale ghosts.
        state.history = (state.history || []).filter(k => !dropSet.has(k));
        return drop.length;
    }

    // ------------------------------------------------------------------
    // Theme
    // ------------------------------------------------------------------
    function applyTheme() {
        const explicit = state.theme;
        const prefersLight = window.matchMedia
            && window.matchMedia('(prefers-color-scheme: light)').matches;
        const theme = explicit || (prefersLight ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);

        const btn = document.getElementById('themeToggle');
        const icon = document.getElementById('themeIcon');
        const label = document.getElementById('themeLabel');
        if (theme === 'light') {
            icon.textContent = '☀️'; label.textContent = 'Light';
            btn.setAttribute('aria-pressed', 'true');
        } else {
            icon.textContent = '🌙'; label.textContent = 'Dark';
            btn.setAttribute('aria-pressed', 'false');
        }
    }

    function wireTopbar() {
        document.getElementById('themeToggle').addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            state.theme = next;
            localStorage.setItem(LS_THEME, next);
            applyTheme();
        });
        // Debug log access from the browser devtools console:
        //   window.dumpDebug()         -> array of last 100 entries
        //   window.copyDebug()         -> serialise + copy to clipboard
        // No on-screen button to avoid topbar clutter.
        window.dumpDebug = () => state.debug.slice();
        window.copyDebug = copyDebugLog;
        console.info('[element-fusion] dumpDebug()/copyDebug() available in console.');
        document.getElementById('syncStatus').addEventListener('click', async () => {
            // Manual nudge: try a fresh sync round. Error handling is critical
            // here because the puter relay can throw mid-call (its WebSocket
            // sometimes flips to CLOSED), and an uncaught reject leaves the
            // status pill stuck on "Connecting...".
            if (state.sync.state === 'off') { initSync(); return; }
            if (state.sync.dirty) { flushSyncNow(); return; }
            setSyncState('pending', 'Syncing...');
            try {
                await doRemoteRefresh();
                setSyncState('ok', 'Synced');
            } catch (e) {
                logEntry('error', { kind: 'sync.manual.get', blobId: state.blobId },
                         { message: String(e && e.message || e) });
                setSyncState('off', 'Offline');
            }
        });

        if (window.matchMedia) {
            const mq = window.matchMedia('(prefers-color-scheme: light)');
            const handler = () => { if (!state.theme) applyTheme(); };
            if (mq.addEventListener) mq.addEventListener('change', handler);
            else if (mq.addListener) mq.addListener(handler);
        }
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && state.sync.dirty) flushSyncNow();
        });
    }

    function setSyncState(s, label) {
        state.sync.state = s;
        const btn = document.getElementById('syncStatus');
        btn.setAttribute('data-state', s);
        const last = state.sync.lastSyncAt
            ? ' · last sync ' + relTime(state.sync.lastSyncAt)
            : '';
        const tip = ({
            ok:     'Synced with shared cache' + last,
            pending:'Pending push to shared cache' + last,
            off:    'Offline - running solo' + last,
            idle:   'Connecting…'
        })[s] || s;
        btn.title = tip;
        const lbl = document.getElementById('syncLabel');
        lbl.textContent = label || ({
            ok: 'Synced', pending: 'Syncing…', off: 'Offline', idle: 'Connecting…'
        })[s] || s;
    }

    function relTime(ts) {
        const sec = Math.max(1, Math.round((Date.now() - ts) / 1000));
        if (sec < 60) return sec + 's ago';
        const min = Math.round(sec / 60);
        if (min < 60) return min + 'm ago';
        const h = Math.round(min / 60);
        return h + 'h ago';
    }

    // ------------------------------------------------------------------
    // Debug log
    // ------------------------------------------------------------------
    function logEntry(kind, requestSummary, responseSummary, elapsedMs) {
        const entry = {
            t: new Date().toISOString(),
            kind: kind,
            elapsedMs: elapsedMs == null ? null : Math.round(elapsedMs),
            requestSummary: requestSummary,
            responseSummary: responseSummary
        };
        state.debug.push(entry);
        while (state.debug.length > DEBUG_MAX) state.debug.shift();
        writeJSON(LS_DEBUG, state.debug);
        // Mirror to Chrome DevTools console with the FULL raw model output
        // visible (no truncation). Use the right level so devtools filter
        // dropdown can pick it out.
        const head = '[ef] ' + kind +
            (requestSummary && requestSummary.kind ? ' ' + requestSummary.kind : '') +
            (elapsedMs != null ? ' (' + Math.round(elapsedMs) + 'ms)' : '');
        const fn = kind === 'error' ? console.error : console.log;
        fn.call(console, head, { req: requestSummary, resp: responseSummary });
    }

    async function copyDebugLog() {
        const text = JSON.stringify(state.debug, null, 2);
        let ok = false;
        try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                await navigator.clipboard.writeText(text);
                ok = true;
            }
        } catch (e) { /* fallthrough */ }
        if (!ok) {
            try {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.setAttribute('readonly', '');
                ta.style.position = 'fixed';
                ta.style.top = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                ok = document.execCommand('copy');
                document.body.removeChild(ta);
            } catch (e) { ok = false; }
        }
        showToast(ok ? 'Debug log copied' : 'Copy failed', { isInfo: true });
    }

    // ------------------------------------------------------------------
    // Sorted-pair combo key (lowercased so case mismatches collapse)
    // ------------------------------------------------------------------
    function comboKey(nameA, nameB) {
        const [a, b] = [nameKey(nameA), nameKey(nameB)].sort();
        return a + '+' + b;
    }

    function findCombo(nameA, nameB) {
        const k = comboKey(nameA, nameB);
        const targetKey = state.combos[k];
        if (targetKey && state.elements[targetKey]) {
            return { key: targetKey, element: state.elements[targetKey] };
        }
        return null;
    }

    // ------------------------------------------------------------------
    // Emoji uniqueness validator
    // ------------------------------------------------------------------
    function buildEmojiToName() {
        const map = new Map();
        for (const k of Object.keys(state.elements)) {
            const el = state.elements[k];
            if (!el || !el.emoji) continue;
            if (!map.has(el.emoji)) map.set(el.emoji, el.name);
        }
        return map;
    }

    // The "name" returned by the LLM may already exist (legitimate reuse)
    // or be new. The emoji rule:
    //   - if the result name matches an existing element, force-reuse
    //     that element's emoji (override what the LLM said).
    //   - if the name is new, the emoji must NOT collide with any other
    //     element's emoji.
    function validateLLMResult(parsed) {
        if (!parsed || typeof parsed !== 'object') return { ok: false, reason: 'Non-object JSON' };
        const name = String(parsed.name || '').trim();
        if (!name) return { ok: false, reason: 'Missing name' };
        let emoji = String(parsed.emoji || '').trim();
        if (!emoji) return { ok: false, reason: 'Missing emoji' };
        // Strip ZWJ-trailing whitespace and any plain-text framing
        emoji = emoji.replace(/^["']|["']$/g, '').slice(0, 12);
        // Reject if the emoji field is plain text (LLM returns word "dry"
        // instead of an actual glyph). Require at least one pictograph.
        try {
            if (!/\p{Extended_Pictographic}/u.test(emoji)) {
                return { ok: false, reason: 'Emoji field "' + emoji + '" is not an emoji glyph. Use an actual emoji character (e.g. 🟫 for Mud, ☁️ for Cloud).' };
            }
        } catch (_) { /* old engine without \p — fall through, accept anything */ }
        // Reject multi-grapheme emoji (no more 2-emoji "pair" cheats like
        // 🌋⛰ or 🌌✨). Single glyph only — forces the model to find a real
        // unique emoji per concept.
        try {
            const seg = new Intl.Segmenter('en', { granularity: 'grapheme' });
            const clusters = [...seg.segment(emoji)].length;
            if (clusters > 1) {
                return { ok: false, reason: 'Emoji "' + emoji + '" is a multi-emoji pair. Pick a SINGLE emoji that represents the concept on its own.' };
            }
        } catch (_) { /* no Intl.Segmenter — old browser, skip */ }

        const k = nameKey(name);
        if (state.elements[k]) {
            // Reuse existing element's emoji, regardless of what model returned
            const existing = state.elements[k];
            return {
                ok: true,
                forced: true,
                element: { name: existing.name, emoji: existing.emoji,
                           description: existing.description }
            };
        }

        // New name -> emoji must be unused by any DIFFERENT name
        const map = buildEmojiToName();
        if (map.has(emoji) && nameKey(map.get(emoji)) !== k) {
            return {
                ok: false,
                reason: 'Emoji ' + emoji + ' is already used for "' + map.get(emoji) + '". Pick a different emoji.'
            };
        }
        return {
            ok: true,
            forced: false,
            element: {
                name: prettifyName(name),
                emoji: emoji,
                description: String(parsed.description || '').slice(0, 240)
            }
        };
    }

    function prettifyName(s) {
        const t = String(s || '').trim();
        if (!t) return 'Mystery';
        return t.split(/\s+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    // ------------------------------------------------------------------
    // LLM combine call
    // ------------------------------------------------------------------
    function buildSysPrompt(banList) {
        const list = banList && banList.length ? banList.join(',') : '';
        return [
            '# You are infinite-craft expert that combining emojy into one.',
            '- Reply with ONLY ONE valid JSON, no markdown, no commentary.',
            '- You generate the result of combining two elements/objects/people/concepts/characters with following rules:',
            ' - If two inputs would intuitively make a real thing in everyday English, that thing is the answer. Pick the obvious natural-language answer (Water💧+Fire🔥 = Steam💨, Man👨+Woman👩 = Baby👶, Plant🌱+Plant🌱 = Tree🌳). No underscores, no slug-style.',
            ' - do NOT cheat: mash the two input names together as the result ("Dust + Water", "Dust And Water", "DustWater", "Fire Plant" are all WRONG). EXISTING and PLAUSIBLE in real-world concept, NOT invented.',
            ' - Do NOT or be similar to any of these emojy: ' + list,
            '',
            '# Output strcure',
            '- Reply with valid JSON only - no markdown, no commentary using below Schema:',
            '{ "name": "<short noun, 1-3 words>", "emoji": "<single emoji>" }'
        ].join('\n');
    }

    // Last-resort lookup: scores every emoji's emojibase-data label+tags
    // against the model's chosen NAME and returns the best unused match.
    // emojibase ships ~3700 emojis each with ~5-15 tags ("fire","flame",
    // "hot","tool",...) - that IS the 11k+ word correspondence dataset,
    // baked into the emoji metadata. No hand-coded synonym map.
    // Triggered ONLY when local retries + puter rescue both fail.
    const EMOJI_DATA_URL = 'https://cdn.jsdelivr.net/npm/emojibase-data@latest/en/data.json';
    let emojiDataPromise = null;
    function loadEmojiData() {
        if (!emojiDataPromise) {
            emojiDataPromise = fetch(EMOJI_DATA_URL)
                .then(r => r.json())
                .then(arr => arr.filter(e => e.tags && e.tags.length))
                .catch(e => {
                    logEntry('error', { kind: 'emoji.data.load' }, { message: String(e && e.message || e) });
                    return null;
                });
        }
        return emojiDataPromise;
    }

    function tokenizeName(s) {
        return String(s || '').toLowerCase().split(/[^a-z]+/).filter(t => t.length >= 3);
    }

    async function pickFallbackEmoji(name, banSet) {
        const tokens = tokenizeName(name);
        if (!tokens.length) return null;
        const data = await loadEmojiData();
        if (!data) return null;
        const bans = banSet instanceof Set ? banSet : new Set(banSet || []);
        let best = null;
        let bestScore = 0;
        let bestRank = Infinity;
        for (const entry of data) {
            const emoji = entry.emoji;
            if (!emoji || bans.has(emoji)) continue;
            const label = String(entry.label || '').toLowerCase();
            const tags = entry.tags || [];
            let score = 0;
            for (const t of tokens) {
                if (label === t) score += 3;
                else if (label.includes(t)) score += 1;
                if (tags.indexOf(t) !== -1) score += 2;
            }
            // Tie-break: prefer earlier-ordered (more canonical) emojis
            // and shorter labels (more focused matches).
            const rank = (entry.order || 9999) + label.length;
            if (score > bestScore || (score === bestScore && rank < bestRank)) {
                best = emoji; bestScore = score; bestRank = rank;
            }
        }
        return bestScore > 0 ? best : null;
    }

    function buildBanList() {
        const set = new Set();
        for (const k of Object.keys(state.elements)) {
            const e = state.elements[k];
            if (e && e.emoji) set.add(e.emoji);
        }
        const arr = Array.from(set);
        if (arr.length > MAX_USED_LIST) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
            }
            return arr.slice(0, MAX_USED_LIST);
        }
        return arr;
    }

    function buildUsedList() {
        const items = [];
        for (const k of Object.keys(state.elements)) {
            const el = state.elements[k];
            if (!el || !el.emoji) continue;
            items.push(el.name + ':' + el.emoji);
        }
        // Sample if exceeding cap so the model still sees a representative
        // slice over many calls
        if (items.length > MAX_USED_LIST) {
            for (let i = items.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const t = items[i]; items[i] = items[j]; items[j] = t;
            }
            return items.slice(0, MAX_USED_LIST);
        }
        return items;
    }

    function buildUserPrompt(a, b) {
        return 'Combine: "' + a.name + '" (' + a.emoji + ') + "' + b.name + '" (' + b.emoji + ').';
    }

    async function callCombineLLM(a, b) {
        // The conversation grows as retries accumulate. Each rejected attempt
        // appends the assistant's bad answer plus a user message explaining
        // why - so the model sees its own past mistakes and can self-correct
        // instead of restarting cold every retry.
        const messages = [
            { role: 'system', content: buildSysPrompt(buildBanList()) },
            { role: 'user',   content: buildUserPrompt(a, b) }
        ];
        const aKey = nameKey(a.name), bKey = nameKey(b.name);
        for (let attempt = 0; attempt < MAX_LLM_RETRIES_FOR_EMOJI; attempt++) {
            const model = TEXT_MODELS[Math.min(attempt, TEXT_MODELS.length - 1)];
            const t0 = performance.now();
            const reqSummary = { kind: 'combine', a: a.name, b: b.name, model: model || 'default', attempt: attempt + 1 };
            let content = null;
            let path = null;
            try {
                const got = await fetchTextGET(messages, model, TEXT_TIMEOUT_MS);
                content = got.content;
                path = got.path;
                const shortModel = path === 'local' ? 'qwen3.5-2b' : (model || 'puter');
                reqSummary.model = shortModel;
                if (!content) throw new Error('Empty content from text API');
                const parsed = parseLooseJSON(content);
                const v = validateLLMResult(parsed);
                const elapsed = performance.now() - t0;
                const resKey = v.ok ? nameKey(v.element.name) : null;
                const lazyConcat = v.ok && isLazyConcatName(v.element.name, [a.name, b.name]) && resKey !== aKey && resKey !== bKey;
                const sameAsInput = v.ok && (resKey === aKey || resKey === bKey);
                if (v.ok && !lazyConcat && !sameAsInput) {
                    logEntry('text', reqSummary, { path, raw: content, accepted: { name: v.element.name, emoji: v.element.emoji, forced: !!v.forced } }, elapsed);
                    state.comboAttempts.push({ n: attempt + 1, path, model: shortModel, elapsedMs: elapsed, ok: true });
                    renderWorkspace();
                    return v.element;
                }
                const reason = v.ok
                    ? (sameAsInput
                        ? 'You returned "' + v.element.name + '", same as one of the inputs. X+X must be a DIFFERENT, larger concept (e.g. Smoke+Smoke = Smog).'
                        : 'You returned "' + v.element.name + '", which is just the input names mashed together. Pick a single real-world concept (e.g. Dust+Water = Mud, not "Dust + Water").')
                    : v.reason;
                logEntry('text', reqSummary, { path, raw: content, rejected: reason }, elapsed);
                state.comboAttempts.push({ n: attempt + 1, path, model: shortModel, elapsedMs: elapsed, ok: false, error: 'rejected: ' + reason });
                renderWorkspace();
                messages.push({ role: 'assistant', content });
                messages.push({ role: 'user', content: 'Rejected: ' + reason + ' Try again with a DIFFERENT name and emoji.' });
                continue;
            } catch (err) {
                const elapsed = performance.now() - t0;
                const msg = String(err && err.message || err);
                const shortModel = path === 'local' ? 'qwen3.5-2b' : (model || 'puter');
                logEntry('error', reqSummary, { path, message: msg, raw: content }, elapsed);
                state.comboAttempts.push({ n: attempt + 1, path, model: shortModel, elapsedMs: elapsed, ok: false, error: msg });
                renderWorkspace();
                const isParseError   = /JSON|parse/i.test(msg);
                const isTimeoutError = /timed out/i.test(msg);
                const isEmptyContent = /empty content/i.test(msg);
                const isRateLimit    = /HTTP 429/i.test(msg);
                if ((isParseError || isTimeoutError || isEmptyContent || isRateLimit) && attempt < MAX_LLM_RETRIES_FOR_EMOJI - 1) {
                    if (isRateLimit) {
                        const wait = 1500 * Math.pow(2, attempt);
                        await new Promise(r => setTimeout(r, wait));
                    }
                    if (content) messages.push({ role: 'assistant', content });
                    messages.push({ role: 'user', content: isTimeoutError
                        ? 'Previous attempt timed out. Reply with a short JSON only.'
                        : isEmptyContent
                            ? 'Previous response was empty. Reply with a complete JSON object matching the schema.'
                            : 'Previous response was not valid JSON. Reply with ONLY the JSON object, no prose, no markdown.' });
                    continue;
                }
                throw err;
            }
        }
        // Puter rescue: send the full accumulated conversation so puter sees
        // every local attempt and the rejection reasons - one shot to fix it.
        try {
            const t0 = performance.now();
            const content = await tryPuterChat(messages, 'gpt-4o-mini', TEXT_TIMEOUT_MS);
            const elapsed = performance.now() - t0;
            const parsed = parseLooseJSON(content);
            const v = validateLLMResult(parsed);
            const resKey = v.ok ? nameKey(v.element.name) : null;
            const lazyConcat = v.ok && isLazyConcatName(v.element.name, [a.name, b.name]) && resKey !== aKey && resKey !== bKey;
            const sameAsInput = v.ok && (resKey === aKey || resKey === bKey);
            if (v.ok && !lazyConcat && !sameAsInput) {
                logEntry('text', { kind: 'combine.puter-rescue', a: a.name, b: b.name }, { path: 'puter', raw: content, accepted: v.element }, elapsed);
                state.comboAttempts.push({ n: state.comboAttempts.length + 1, path: 'puter', model: 'gpt-4o-mini', elapsedMs: elapsed, ok: true });
                renderWorkspace();
                return v.element;
            }
            logEntry('text', { kind: 'combine.puter-rescue', a: a.name, b: b.name }, { path: 'puter', raw: content, rejected: v.reason || (sameAsInput ? 'same as input' : (lazyConcat ? 'lazy concat' : 'invalid')) }, elapsed);
        } catch (e) {
            logEntry('error', { kind: 'combine.puter-rescue', a: a.name, b: b.name }, { message: String(e && e.message || e) });
        }
        // Dictionary fallback: keep the model's last attempted name and pick a
        // semantically-plausible emoji from NAME_EMOJIS that isn't taken.
        const lastAssistant = [...messages].reverse().find(m => m.role === 'assistant');
        if (lastAssistant) {
            try {
                const parsed = parseLooseJSON(lastAssistant.content);
                if (parsed && parsed.name) {
                    const rawName = String(parsed.name).trim();
                    const resKey = nameKey(rawName);
                    const lazyConcat = isLazyConcatName(rawName, [a.name, b.name]) && resKey !== aKey && resKey !== bKey;
                    const sameAsInput = resKey === aKey || resKey === bKey;
                    if (rawName && !lazyConcat && !sameAsInput) {
                        const banSet = new Set(buildBanList());
                        const fallbackEmoji = await pickFallbackEmoji(rawName, banSet);
                        if (fallbackEmoji) {
                            logEntry('text', { kind: 'combine.dict-fallback', a: a.name, b: b.name },
                                     { name: rawName, emoji: fallbackEmoji });
                            state.comboAttempts.push({ n: state.comboAttempts.length + 1, path: 'dict', model: 'dict', elapsedMs: 0, ok: true });
                            renderWorkspace();
                            return { name: prettifyName(rawName), emoji: fallbackEmoji, description: '' };
                        }
                    }
                }
            } catch (_) { /* fall through to error */ }
        }
        logEntry('error', { kind: 'combine', a: a.name, b: b.name },
                 { message: 'Local retries + puter rescue + dict fallback all failed; surfacing error' });
        throw new Error('Could not produce a valid result for ' + a.name + ' + ' + b.name + ' (try again).');
    }

    // ----------------------------------------------------------------
    // Local LLM via transformers.js + Qwen3.5-2B-ONNX-OPT (WebGPU, falls
    // back to WASM). Try local first; puter.ai.chat is the secondary
    // fallback only.
    //
    // Why local first: it's free forever, no quota, no auth, runs on the
    // user's GPU. Puter.ai is the parachute - it works today but anonymous
    // users have a small daily credit allowance.
    //
    // First load downloads ~600 MB to the browser's HF cache. Subsequent
    // boots are instant. The combine flow falls back to puter while the
    // model is still downloading (so the demo is usable from the first
    // click instead of waiting for the model).
    // ----------------------------------------------------------------
    const LOCAL_WORKER_SRC = `
      import {
        AutoTokenizer,
        AutoModelForCausalLM,
        InterruptableStoppingCriteria
      } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@latest/+esm";
      const MODEL_ID = "onnx-community/Qwen3.5-2B-ONNX-OPT";
      let tokenizer = null, model = null, loadingPromise = null, device = "wasm";
      const stopping = new InterruptableStoppingCriteria();

      async function pickDevice() {
        if (typeof navigator !== "undefined" && navigator.gpu) {
          try { const adapter = await navigator.gpu.requestAdapter(); if (adapter) return "webgpu"; } catch (_) {}
        }
        return "wasm";
      }
      async function ensureLoaded() {
        if (tokenizer && model) return;
        if (loadingPromise) return loadingPromise;
        loadingPromise = (async () => {
          device = await pickDevice();
          self.postMessage({ type: "status", phase: "loading", device });
          const progressCallback = (p) => self.postMessage({ type: "progress", payload: p });
          tokenizer = await AutoTokenizer.from_pretrained(MODEL_ID, { progress_callback: progressCallback });
          try {
            model = await AutoModelForCausalLM.from_pretrained(MODEL_ID, { dtype: "q4f16", device, progress_callback: progressCallback });
          } catch (err) {
            if (device === "webgpu") {
              device = "wasm";
              model = await AutoModelForCausalLM.from_pretrained(MODEL_ID, { dtype: "q4f16", device: "wasm", progress_callback: progressCallback });
            } else { throw err; }
          }
          self.postMessage({ type: "status", phase: "ready", device });
        })();
        try { await loadingPromise; } catch (e) { loadingPromise = null; throw e; }
      }
      async function runChat(id, messages) {
        await ensureLoaded();
        // Non-thinking: 0.8B with CoT hallucinated the input emoji and ran
        // away. 2B without CoT is the sweet spot - reads the prompt, answers
        // directly, no thinking-loop risk.
        const inputs = tokenizer.apply_chat_template(messages, {
          add_generation_prompt: true, return_dict: true, enable_thinking: false
        });
        stopping.reset();
        // Qwen3.5 non-thinking text-task params (HF card):
        //   temperature 1.0, top_p 1.0, top_k 20, min_p 0,
        //   presence_penalty 2.0, repetition_penalty 1.0.
        // transformers.js does not expose presence_penalty - the repetition
        // suppression has to come from temperature spread alone here.
        const output = await model.generate({
          ...inputs,
          max_new_tokens: 32768,
          do_sample: true,
          temperature: 1.0,
          top_p: 1.0,
          top_k: 20,
          min_p: 0,
          repetition_penalty: 1.0,
          stopping_criteria: stopping
        });
        const seqLen = inputs.input_ids.dims[1];
        const generated = output.slice(null, [seqLen, null]);
        const decoded = tokenizer.batch_decode(generated, { skip_special_tokens: true });
        let text = (decoded && decoded[0]) || "";
        text = text.replace(/<think>[\\s\\S]*?<\\/think>/gi, "").trim();
        self.postMessage({ type: "done", id, text });
      }
      self.onmessage = async (ev) => {
        const m = ev.data || {};
        if (m.type === "warmup") { try { await ensureLoaded(); } catch (e) { self.postMessage({ type: "error", id: null, message: String(e && e.message || e) }); } return; }
        if (m.type === "run") { try { await runChat(m.id, m.messages); } catch (e) { self.postMessage({ type: "error", id: m.id, message: String(e && e.message || e) }); } return; }
        if (m.type === "interrupt") { stopping.interrupt(); }
      };
    `;
    let localWorker = null;
    let localReady = false;        // model finished downloading + loaded
    let localBroken = false;       // a fatal error means we stop trying local
    const localPending = new Map(); // id -> { resolve, reject, timer }
    function bootLocalWorker() {
        try {
            const url = URL.createObjectURL(new Blob([LOCAL_WORKER_SRC], { type: 'text/javascript' }));
            localWorker = new Worker(url, { type: 'module' });
            localWorker.addEventListener('message', (ev) => {
                const m = ev.data || {};
                if (m.type === 'status') {
                    logEntry('info', { kind: 'local.status' }, { phase: m.phase, device: m.device });
                    if (m.phase === 'ready') localReady = true;
                }
                if (m.type === 'progress') {
                    const p = m.payload || {};
                    if (!bootLocalWorker._filePct) bootLocalWorker._filePct = new Map();
                    if (p.status === 'progress' && typeof p.progress === 'number' && p.file) {
                        const last = bootLocalWorker._filePct.get(p.file);
                        const crossed99 = (last === undefined || last < 99) && p.progress >= 99;
                        const big25Step = last !== undefined && p.progress - last >= 25;
                        const firstSeen = last === undefined;
                        if (firstSeen || big25Step || crossed99) {
                            bootLocalWorker._filePct.set(p.file, p.progress);
                            logEntry('info', { kind: 'local.download' }, { file: p.file, pct: p.progress.toFixed(0) + '%' });
                        }
                    } else if (p.status === 'done' || p.status === 'ready') {
                        logEntry('info', { kind: 'local.download' }, { file: p.file, status: p.status });
                    }
                }
                if ((m.type === 'done' || m.type === 'error') && m.id != null && localPending.has(m.id)) {
                    const p = localPending.get(m.id);
                    localPending.delete(m.id);
                    clearTimeout(p.timer);
                    if (m.type === 'done') p.resolve(m.text || '');
                    else p.reject(new Error(m.message || 'local worker error'));
                }
                if (m.type === 'error' && m.id == null) {
                    // warmup failure -> mark broken so we stop trying
                    localBroken = true;
                }
            });
            localWorker.addEventListener('error', () => { localBroken = true; });
            localWorker.postMessage({ type: 'warmup' });
        } catch (e) {
            localBroken = true;
        }
    }
    bootLocalWorker();

    function tryLocalChat(messages, timeoutMs) {
        return new Promise((resolve, reject) => {
            if (localBroken) return reject(new Error('local broken'));
            if (!localReady)  return reject(new Error('local not ready'));
            if (!localWorker) return reject(new Error('local worker missing'));
            const id = Math.random().toString(36).slice(2);
            const timer = setTimeout(() => {
                if (localPending.has(id)) {
                    localPending.delete(id);
                    try { localWorker.postMessage({ type: 'interrupt' }); } catch (_) {}
                    reject(new Error('local timed out'));
                }
            }, timeoutMs);
            localPending.set(id, { resolve, reject, timer });
            localWorker.postMessage({ type: 'run', id, messages });
        });
    }

    async function tryPuterChat(messages, model, timeoutMs) {
        if (typeof puter === 'undefined' || !puter.ai || typeof puter.ai.chat !== 'function') {
            throw new Error('puter.ai unavailable');
        }
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), timeoutMs);
        try {
            const chatPromise = puter.ai.chat(messages, model ? { model } : undefined);
            const aborted = new Promise((_, rej) => {
                ctrl.signal.addEventListener('abort', () => rej(new Error('Request timed out')), { once: true });
            });
            const resp = await Promise.race([chatPromise, aborted]);
            const content = resp && resp.message && resp.message.content;
            if (typeof content !== 'string' || !content) throw new Error('Empty content from puter.ai');
            return content;
        } finally {
            clearTimeout(timer);
        }
    }

    // Returns { content, path } where path = 'local' | 'puter'. Local first;
    // puter is the fallback when local is unavailable or errors out.
    async function fetchTextGET(messages, model, timeoutMs) {
        let localFailReason = null;
        if (!localReady) {
            localFailReason = localBroken ? 'broken' : 'not-ready (model still loading?)';
        }
        if (localReady && !localBroken) {
            try {
                const content = await tryLocalChat(messages, timeoutMs);
                return { content, path: 'local' };
            } catch (e) {
                const msg = String(e && e.message || e);
                localFailReason = msg;
                if (/out of memory|webgpu unsupported|worker dead|worker missing|local broken/i.test(msg)) {
                    localBroken = true;
                }
            }
        }
        if (localFailReason) {
            logEntry('error', { kind: 'local.fallback' }, { message: 'local skipped, using puter: ' + localFailReason });
        }
        const content = await tryPuterChat(messages, model, timeoutMs);
        return { content, path: 'puter' };
    }

    // The model sometimes wraps real JSON in junk like `{"{"name":"X"...}`
    // or buries it inside whitespace. Walk forward from a known schema key
    // (`"name"`) and brace-balance to recover the inner valid object.
    // Returns the slice or null.
    function findKeyedObject(text, key) {
        const tag = '"' + key + '"';
        let idx = text.indexOf(tag);
        if (idx < 0) return null;
        // Walk backward over whitespace/comma to the opening brace.
        let i = idx - 1;
        while (i >= 0 && /[\s,]/.test(text[i])) i--;
        if (text[i] !== '{') return null;
        // Walk forward, tracking depth and string state, to the matching }.
        let depth = 0, inStr = false, esc = false;
        for (let j = i; j < text.length; j++) {
            const c = text[j];
            if (esc) { esc = false; continue; }
            if (inStr) {
                if (c === '\\') esc = true;
                else if (c === '"') inStr = false;
                continue;
            }
            if (c === '"') inStr = true;
            else if (c === '{') depth++;
            else if (c === '}') {
                depth--;
                if (depth === 0) return text.slice(i, j + 1);
            }
        }
        return null;
    }

    function parseLooseJSON(text) {
        const raw = String(text || '');
        const cleaned = raw
            .replace(/^\s*```(?:json)?\s*/i, '')
            .replace(/\s*```\s*$/i, '')
            .trim();

        // 1. Straight parse.
        try { return JSON.parse(cleaned); } catch (_) {}

        // 2. Walk from `"name"` to the smallest balanced object that
        //    contains it. Catches the `{"{"name":"X"...}` envelope bug.
        const inner = findKeyedObject(cleaned, 'name');
        if (inner) {
            try { return JSON.parse(inner); } catch (_) {
                // Fall through to repair attempts on the inner slice.
                const repairs = [
                    inner.replace(/,(\s*[}\]])/g, '$1'),
                    inner.replace(/(['])((?:[^'\\]|\\.)*?)(['])/g, '"$2"'),
                ];
                for (const c of repairs) { try { return JSON.parse(c); } catch (_) {} }
            }
        }

        // 3. Slice between first { and last }, with repairs (legacy path
        //    for cases where keys other than "name" come first).
        const start = cleaned.indexOf('{');
        const end   = cleaned.lastIndexOf('}');
        if (start >= 0 && end > start) {
            const slice = cleaned.slice(start, end + 1);
            const repairs = [
                slice,
                slice.replace(/,(\s*[}\]])/g, '$1'),
                slice.replace(/(['])((?:[^'\\]|\\.)*?)(['])/g, '"$2"'),
                slice.replace(/(['])((?:[^'\\]|\\.)*?)(['])/g, '"$2"').replace(/,(\s*[}\]])/g, '$1'),
            ];
            for (const candidate of repairs) {
                try { return JSON.parse(candidate); } catch (_) {}
            }
        }

        // 4. Regex-extract from prose: tolerates "name: X, emoji: Y" or
        //    markdown like "**Name:** X". Last-ditch when the model
        //    refused JSON entirely.
        const nameM  = raw.match(/(?:"?name"?|\*\*name\*\*)\s*[:=]\s*["']?([^"',\n*}]{1,40})/i);
        const emojiM = raw.match(/(?:"?emoji"?|\*\*emoji\*\*)\s*[:=]\s*["']?([^\s"',}]+)/i);
        const descM  = raw.match(/(?:"?description"?|\*\*description\*\*)\s*[:=]\s*["']?([^"'\n}]{1,200})/i);
        if (nameM && emojiM) {
            return {
                name: nameM[1].trim().replace(/[*_]+$/, ''),
                emoji: emojiM[1].trim(),
                description: (descM ? descM[1].trim() : '').replace(/[*_]+$/, ''),
            };
        }

        throw new Error('No JSON object in response');
    }

    // ------------------------------------------------------------------
    // Combine flow
    // ------------------------------------------------------------------
    async function combineSlots() {
        if (state.slots.length !== 2) return;
        // Defensive: drop any lazy-concat entries that snuck into in-memory
        // state earlier this session (before the validator landed). Without
        // this the LLM is told 🪑 is taken for "Ash + Power Plant" and can't
        // reuse the emoji for a real concept like "Chair" or "Furniture".
        if (pruneLazyLocalEntries() > 0) renderGrid();
        const aKey = state.slots[0];
        const bKey = state.slots[1];
        const a = state.elements[aKey];
        const b = state.elements[bKey];
        if (!a || !b) { resetSlots(); return; }

        // Cache hit?
        const cached = findCombo(a.name, b.name);
        if (cached) {
            await playFusion(cached.key, /*isNew*/ false, /*remoteHit*/ state.sync.knownRemoteNames.has(cached.key));
            return;
        }

        // LLM call
        const cKey = comboKey(a.name, b.name);
        state.comboInFlight = cKey;
        state.lastError = null;
        state.comboAttempts = [];
        state.comboLastSummary = null;
        renderWorkspace();
        try {
            const result = await callCombineLLM(a, b);
            const k = nameKey(result.name);
            const wasNewLocally = !state.elements[k];
            const wasInRemote = state.sync.knownRemoteNames.has(k);

            if (wasNewLocally) {
                state.elements[k] = {
                    name: result.name,
                    emoji: result.emoji,
                    description: result.description,
                    parents: [a.name, b.name],
                    createdAt: Date.now(),
                    discoveredBy: state.userId
                };
            }
            state.combos[cKey] = k;
            writeJSON(LS_ELEMENTS, state.elements);
            writeJSON(LS_COMBOS, state.combos);

            state.comboInFlight = null;
            state.comboLastSummary = {
                attempts: state.comboAttempts.slice(),
                totalMs: state.comboAttempts.reduce((s, a) => s + (a.elapsedMs || 0), 0),
            };
            // First-discovery = locally new AND not already known via remote merge
            const isFirstDiscovery = wasNewLocally && !wasInRemote;
            if (isFirstDiscovery) {
                state.points = (state.points || 0) + 1;
                try { localStorage.setItem(LS_POINTS, String(state.points)); } catch (_) {}
            }
            await playFusion(k, isFirstDiscovery, /*remoteHit*/ wasInRemote);

            // Schedule shared-cache push
            scheduleSyncPush();
        } catch (err) {
            state.comboInFlight = null;
            state.lastError = err && err.message || 'Combine failed';
            renderWorkspace();
        }
    }

    async function playFusion(resultKey, isFirstDiscovery, remoteHit) {
        const slotsHost = document.getElementById('slots');
        const slotCards = Array.from(slotsHost.querySelectorAll('.card'));
        slotCards.forEach(c => c.classList.add('is-fusing'));
        await sleep(380);

        state.slots = [];
        state.history = [resultKey, ...state.history.filter(k => k !== resultKey)];
        if (state.history.length > 8) state.history.length = 8;
        renderAll();

        requestAnimationFrame(() => {
            const target = document.querySelector('[data-grid-card="' + cssEscape(resultKey) + '"]');
            if (target) {
                target.classList.add('is-popped');
