        const descM  = raw.match(/(?:"?description"?|\*\*description\*\*)\s*[:=]\s*["']?([^"'\n}]{1,200})/i);
        if (nameM && emojiM) {
            return {
                name: nameM[1].trim().replace(/[*_]+$/, ''),
                emoji: emojiM[1].trim(),
                description: (descM ? descM[1].trim() : '').replace(/[*_]+$/, ''),
            };
        }

        throw new Error('No JSON object in response');
    }

    // ------------------------------------------------------------------
    // Combine flow
    // ------------------------------------------------------------------
    async function combineSlots() {
        if (state.slots.length !== 2) return;
        // Defensive: drop any lazy-concat entries that snuck into in-memory
        // state earlier this session (before the validator landed). Without
        // this the LLM is told 🪑 is taken for "Ash + Power Plant" and can't
        // reuse the emoji for a real concept like "Chair" or "Furniture".
        if (pruneLazyLocalEntries() > 0) renderGrid();
        const aKey = state.slots[0];
        const bKey = state.slots[1];
        const a = state.elements[aKey];
        const b = state.elements[bKey];
        if (!a || !b) { resetSlots(); return; }

        // Cache hit?
        const cached = findCombo(a.name, b.name);
        if (cached) {
            await playFusion(cached.key, /*isNew*/ false, /*remoteHit*/ state.sync.knownRemoteNames.has(cached.key));
            return;
        }

        // LLM call
        const cKey = comboKey(a.name, b.name);
        state.comboInFlight = cKey;
        state.lastError = null;
        state.comboAttempts = [];
        state.comboLastSummary = null;
        renderWorkspace();
        try {
            const result = await callCombineLLM(a, b);
            const k = nameKey(result.name);
            const wasNewLocally = !state.elements[k];
            const wasInRemote = state.sync.knownRemoteNames.has(k);

            if (wasNewLocally) {
                state.elements[k] = {
                    name: result.name,
                    emoji: result.emoji,
                    description: result.description,
                    parents: [a.name, b.name],
                    createdAt: Date.now(),
                    discoveredBy: state.userId
                };
            }
            state.combos[cKey] = k;
            writeJSON(LS_ELEMENTS, state.elements);
            writeJSON(LS_COMBOS, state.combos);

            state.comboInFlight = null;
            state.comboLastSummary = {
                attempts: state.comboAttempts.slice(),
                totalMs: state.comboAttempts.reduce((s, a) => s + (a.elapsedMs || 0), 0),
            };
            // First-discovery = locally new AND not already known via remote merge
            const isFirstDiscovery = wasNewLocally && !wasInRemote;
            if (isFirstDiscovery) {
                state.points = (state.points || 0) + 1;
                try { localStorage.setItem(LS_POINTS, String(state.points)); } catch (_) {}
            }
            await playFusion(k, isFirstDiscovery, /*remoteHit*/ wasInRemote);

            // Schedule shared-cache push
            scheduleSyncPush();
        } catch (err) {
            state.comboInFlight = null;
            state.lastError = err && err.message || 'Combine failed';
            renderWorkspace();
        }
    }

    async function playFusion(resultKey, isFirstDiscovery, remoteHit) {
        const slotsHost = document.getElementById('slots');
        const slotCards = Array.from(slotsHost.querySelectorAll('.card'));
        slotCards.forEach(c => c.classList.add('is-fusing'));
        await sleep(380);

        state.slots = [];
        state.history.unshift(resultKey);
        if (state.history.length > 8) state.history.length = 8;
        renderAll();

        requestAnimationFrame(() => {
            const target = document.querySelector('[data-grid-card="' + cssEscape(resultKey) + '"]');
            if (target) {
                target.classList.add('is-popped');
                setTimeout(() => target.classList.remove('is-popped'), 600);
            }
        });

        const el = state.elements[resultKey];
        if (!el) return;
        if (isFirstDiscovery) {
            showToast('First Discovery! ' + el.emoji + ' ' + el.name, { isDiscovery: true });
        } else if (remoteHit) {
            const who = el.discoveredBy && el.discoveredBy !== state.userId
                ? el.discoveredBy
                : 'someone';
            showToast(el.emoji + ' ' + el.name + ' · already discovered by ' + who, { isInfo: true });
        }
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function cssEscape(s) {
        if (window.CSS && CSS.escape) return CSS.escape(s);
        return String(s).replace(/[^a-zA-Z0-9_-]/g, '\\$&');
    }

    // ------------------------------------------------------------------
    // Drag and drop
    // ------------------------------------------------------------------
    let dragSourceKey = null;

    function wireWorkspaceDnd() {
        const ws = document.getElementById('workspace');
        ws.addEventListener('dragover', (ev) => {
            if (dragSourceKey) {
                ev.preventDefault();
                ev.dataTransfer.dropEffect = 'copy';
                ws.classList.add('is-drop-target');
            }
        });
        ws.addEventListener('dragleave', (ev) => {
            if (ev.target === ws) ws.classList.remove('is-drop-target');
        });
        ws.addEventListener('drop', (ev) => {
            ev.preventDefault();
            ws.classList.remove('is-drop-target');
            const idFromData = ev.dataTransfer && ev.dataTransfer.getData('text/x-element-key');
            const k = idFromData || dragSourceKey;
            if (!k) return;
            placeIntoSlots(k);
        });
    }

    function placeIntoSlots(k) {
        if (state.comboInFlight) return;
        if (!state.elements[k]) return;
        if (state.slots.length >= 2) return;
        state.slots.push(k);
        renderWorkspace();
        if (state.slots.length === 2) combineSlots();
    }

    function removeFromSlots(index) {
        if (state.comboInFlight) return;
        state.slots.splice(index, 1);
        renderWorkspace();
    }

    function resetSlots() { state.slots = []; renderWorkspace(); }

    // ------------------------------------------------------------------
    // Search
    // ------------------------------------------------------------------
    let searchQuery = '';
    function wireSearch() {
        document.getElementById('searchInput').addEventListener('input', (ev) => {
            searchQuery = ev.target.value.trim().toLowerCase();
            renderGrid();
        });
    }

    // ------------------------------------------------------------------
    // Rendering
    // ------------------------------------------------------------------
    function renderAll() {
        renderGrid();
        renderWorkspace();
        renderHistory();
    }

    function isStarter(k) { return STARTERS.some(s => nameKey(s.name) === k); }

    function renderGrid() {
        const host = document.getElementById('elementsGrid');
        const counter = document.getElementById('elementCount');
        host.innerHTML = '';
        const allKeys = Object.keys(state.elements);
        // Sort: starters first, then newest createdAt first
        allKeys.sort((ka, kb) => {
            const sa = isStarter(ka) ? 0 : 1;
            const sb = isStarter(kb) ? 0 : 1;
            if (sa !== sb) return sa - sb;
            return (state.elements[kb].createdAt || 0) - (state.elements[ka].createdAt || 0);
        });
        const filtered = searchQuery
            ? allKeys.filter(k => state.elements[k].name.toLowerCase().includes(searchQuery))
            : allKeys;

        counter.textContent = allKeys.length + ' total · ' + (state.points || 0) + ' pts';

        if (!filtered.length) {
            host.classList.add('is-empty');
            host.textContent = 'No matches.';
            return;
        }
        host.classList.remove('is-empty');
        const frag = document.createDocumentFragment();
        // Magic "+" card: only appears once the user has accumulated enough
        // points to spend. Surprise reveal, deliberately not visible at start.
        if ((state.points || 0) >= POINTS_REVEAL_AT && !searchQuery) {
            frag.appendChild(buildAddElementCard());
        }
        for (const k of filtered) {
            frag.appendChild(buildCard(k, { size: 'sm', context: 'grid' }));
        }
        host.appendChild(frag);
    }

    function renderWorkspace() {
        const host = document.getElementById('slots');
        const hint = document.getElementById('workspaceHint');
        const actions = document.getElementById('workspaceActions');
        host.innerHTML = '';
        actions.innerHTML = '';

        hint.style.display = state.slots.length === 0 ? 'block' : 'none';

        const inFlight = !!state.comboInFlight;

        for (let i = 0; i < state.slots.length; i++) {
            const k = state.slots[i];
            const el = state.elements[k];
            if (!el) continue;
            const card = buildCard(k, { size: 'lg', context: 'slot', slotIndex: i });
            if (inFlight) card.classList.add('shimmer');
            host.appendChild(card);
            if (i === 0) {
                const plus = document.createElement('span');
                plus.className = 'plus';
                plus.textContent = '+';
                plus.setAttribute('aria-hidden', 'true');
                host.appendChild(plus);
                if (state.slots.length < 2) {
                    const empty = document.createElement('div');
                    empty.className = 'card size-lg';
                    empty.style.opacity = '0.35';
                    empty.style.cursor = 'default';
                    empty.style.borderStyle = 'dashed';
                    const eEmoji = document.createElement('div');
                    eEmoji.className = 'emoji'; eEmoji.textContent = '➕';
                    const eName  = document.createElement('div');
                    eName.className = 'name'; eName.textContent = 'Drop another';
                    empty.appendChild(eEmoji); empty.appendChild(eName);
                    host.appendChild(empty);
                }
            }
        }

        // Per-attempt timing + path log (visible while in flight and after).
        // Format: "1: local 8.2s  ·  2: puter 14.1s rejected  ·  3: puter 9.5s ok"
        const showAttempts = (state.comboAttempts && state.comboAttempts.length)
            || (state.comboLastSummary && state.comboLastSummary.attempts.length);
        const list = state.comboInFlight
            ? state.comboAttempts
            : (state.comboLastSummary ? state.comboLastSummary.attempts : []);
        if (showAttempts && list.length) {
            const log = document.createElement('div');
            log.className = 'attempts-log';
            log.textContent = list.map(a => {
                const sec = (a.elapsedMs / 1000).toFixed(1);
                const status = a.ok ? 'ok' : (/rejected/.test(a.error || '') ? 'rejected' : 'err');
                return a.n + ': ' + (a.path || '?') + ' ' + sec + 's ' + status;
            }).join('  ·  ');
            actions.appendChild(log);
        }

        if (state.lastError) {
            const banner = document.createElement('div');
            banner.className = 'error-banner';
            const msg = document.createElement('span');
            msg.textContent = 'Couldn\'t combine these: ' + state.lastError;
            const grp = document.createElement('div');
            grp.style.display = 'flex'; grp.style.gap = '8px';
            const retry = document.createElement('button');
            retry.className = 'btn'; retry.type = 'button';
            retry.textContent = 'Retry';
            retry.addEventListener('click', () => {
                state.lastError = null;
                if (state.slots.length === 2) { renderWorkspace(); combineSlots(); }
                else renderWorkspace();
            });
            const clear = document.createElement('button');
            clear.className = 'btn'; clear.type = 'button';
            clear.textContent = 'Clear';
            clear.addEventListener('click', () => {
                state.lastError = null; state.slots = []; renderWorkspace();
            });
            grp.appendChild(retry); grp.appendChild(clear);
            banner.appendChild(msg); banner.appendChild(grp);
            actions.appendChild(banner);
        }
    }

    function renderHistory() {
        const host = document.getElementById('historyStrip');
        host.innerHTML = '';
        for (const k of state.history) {
            if (!state.elements[k]) continue;
            host.appendChild(buildCard(k, { size: 'sm', context: 'history' }));
        }
    }

    // ------------------------------------------------------------------
    // Magic "+" card: appears in the elements panel once the user has
    // accumulated POINTS_REVEAL_AT discoveries. Click -> small dialog asks
    // for a name, OK or Enter spends 3 points and the LLM generates the
    // emoji + description for that name.
    // ------------------------------------------------------------------
    function buildAddElementCard() {
        const card = document.createElement('div');
        card.className = 'card size-sm magic-add';
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        const e = document.createElement('div');
        e.className = 'emoji';
        e.textContent = '✨';
        const n = document.createElement('div');
        n.className = 'name';
        n.textContent = 'Add element';
        card.appendChild(e);
        card.appendChild(n);
        const onActivate = async () => {
            if ((state.points || 0) < 3) {
                showToast('Need 3 pts. Discover 3 more elements.');
                return;
            }
            const name = await promptForElementName();
            if (!name) return; // cancel: no points spent
            state.points -= 3;
            try { localStorage.setItem(LS_POINTS, String(state.points)); } catch (_) {}
            await createCustomElement(name);
        };
        card.addEventListener('click', onActivate);
        card.addEventListener('keydown', (ev) => {
            if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); onActivate(); }
        });
        return card;
    }

    function promptForElementName() {
        return new Promise((resolve) => {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            const dlg = document.createElement('div');
            dlg.className = 'modal-dialog';
            const h = document.createElement('h3');
            h.textContent = 'Conjure new element';
            const sub = document.createElement('p');
            sub.className = 'modal-sub';
            sub.textContent = 'Type a name. The emoji + description are AI-generated.';
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'modal-input';
            input.placeholder = 'e.g. Rainbow Cat';
            input.maxLength = 40;
            const row = document.createElement('div');
            row.className = 'modal-btns';
            const cancel = document.createElement('button');
            cancel.className = 'btn'; cancel.type = 'button'; cancel.textContent = 'Cancel';
            const ok = document.createElement('button');
            ok.className = 'btn primary'; ok.type = 'button'; ok.textContent = 'OK -3 pts';
            row.appendChild(cancel); row.appendChild(ok);
            dlg.appendChild(h); dlg.appendChild(sub); dlg.appendChild(input); dlg.appendChild(row);
            overlay.appendChild(dlg);
            document.body.appendChild(overlay);
            setTimeout(() => input.focus(), 50);
            const done = (val) => { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); resolve(val); };
            cancel.addEventListener('click', () => done(null));
            ok.addEventListener('click', () => done(input.value.trim() || null));
            input.addEventListener('keydown', (ev) => {
                if (ev.key === 'Enter') { ev.preventDefault(); done(input.value.trim() || null); }
                else if (ev.key === 'Escape') { ev.preventDefault(); done(null); }
            });
            overlay.addEventListener('click', (ev) => { if (ev.target === overlay) done(null); });
        });
    }

    async function createCustomElement(name) {
        // Same defensive prune as combineSlots: stale lazy-concat entries in
        // memory would otherwise lock taken emojis the LLM should be free to
        // reuse (e.g. 🪑 -> "Ash + Power Plant" blocking "man -> 🪑" or
        // "chair -> 🪑").
        if (pruneLazyLocalEntries() > 0) renderGrid();
        const userPrompt =
            'Create a NEW element named "' + name + '". Pick a single emoji that fits the name and is NOT already used for any element below. Reply ONLY with JSON {"name":"' + name + '","emoji":"<single emoji>","description":"<one short sentence>"}.\n' +
            'Already-used emojis (do NOT pick any of these): ' + buildUsedList().join(', ');
        state.comboInFlight = 'custom:' + name;
        state.comboAttempts = [];
        state.comboLastSummary = null;
        state.lastError = null;
        renderWorkspace();
        const t0 = performance.now();
        try {
            const got = await fetchTextGET(SYS_PROMPT, userPrompt, undefined, TEXT_TIMEOUT_MS);
            const elapsed = performance.now() - t0;
            state.comboAttempts.push({ n: 1, path: got.path, elapsedMs: elapsed, ok: true });
            const parsed = parseLooseJSON(got.content);
            const v = validateLLMResult(parsed);
            if (!v || !v.element) throw new Error((v && v.reason) || 'invalid result');
            const k = nameKey(v.element.name);
            if (state.elements[k]) throw new Error('Element "' + v.element.name + '" already exists');
            state.elements[k] = {
                name: v.element.name,
                emoji: v.element.emoji,
                description: v.element.description || '',
                parents: null,
                createdAt: Date.now(),
                discoveredBy: state.userId
            };
            state.history.unshift(k);
            if (state.history.length > 8) state.history.pop();
            state.comboInFlight = null;
            state.comboLastSummary = { attempts: state.comboAttempts.slice(), totalMs: elapsed };
            writeJSON(LS_ELEMENTS, state.elements);
            scheduleSyncPush();
            renderAll();
            showToast('Conjured: ' + v.element.name + ' ' + v.element.emoji, { isDiscovery: true });
        } catch (e) {
            state.comboInFlight = null;
            state.lastError = String(e && e.message || e);
            // Refund - the conjuring failed, the user shouldn't lose pts.
            state.points += 3;
            try { localStorage.setItem(LS_POINTS, String(state.points)); } catch (_) {}
            renderAll();
        }
    }

    // ------------------------------------------------------------------
    // Card builder
    // ------------------------------------------------------------------
    function buildCard(k, opts) {
        opts = opts || {};
        const el = state.elements[k];
        const size = opts.size || 'sm';
        const context = opts.context || 'grid';
        const card = document.createElement('div');
        card.className = 'card size-' + size;
        card.setAttribute('draggable', 'true');
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.dataset.elementKey = k;
        if (context === 'grid') card.dataset.gridCard = k;

        const emoji = document.createElement('div');
        emoji.className = 'emoji';
        emoji.textContent = el.emoji || '✨';
        const name = document.createElement('div');
        name.className = 'name';
        name.textContent = el.name;
        card.appendChild(emoji);
        card.appendChild(name);

        // Discoverer chip (skip starters)
        if (el.discoveredBy && el.discoveredBy !== 'starter') {
            const chip = document.createElement('div');
            chip.className = 'discoverer';
            const isMe = el.discoveredBy === state.userId;
            if (isMe) chip.classList.add('is-me');
            chip.textContent = initialsFor(el.discoveredBy);
            chip.title = isMe ? 'Discovered by you' : 'Discovered by ' + el.discoveredBy;
            card.appendChild(chip);
        }

        card.addEventListener('dragstart', (ev) => {
            dragSourceKey = k;
            try {
                ev.dataTransfer.setData('text/x-element-key', k);
                ev.dataTransfer.setData('text/plain', el.name);
            } catch (e) { /* swallow */ }
            ev.dataTransfer.effectAllowed = 'copy';
            card.classList.add('dragging');
        });
        card.addEventListener('dragend', () => {
            dragSourceKey = null;
            card.classList.remove('dragging');
        });

        card.addEventListener('click', (ev) => {
            ev.stopPropagation();
            if (context === 'slot') removeFromSlots(opts.slotIndex || 0);
            else placeIntoSlots(k);
        });
        // Explicit double-click: also places. Useful as an automation-friendly
        // alternative to drag-and-drop for tests, and produces a quick
        // self-combine when used on a grid card (slot 0 then slot 1).
        if (context === 'grid') {
            card.addEventListener('dblclick', (ev) => {
                ev.stopPropagation();
                placeIntoSlots(k);
            });
        }
        card.addEventListener('keydown', (ev) => {
            if (ev.key === 'Enter' || ev.key === ' ') {
                ev.preventDefault();
                if (context === 'slot') removeFromSlots(opts.slotIndex || 0);
                else placeIntoSlots(k);
            }
        });

        if (el.description) wireTooltip(card, el.description + (el.discoveredBy && el.discoveredBy !== 'starter' && el.discoveredBy !== state.userId ? '\nby ' + el.discoveredBy : ''));
        return card;
    }

    function initialsFor(uid) {
        // "anon-abc12d" -> "ab"
        const tail = String(uid).replace(/^anon-/, '');
        return (tail.slice(0, 2) || '??').toUpperCase();
    }

    // ------------------------------------------------------------------
    // Tooltip
    // ------------------------------------------------------------------
    function wireTooltip(target, text) {
        target.addEventListener('mouseenter', () => showTooltip(target, text));
        target.addEventListener('mouseleave', hideTooltip);
        target.addEventListener('focus', () => showTooltip(target, text));
        target.addEventListener('blur', hideTooltip);
        let pressTimer = null;
        target.addEventListener('touchstart', () => {
            pressTimer = setTimeout(() => showTooltip(target, text), 450);
        }, { passive: true });
        target.addEventListener('touchend', () => { clearTimeout(pressTimer); hideTooltip(); });
        target.addEventListener('touchmove', () => { clearTimeout(pressTimer); hideTooltip(); }, { passive: true });
    }
    function showTooltip(target, text) {
        const tip = document.getElementById('tooltip');
        tip.textContent = text;
        const rect = target.getBoundingClientRect();
        const tipW = 220;
        let left = rect.left + rect.width / 2 - tipW / 2;
        left = Math.max(8, Math.min(window.innerWidth - tipW - 8, left));
        const top = rect.bottom + 8;
        tip.style.left = left + 'px';
        tip.style.top = top + 'px';
        tip.style.maxWidth = tipW + 'px';
        tip.classList.add('is-visible');
        tip.setAttribute('aria-hidden', 'false');
    }
    function hideTooltip() {
        const tip = document.getElementById('tooltip');
        tip.classList.remove('is-visible');
        tip.setAttribute('aria-hidden', 'true');
    }

    // ------------------------------------------------------------------
    // Toasts
    // ------------------------------------------------------------------
    function showToast(text, opts) {
        opts = opts || {};
        const host = document.getElementById('toastHost');
        const t = document.createElement('div');
        t.className = 'toast' + (opts.isDiscovery ? ' is-discovery' : '') + (opts.isInfo ? ' is-info' : '');
        t.textContent = text;
        host.appendChild(t);
        setTimeout(() => { if (t.parentNode) t.parentNode.removeChild(t); }, 3100);
    }

    // ------------------------------------------------------------------
    // Shared discovery cache (JSONBlob) - read on boot, debounced PUT
    // ------------------------------------------------------------------
    async function initSync() {
        setSyncState('idle', 'Connecting…');
        if (!state.blobId) {
            // SHARED_BLOB_ID was the literal placeholder; bootstrap a fresh
            // blob so end users still get sync, and surface the new id.
            await bootstrapFreshBlob();
        }
        if (!state.blobId) {
            setSyncState('off', 'Offline');
            return;
        }
        try {
            await doRemoteRefresh();
            setSyncState('ok', 'Synced');
        } catch (err) {
            setSyncState('off', 'Offline');
            logEntry('error', { kind: 'sync.boot.get', blobId: state.blobId },
                     { message: String(err && err.message || err) });
        }
    }

    async function bootstrapFreshBlob() {
        const t0 = performance.now();
        try {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), SYNC_TIMEOUT_MS);
            const initial = JSON.stringify({ schema: 1, elements: {}, combos: {} });
            const resp = await relayFetch(JSONBLOB_BASE, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: initial,
                signal: ctrl.signal
            });
            clearTimeout(timer);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            // The server sets Location: /api/jsonBlob/{id} but a few CORS
            // setups strip it; also expose x-jsonblob-id. Try both.
            const loc = resp.headers.get('location') || resp.headers.get('Location');
            const direct = resp.headers.get('x-jsonblob-id');
            let id = direct;
            if (!id && loc) {
                const m = loc.match(/jsonBlob\/([^/?#]+)/i);
                if (m) id = m[1];
            }
            if (!id) throw new Error('Bootstrap: blob id missing in response headers');
            state.blobId = id;
            localStorage.setItem(LS_BLOB_ID, id);
            logEntry('sync', { kind: 'bootstrap.post' }, { blobId: id }, performance.now() - t0);
            renderBootstrapBanner(id);
        } catch (err) {
            logEntry('error', { kind: 'bootstrap.post' }, { message: String(err && err.message || err) },
                     performance.now() - t0);
        }
    }

    function renderBootstrapBanner(id) {
        const host = document.getElementById('bootstrapHost');
        host.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'bootstrap-banner';
        const row1 = document.createElement('div');
        row1.className = 'row';
        const msg = document.createElement('span');
        msg.innerHTML = 'Created a fresh shared cache. Replace <code>SHARED_BLOB_ID</code> in the source with this id and commit:';
        row1.appendChild(msg);
        const close = document.createElement('button');
        close.className = 'btn close';
        close.type = 'button';
        close.textContent = 'Dismiss';
        close.addEventListener('click', () => { host.innerHTML = ''; });
        row1.appendChild(close);

        const row2 = document.createElement('div');
        row2.className = 'row';
        const idEl = document.createElement('code');
        idEl.textContent = id;
        const copyBtn = document.createElement('button');
        copyBtn.className = 'btn';
        copyBtn.type = 'button';
        copyBtn.textContent = 'Copy id';
        copyBtn.addEventListener('click', async () => {
            let ok = false;
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(id);
                    ok = true;
                }
            } catch (e) { /* fallthrough */ }
            if (!ok) {
                const ta = document.createElement('textarea');
                ta.value = id;
                document.body.appendChild(ta); ta.select();
                try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
                document.body.removeChild(ta);
            }
            showToast(ok ? 'Blob id copied' : 'Copy failed', { isInfo: true });
        });
        row2.appendChild(idEl); row2.appendChild(copyBtn);
        div.appendChild(row1); div.appendChild(row2);
        host.appendChild(div);
    }

    async function doRemoteRefresh() {
        if (!state.blobId) throw new Error('No blob id');
        const t0 = performance.now();
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), SYNC_TIMEOUT_MS);
        try {
            const resp = await relayFetch(JSONBLOB_BASE + '/' + encodeURIComponent(state.blobId),
                { method: 'GET', headers: { 'Accept': 'application/json' }, signal: ctrl.signal });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const remote = await resp.json();
            mergeRemoteIntoLocal(remote, /*recordKnown*/ true);
            state.sync.lastSyncAt = Date.now();
            state.sync.backoffMs = SYNC_BACKOFF_BASE;
            renderAll();
            logEntry('sync', { kind: 'get', blobId: state.blobId },
                     { elements: Object.keys((remote && remote.elements) || {}).length,
                       combos: Object.keys((remote && remote.combos) || {}).length },
                     performance.now() - t0);
            return remote;
        } finally {
            clearTimeout(timer);
        }
    }

    function mergeRemoteIntoLocal(remote, recordKnown) {
        if (!remote || typeof remote !== 'object') return;
        const remoteEls = (remote.elements && typeof remote.elements === 'object') ? remote.elements : {};
        const remoteCombos = (remote.combos && typeof remote.combos === 'object') ? remote.combos : {};

        // On the boot fetch (recordKnown), prune local entries that came from
        // a previous seed snapshot but no longer exist in the current remote.
        // The user's own discoveries and other users' shared entries survive
        // because their discoveredBy is not 'seed'.
        if (recordKnown) {
            for (const k of Object.keys(state.elements)) {
                if (isStarter(k)) continue;
                const el = state.elements[k];
                if (el && el.discoveredBy === 'seed' && !remoteEls[k]) {
                    delete state.elements[k];
                }
            }
            // Drop combos that reference a now-missing element (orphaned
            // pointer or pair-key that includes a pruned name).
            for (const cKey of Object.keys(state.combos)) {
                const target = state.combos[cKey];
                const [a, b] = cKey.split('+');
                if (!state.elements[target] || !state.elements[a] || !state.elements[b]) {
                    delete state.combos[cKey];
                }
            }
        }

        // Elements: remote wins when conflict (its emoji is the canonical
        // one for that name). Local-only elements are kept. Lazy-concat
        // entries from remote get filtered out (some old clients without the
        // validator may still PUT them).
        for (const k of Object.keys(remoteEls)) {
            const r = remoteEls[k];
            if (!r || !r.name || !r.emoji) continue;
            if (isLazyConcatName(r.name, r.parents) || isBadEmoji(r.emoji)) continue;
            state.elements[k] = {
                name: r.name,
                emoji: r.emoji,
                description: r.description || '',
                parents: r.parents || null,
                createdAt: r.discoveredAt || r.createdAt || 0,
                discoveredBy: r.discoveredBy || 'unknown'
            };
            if (recordKnown) state.sync.knownRemoteNames.add(k);
        }
        // Combos: remote wins for known keys
        for (const cKey of Object.keys(remoteCombos)) {
            const target = remoteCombos[cKey];
            if (target && state.elements[target]) state.combos[cKey] = target;
        }
        writeJSON(LS_ELEMENTS, state.elements);
        writeJSON(LS_COMBOS, state.combos);
    }

    function buildLocalUploadPayload() {
        const elements = {};
        for (const k of Object.keys(state.elements)) {
            const el = state.elements[k];
            if (isStarter(k)) continue; // skip starters in remote payload
            elements[k] = {
                name: el.name,
                emoji: el.emoji,
                description: el.description || '',
                parents: el.parents || null,
                discoveredAt: el.createdAt || Date.now(),
                discoveredBy: el.discoveredBy || state.userId
            };
        }
        return { schema: 1, elements: elements, combos: { ...state.combos } };
    }

    function scheduleSyncPush() {
        state.sync.dirty = true;
        if (state.sync.state !== 'off') setSyncState('pending', 'Syncing…');
        if (state.sync.putTimer) return;
        state.sync.putTimer = setTimeout(() => {
            state.sync.putTimer = null;
            flushSyncNow();
        }, SYNC_DEBOUNCE_MS);
    }

    async function flushSyncNow() {
        if (!state.blobId) return;
        if (state.sync.putInFlight) return;
        if (!state.sync.dirty) return;
        state.sync.putInFlight = true;
        setSyncState('pending', 'Syncing…');
        const t0 = performance.now();
        try {
            // Read-modify-write: GET, merge remote into local, then PUT
            const remote = await doRemoteRefresh().catch((e) => {
                // Don't fail the whole flush if GET fails - we'll PUT what we have
                logEntry('error', { kind: 'sync.preput.get' }, { message: String(e && e.message || e) });
                return null;
            });
            const payload = buildLocalUploadPayload();
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), SYNC_TIMEOUT_MS);
            try {
                const resp = await relayFetch(JSONBLOB_BASE + '/' + encodeURIComponent(state.blobId), {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: ctrl.signal
                });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                state.sync.dirty = false;
                state.sync.lastSyncAt = Date.now();
                state.sync.backoffMs = SYNC_BACKOFF_BASE;
                setSyncState('ok', 'Synced');
                logEntry('sync', { kind: 'put', blobId: state.blobId,
                                   elements: Object.keys(payload.elements).length,
                                   combos: Object.keys(payload.combos).length },
                         { ok: true }, performance.now() - t0);
                // Mark all uploaded names as remote-known so future cache
                // hits don't fire "First Discovery!"
                for (const k of Object.keys(payload.elements)) state.sync.knownRemoteNames.add(k);
            } finally {
                clearTimeout(timer);
            }
        } catch (err) {
            logEntry('error', { kind: 'sync.put' },
                     { message: String(err && err.message || err) }, performance.now() - t0);
            setSyncState('off', 'Offline');
            // Backoff retry
            const retry = Math.min(state.sync.backoffMs, SYNC_BACKOFF_MAX_MS);
            state.sync.backoffMs = Math.min(state.sync.backoffMs * 2, SYNC_BACKOFF_MAX_MS);
            setTimeout(() => {
                if (state.sync.dirty) {
                    setSyncState('pending', 'Retrying…');
                    flushSyncNow();
                }
            }, retry);
        } finally {
            state.sync.putInFlight = false;
        }
    }

})();
</script>
