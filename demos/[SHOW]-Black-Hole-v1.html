<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Black Hole</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000000;
  }
  canvas {
    display: block;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

// Constants
const BLACK_HOLE_RADIUS = 1.5;
const PHOTON_SPHERE_RADIUS = BLACK_HOLE_RADIUS * 1.5;
const DISK_INNER_RADIUS = BLACK_HOLE_RADIUS * 2.6;
const DISK_OUTER_RADIUS = 14.0;
const DISK_THICKNESS = 3.0;
const DISK_TILT_ANGLE = Math.PI / 3;
const PARTICLE_COUNT = 4000;
const G = 0.15;
const BH_MASS = 250;

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Scene & camera
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000010, 0.0015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 4000);
camera.position.set(-10, 6, 10);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.04;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.2;
controls.minDistance = 5;
controls.maxDistance = 150;
controls.enablePan = false;
controls.target.set(0, 0, 0);

// ===== Event horizon =====
const horizonGeo = new THREE.SphereGeometry(BLACK_HOLE_RADIUS, 64, 32);
const horizonMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
const horizon = new THREE.Mesh(horizonGeo, horizonMat);
horizon.renderOrder = 0;
scene.add(horizon);

// ===== Photon ring =====
const photonRingGeo = new THREE.TorusGeometry(PHOTON_SPHERE_RADIUS, 0.04, 24, 256);
const photonRingMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0.0 }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    varying vec2 vUv;
    void main() {
      float pulse = 0.85 + 0.15 * sin(uTime * 1.5);
      vec3 col = vec3(1.0, 0.8, 0.4) * pulse;
      gl_FragColor = vec4(col, 0.25 * pulse);
    }
  `,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const photonRing = new THREE.Mesh(photonRingGeo, photonRingMat);
photonRing.rotation.x = DISK_TILT_ANGLE;
photonRing.renderOrder = 5;
scene.add(photonRing);

// ===== Accretion disk =====
const diskInner = DISK_INNER_RADIUS;
const diskOuter = DISK_OUTER_RADIUS;
const diskRadius = (diskInner + diskOuter) / 2;
const diskTube = (diskOuter - diskInner) / 2;
const diskGeo = new THREE.TorusGeometry(diskRadius, diskTube, 64, 512);

const diskVertex = `
  varying vec2 vUv;
  varying vec3 vWorldPos;
  varying vec3 vLocalPos;
  void main() {
    vUv = uv;
    vLocalPos = position;
    vec4 wp = modelMatrix * vec4(position, 1.0);
    vWorldPos = wp.xyz;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;

const diskFragment = `
  uniform float uTime;
  uniform float uInner;
  uniform float uOuter;
  uniform vec3 uCameraPos;
  varying vec2 vUv;
  varying vec3 vWorldPos;
  varying vec3 vLocalPos;

  float hash(vec2 p) {
    p = fract(p * vec2(443.8975, 397.2973));
    p += dot(p, p + 19.19);
    return fract(p.x * p.y);
  }

  float noise2(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    float a = hash(i);
    float b = hash(i + vec2(1.0, 0.0));
    float c = hash(i + vec2(0.0, 1.0));
    float d = hash(i + vec2(1.0, 1.0));
    vec2 u = f * f * (3.0 - 2.0 * f);
    return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
  }

  float ridged(vec2 p) {
    float n = noise2(p);
    float r = 1.0 - abs(n * 2.0 - 1.0);
    return pow(r, 2.2);
  }

  void main() {
    // Use world-space xz for radius/angle so the disk pattern is locked in disk space
    // vLocalPos.xy is the cross-section through the torus tube; we need ring-space coords
    // Convert vUv: u runs around the ring, v across the tube cross-section
    float ringAngle = vUv.x * 6.28318530718;
    float tubeAngle = vUv.y * 6.28318530718;

    // Approximate radial position across the disk: 0 = inner edge, 1 = outer edge
    // The cross-section radial offset blended with ring radius
    float t = (sin(tubeAngle) + 1.0) * 0.5; // 0..1 across tube radial direction (rough)
    float radius = mix(uInner, uOuter, vUv.y); // use v as radial fraction for color

    // For the swirl, use ring angle and time
    float orbitalSpeed = 1.0 / (radius * 0.3 + 1.0);
    float swirlAngle = ringAngle - uTime * orbitalSpeed * 2.0;

    // Sample multi-octave ridged noise in (angle, radius) space stretched
    vec2 p1 = vec2(swirlAngle * 5.0, radius * 0.8);
    vec2 p2 = vec2(swirlAngle * 12.0 + 5.3, radius * 1.6 + 1.2);
    vec2 p3 = vec2(swirlAngle * 24.0 - 2.1, radius * 3.2 - 0.7);

    float n = 0.0;
    n += ridged(p1) * 0.55;
    n += ridged(p2) * 0.30;
    n += ridged(p3) * 0.18;

    // Color ramp inner -> outer
    vec3 cHot = vec3(1.0, 1.0, 0.91);     // 0xffffe8
    vec3 cOrange = vec3(1.0, 0.667, 0.267); // 0xffaa44
    vec3 cRed = vec3(0.8, 0.2, 0.094);     // 0xcc3318
    vec3 cDeep = vec3(0.290, 0.047, 0.024); // 0x4a0c06

    float rt = clamp((radius - uInner) / (uOuter - uInner), 0.0, 1.0);
    vec3 col;
    if (rt < 0.33) {
      col = mix(cHot, cOrange, rt / 0.33);
    } else if (rt < 0.66) {
      col = mix(cOrange, cRed, (rt - 0.33) / 0.33);
    } else {
      col = mix(cRed, cDeep, (rt - 0.66) / 0.34);
    }

    // Inner rim highlight
    float rim = 1.0 - smoothstep(uInner, uInner + (uOuter - uInner) * 0.12, radius);
    col += rim * vec3(1.2, 0.9, 0.5) * 0.7;

    // Doppler beaming: world tangent vs view direction
    vec3 fromCenter = vec3(vWorldPos.x, 0.0, vWorldPos.z);
    float rxz = length(fromCenter) + 0.0001;
    // Tangent in world XZ around y axis (orbital direction)
    vec3 tangent = vec3(-fromCenter.z, 0.0, fromCenter.x) / rxz;
    vec3 viewDir = normalize(uCameraPos - vWorldPos);
    float doppler = dot(tangent, viewDir);
    float beam = clamp(1.0 + doppler * 0.5, 0.6, 1.5);
    col *= beam;

    // Density / alpha controlled by ridged noise and radial fade
    float density = pow(n, 1.4) * 1.2;
    float radialFade = smoothstep(uInner * 0.98, uInner * 1.05, radius) *
                       (1.0 - smoothstep(uOuter * 0.85, uOuter, radius));
    float alpha = clamp(density * radialFade, 0.0, 1.0);

    // Premultiplied alpha output
    col = col * alpha;
    gl_FragColor = vec4(col, alpha);
  }
`;

const diskMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0.0 },
    uInner: { value: DISK_INNER_RADIUS },
    uOuter: { value: DISK_OUTER_RADIUS },
    uCameraPos: { value: new THREE.Vector3() }
  },
  vertexShader: diskVertex,
  fragmentShader: diskFragment,
  transparent: true,
  depthWrite: false,
  blending: THREE.NormalBlending,
  premultipliedAlpha: true,
  side: THREE.DoubleSide
});

const disk = new THREE.Mesh(diskGeo, diskMat);
disk.rotation.x = DISK_TILT_ANGLE;
disk.renderOrder = 10;
scene.add(disk);

// ===== Particle accretion =====
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);
const sizes = new Float32Array(PARTICLE_COUNT);
const alphas = new Float32Array(PARTICLE_COUNT);
const velocities = new Float32Array(PARTICLE_COUNT * 3);
const states = new Int8Array(PARTICLE_COUNT); // 0 = alive, 1 = fading
const fadeFrames = new Int8Array(PARTICLE_COUNT);

function spawnParticle(i, freshTangent) {
  const angle = Math.random() * Math.PI * 2;
  const r = DISK_INNER_RADIUS + Math.random() * (DISK_OUTER_RADIUS - DISK_INNER_RADIUS);
  const yj = (Math.random() - 0.5) * DISK_THICKNESS * 0.3;
  const x = Math.cos(angle) * r;
  const z = Math.sin(angle) * r;

  positions[i * 3 + 0] = x;
  positions[i * 3 + 1] = yj;
  positions[i * 3 + 2] = z;

  const speed = Math.sqrt(G * BH_MASS / r) * 0.7;
  // tangential direction: perpendicular to radial in xz plane
  velocities[i * 3 + 0] = -Math.sin(angle) * speed;
  velocities[i * 3 + 1] = 0.0;
  velocities[i * 3 + 2] = Math.cos(angle) * speed;

  // color by radius
  const rt = (r - DISK_INNER_RADIUS) / (DISK_OUTER_RADIUS - DISK_INNER_RADIUS);
  let cr, cg, cb;
  if (rt < 0.4) {
    // yellow-white inner
    const k = rt / 0.4;
    cr = 1.0;
    cg = 1.0 - 0.15 * k;
    cb = 0.85 - 0.45 * k;
  } else if (rt < 0.8) {
    // orange-yellow mid
    const k = (rt - 0.4) / 0.4;
    cr = 1.0;
    cg = 0.85 - 0.35 * k;
    cb = 0.40 - 0.25 * k;
  } else {
    // deep orange outer
    const k = (rt - 0.8) / 0.2;
    cr = 1.0 - 0.1 * k;
    cg = 0.50 - 0.20 * k;
    cb = 0.15 - 0.05 * k;
  }
  colors[i * 3 + 0] = cr;
  colors[i * 3 + 1] = cg;
  colors[i * 3 + 2] = cb;

  sizes[i] = 1.0 + Math.random() * 1.5;
  alphas[i] = 1.0;
  states[i] = 0;
  fadeFrames[i] = 0;
}

for (let i = 0; i < PARTICLE_COUNT; i++) {
  spawnParticle(i);
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
particleGeo.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

const particleMat = new THREE.ShaderMaterial({
  uniforms: {
    uPixelRatio: { value: renderer.getPixelRatio() }
  },
  vertexShader: `
    attribute float size;
    attribute float alpha;
    varying vec3 vColor;
    varying float vAlpha;
    uniform float uPixelRatio;
    void main() {
      vColor = color;
      vAlpha = alpha;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      gl_Position = projectionMatrix * mvPosition;
      gl_PointSize = min(size * uPixelRatio * (300.0 / -mvPosition.z), 6.0);
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    varying float vAlpha;
    void main() {
      vec2 c = gl_PointCoord - vec2(0.5);
      float d = length(c);
      if (d > 0.5) discard;
      float soft = 1.0 - smoothstep(0.0, 0.5, d);
      gl_FragColor = vec4(vColor, soft * vAlpha);
    }
  `,
  vertexColors: true,
  transparent: true,
  depthWrite: false,
  depthTest: true,
  blending: THREE.AdditiveBlending
});

const particles = new THREE.Points(particleGeo, particleMat);
// Tilt particles to match disk plane
particles.rotation.x = DISK_TILT_ANGLE;
particles.renderOrder = 20;
scene.add(particles);

// Apply same tilt by transforming particle positions through the rotation? No: we set rotation on Points.
// Disk is tilted by rotation.x = pi/3, particles set the same. Their xz plane physics matches local frame.

// ===== Background starfield =====
const STAR_COUNT = 6000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(STAR_COUNT * 3);
const starCol = new Float32Array(STAR_COUNT * 3);
const starSizes = new Float32Array(STAR_COUNT);
for (let i = 0; i < STAR_COUNT; i++) {
  // uniform sphere distribution
  const u = Math.random();
  const v = Math.random();
  const theta = 2.0 * Math.PI * u;
  const phi = Math.acos(2.0 * v - 1.0);
  const r = 800 + Math.random() * 700;
  const sx = r * Math.sin(phi) * Math.cos(theta);
  const sy = r * Math.cos(phi);
  const sz = r * Math.sin(phi) * Math.sin(theta);
  starPos[i * 3 + 0] = sx;
  starPos[i * 3 + 1] = sy;
  starPos[i * 3 + 2] = sz;

  const tone = Math.random();
  if (tone < 0.7) {
    starCol[i * 3 + 0] = 1.0;
    starCol[i * 3 + 1] = 1.0;
    starCol[i * 3 + 2] = 1.0;
  } else if (tone < 0.85) {
    starCol[i * 3 + 0] = 0.75;
    starCol[i * 3 + 1] = 0.85;
    starCol[i * 3 + 2] = 1.0;
  } else {
    starCol[i * 3 + 0] = 1.0;
    starCol[i * 3 + 1] = 0.95;
    starCol[i * 3 + 2] = 0.75;
  }
  starSizes[i] = 1.0 + Math.random() * 1.0;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));
starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

const starMat = new THREE.ShaderMaterial({
  uniforms: {
    uPixelRatio: { value: renderer.getPixelRatio() }
  },
  vertexShader: `
    attribute float size;
    varying vec3 vColor;
    uniform float uPixelRatio;
    void main() {
      vColor = color;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      gl_Position = projectionMatrix * mvPosition;
      gl_PointSize = size * uPixelRatio;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    void main() {
      vec2 c = gl_PointCoord - vec2(0.5);
      float d = length(c);
      if (d > 0.5) discard;
      float soft = 1.0 - smoothstep(0.0, 0.5, d);
      gl_FragColor = vec4(vColor, soft);
    }
  `,
  vertexColors: true,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});

const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ===== Nebula skydome =====
const nebGeo = new THREE.SphereGeometry(2000, 64, 32);
const nebMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0.0 }
  },
  vertexShader: `
    varying vec3 vWorldPos;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform float uTime;
    varying vec3 vWorldPos;

    float hash(vec2 p) {
      p = fract(p * vec2(443.8975, 397.2973));
      p += dot(p, p + 19.19);
      return fract(p.x * p.y);
    }

    float vnoise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));
      vec2 u = f * f * (3.0 - 2.0 * f);
      return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
    }

    void main() {
      vec3 dir = normalize(vWorldPos);
      // map to 2D for noise
      vec2 uv = vec2(atan(dir.z, dir.x), asin(dir.y));

      float n = 0.0;
      n += vnoise(uv * 3.0) * 0.5;
      n += vnoise(uv * 7.0 + 1.3) * 0.25;
      n += vnoise(uv * 14.0 + 3.7) * 0.125;

      vec3 base = mix(vec3(0.02, 0.02, 0.06), vec3(0.06, 0.03, 0.10), n);
      base += vec3(0.01, 0.005, 0.02) * pow(n, 3.0) * 2.0;

      // sparkle stars
      float sp = step(0.9985, hash(dir.xy * 50.0));
      base += vec3(sp);

      gl_FragColor = vec4(base, 1.0);
    }
  `,
  side: THREE.BackSide,
  depthWrite: false
});
const nebula = new THREE.Mesh(nebGeo, nebMat);
scene.add(nebula);

// ===== Post-processing =====
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

// Lensing shader pass
const lensingShader = {
  uniforms: {
    tDiffuse: { value: null },
    blackHolePos: { value: new THREE.Vector2(0.5, 0.5) },
    aspect: { value: window.innerWidth / window.innerHeight },
    screenRadiusX: { value: 0.1 },
    lensingStrength: { value: 0.12 },
    baseRadius: { value: 0.3 },
    chromaticAberration: { value: 0.004 },
    ringRadius: { value: 0.12 },
    ringWidth: { value: 0.012 },
    ringIntensity: { value: 0.3 }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2 blackHolePos;
    uniform float aspect;
    uniform float screenRadiusX;
    uniform float lensingStrength;
    uniform float baseRadius;
    uniform float chromaticAberration;
    uniform float ringRadius;
    uniform float ringWidth;
    uniform float ringIntensity;
    varying vec2 vUv;

    void main() {
      vec2 toC = vUv - blackHolePos;
      // aspect-correct so the lens is circular in screen space
      toC.x *= aspect;
      float r = length(toC);

      // distortion magnitude: strong near the hole, falls off outside baseRadius
      float strength = (1.0 / (r * r + 0.002)) * smoothstep(baseRadius, 0.0, r) * lensingStrength;

      vec2 dir = (r > 0.00001) ? toC / r : vec2(0.0);
      // dir back to UV space (undo aspect)
      vec2 dirUv = vec2(dir.x / aspect, dir.y);

      vec2 offset = -dirUv * strength;

      // chromatic aberration: per-channel offset varies slightly
      vec2 ca = -dirUv * chromaticAberration * smoothstep(baseRadius * 1.2, 0.0, r);
      float rC = texture2D(tDiffuse, vUv + offset + ca).r;
      float gC = texture2D(tDiffuse, vUv + offset).g;
      float bC = texture2D(tDiffuse, vUv + offset - ca).b;
      vec3 col = vec3(rC, gC, bC);

      // photon ring highlight band
      float bandDist = abs(r - ringRadius);
      float band = exp(- (bandDist * bandDist) / (ringWidth * ringWidth + 0.000001));
      col += vec3(1.0, 0.85, 0.55) * band * ringIntensity;

      gl_FragColor = vec4(col, 1.0);
    }
  `
};
const lensingPass = new ShaderPass(lensingShader);
composer.addPass(lensingPass);

// Bloom
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.7, 0.5, 0.78);
composer.addPass(bloomPass);

// ===== Animation =====
const clock = new THREE.Clock();
const tmpVec3 = new THREE.Vector3();
const tmpVec3b = new THREE.Vector3();

function projectToUv(worldPos, target) {
  tmpVec3.copy(worldPos).project(camera);
  target.set(tmpVec3.x * 0.5 + 0.5, tmpVec3.y * 0.5 + 0.5);
}

function animate() {
  requestAnimationFrame(animate);

  const rawDt = clock.getDelta();
  const dt = Math.min(rawDt, 0.02);
  const elapsed = clock.elapsedTime;

  // Update shader times
  photonRingMat.uniforms.uTime.value = elapsed;
  diskMat.uniforms.uTime.value = elapsed;
  diskMat.uniforms.uCameraPos.value.copy(camera.position);
  nebMat.uniforms.uTime.value = elapsed;

  // Lensing uniforms
  // Project black hole origin (0,0,0) and a point at world (BLACK_HOLE_RADIUS,0,0) for screen radius
  const bhWorld = tmpVec3b.set(0, 0, 0);
  const bhUv = new THREE.Vector2();
  projectToUv(bhWorld, bhUv);

  const edgeWorld = tmpVec3b.set(BLACK_HOLE_RADIUS, 0, 0);
  const edgeUv = new THREE.Vector2();
  projectToUv(edgeWorld, edgeUv);

  const aspect = window.innerWidth / window.innerHeight;
  // measure aspect-corrected screen distance
  const dx = (edgeUv.x - bhUv.x) * aspect;
  const dy = (edgeUv.y - bhUv.y);
  const screenRadiusX = Math.max(0.01, Math.sqrt(dx * dx + dy * dy));

  lensingPass.uniforms.blackHolePos.value.copy(bhUv);
  lensingPass.uniforms.aspect.value = aspect;
  lensingPass.uniforms.screenRadiusX.value = screenRadiusX;
  lensingPass.uniforms.baseRadius.value = Math.min(0.3, screenRadiusX * 1.0);
  lensingPass.uniforms.ringRadius.value = screenRadiusX * 1.2;
  lensingPass.uniforms.ringWidth.value = Math.max(0.003, screenRadiusX * 0.1);

  // Particle physics in disk-local frame (xz plane, y is thickness)
  const posAttr = particleGeo.attributes.position;
  const alphaAttr = particleGeo.attributes.alpha;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const ix = i * 3;
    let x = positions[ix + 0];
    let y = positions[ix + 1];
    let z = positions[ix + 2];

    const r = Math.sqrt(x * x + z * z) + 0.0001;

    if (states[i] === 1) {
      // fading
      fadeFrames[i] += 1;
      alphas[i] = Math.max(0.0, 1.0 - fadeFrames[i] / 10.0);
      if (fadeFrames[i] >= 10) {
        // respawn at outer edge
        const ang = Math.random() * Math.PI * 2;
        const rr = DISK_OUTER_RADIUS - Math.random() * 1.5;
        const yj = (Math.random() - 0.5) * DISK_THICKNESS * 0.3;
        positions[ix + 0] = Math.cos(ang) * rr;
        positions[ix + 1] = yj;
        positions[ix + 2] = Math.sin(ang) * rr;
        const speed = Math.sqrt(G * BH_MASS / rr) * 0.7;
        velocities[ix + 0] = -Math.sin(ang) * speed;
        velocities[ix + 1] = 0.0;
        velocities[ix + 2] = Math.cos(ang) * speed;
        alphas[i] = 1.0;
        states[i] = 0;
        fadeFrames[i] = 0;
      }
      alphaAttr.needsUpdate = true;
      continue;
    }

    // gravitational acceleration toward origin in xz plane
    let acc = -G * BH_MASS / (r * r);
    // near-horizon boost
    if (r < BLACK_HOLE_RADIUS * 3.0) {
      const boost = 1.0 + 4.0 * smoothstep(BLACK_HOLE_RADIUS * 3.0, BLACK_HOLE_RADIUS * 1.05, r);
      acc *= boost;
    }
    const ax = acc * (x / r);
    const az = acc * (z / r);

    let vx = velocities[ix + 0];
    let vy = velocities[ix + 1];
    let vz = velocities[ix + 2];

    vx += ax * dt;
    vz += az * dt;
    // mild drag
    vx *= 0.997;
    vz *= 0.997;

    x += vx * dt;
    y += vy * dt;
    z += vz * dt;

    velocities[ix + 0] = vx;
    velocities[ix + 1] = vy;
    velocities[ix + 2] = vz;

    positions[ix + 0] = x;
    positions[ix + 1] = y;
    positions[ix + 2] = z;

    const newR = Math.sqrt(x * x + z * z);
    if (newR < BLACK_HOLE_RADIUS * 1.05) {
      states[i] = 1;
      fadeFrames[i] = 0;
    }
  }
  posAttr.needsUpdate = true;
  alphaAttr.needsUpdate = true;

  // star rotation
  stars.rotation.y += dt * 0.005;

  controls.update();
  composer.render();
}

function smoothstep(edge0, edge1, x) {
  const t = Math.max(0.0, Math.min(1.0, (x - edge0) / (edge1 - edge0)));
  return t * t * (3.0 - 2.0 * t);
}

// ===== Resize =====
function onResize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bloomPass.setSize(w, h);
  lensingPass.uniforms.aspect.value = w / h;
}
window.addEventListener('resize', onResize);

animate();
</script>
