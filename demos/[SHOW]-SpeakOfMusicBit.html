const typ = ['effet', 'melodie', 'percu', 'voix'];
const pos = [{x:25,y:355},{x:106,y:436},{x:186,y:355},{x:25,y:520},{x:187,y:520}];

function setSprite(e, key) {
  const p = spritePos[key];
  e.style.backgroundPosition = `-${p.x}px -${p.y}px`;
}

function init() {
  const c = document.getElementById('I');
  for (let t = 0; t < 4; t++) {
    for (let i = 0; i < 5; i++) {
      const e = document.createElement('div');
      const iconNum = t * 5 + (i + 1);
      e.className = 'i';
      e.dataset.t = typ[t];
      e.dataset.c = i + 1;
      e.dataset.n = iconNum;
      e.dataset.sx = pos[i].x + t * 250;
      e.dataset.sy = pos[i].y;
      setSprite(e, 'icon_' + iconNum);
      e.style.left = e.dataset.sx + 'px';
      e.style.top = e.dataset.sy + 'px';
      e.as = null;
      e.on = false;
      e.pa = false;
      D(e);
      c.appendChild(e);
      ins.push(e);
    }
  }
}

let drag = null, ox = 0, oy = 0, sc = 1;

function mv(px, py) {
  if (!drag) return;
  const c = document.getElementById('c');
  const rect = c.getBoundingClientRect();
  // Convert page coords to viewport coords first
  const cx = px - window.scrollX;
  const cy = py - window.scrollY;
  // Convert screen coords to container coords (accounting for scale)
  const currentScale = rect.width / 1020;
  let x = (cx - rect.left) / currentScale - ox;
  let y = (cy - rect.top) / currentScale - oy;
  if (y < 65 || y > 570 || x < 0 || x > 980) { X(drag); drag = null; return; }
  drag.style.left = x + 'px';
  drag.style.top = y + 'px';
  if (y > 100 && y < 300) { if (!drag.on) A(drag); } else { if (drag.on) O(drag); }
}

function up() {
  if (!drag) return;
  setSprite(drag, 'icon_' + drag.dataset.n);
  drag.style.zIndex = '';
  drag = null;
}

document.addEventListener('mousemove', v => mv(v.pageX, v.pageY));
document.addEventListener('mouseup', up);
document.addEventListener('touchmove', v => {
  if (drag) {
    v.preventDefault();
    const t = v.touches[0];
    // Use pageX/pageY for touch to handle scroll offset
    mv(t.pageX, t.pageY);
  }
}, {passive: false});
document.addEventListener('touchend', up);
document.addEventListener('touchcancel', up);

function D(e) {
  let lpTimer = null;
  function start(px, py) {
    drag = e;
    // Get current element position in container coords
    const c = document.getElementById('c');
    const cRect = c.getBoundingClientRect();
    const currentScale = cRect.width / 1020;
    // Convert page coords to viewport coords
    const cx = px - window.scrollX;
    const cy = py - window.scrollY;
    // Calculate where click is relative to container
    const clickX = (cx - cRect.left) / currentScale;
    const clickY = (cy - cRect.top) / currentScale;
    // Current element position
    const elX = parseFloat(e.style.left);
    const elY = parseFloat(e.style.top);
    // Offset is difference between click and element top-left
    ox = clickX - elX;
    oy = clickY - elY;
    setSprite(e, 'selected_' + e.dataset.n);
    e.style.zIndex = 1000;
  }
  e.addEventListener('mousedown', v => {
    if (v.button === 2) { X(e); return; }
    v.preventDefault();
    start(v.pageX, v.pageY);
  });
  e.addEventListener('touchstart', v => {
    v.preventDefault();
    const t = v.touches[0];
    start(t.pageX, t.pageY);
    lpTimer = setTimeout(() => { X(e); drag = null; }, 500);
  }, {passive: false});
  e.addEventListener('touchmove', () => { if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } });
  e.addEventListener('touchend', () => { if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } });
  e.oncontextmenu = v => v.preventDefault();
  e.ondragstart = () => false;
}

// Play audio sprite section with looping
function A(e) {
  if (e.on || !audioBuffer) return;
  const key = e.dataset.t + '_' + e.dataset.c;
  const info = audioMap[key];
  if (!info) return;

  const source = ctx.createBufferSource();
  source.buffer = audioBuffer;
  source.loop = true;
  source.loopStart = info.start / 1000;
  source.loopEnd = (info.start + info.dur) / 1000;
  source.connect(ctx.destination);
  source.start(0, info.start / 1000);

  e.as = source;
  e.on = true;
  e.pa = false;
  e.classList.add('on');
}

function O(e) {
  if (e.as) { e.as.stop(); e.as = null; }
  e.on = false;
  e.classList.remove('on');
}

function X(e) {
  O(e);
  e.style.left = e.dataset.sx + 'px';
  e.style.top = e.dataset.sy + 'px';
  setSprite(e, 'icon_' + e.dataset.n);
  e.pa = false;
}

function R() { ins.forEach(X); }
function S() { ins.forEach(e => { if (e.on) { O(e); e.pa = true; } }); }
function P() { ins.forEach(e => { const y = parseInt(e.style.top); if (e.pa && y > 100 && y < 300) A(e); }); }

// Auto-orchestrator
let autoMode = false;
let autoInterval = null;
let activeAuto = []; // currently playing instruments in auto mode

// Generate truly random combo - 1 from each category for balance
function randomCombo() {
  const count = 2 + Math.floor(Math.random() * 4); // 2-5 instruments
  const picks = [];
  const cats = [0, 1, 2, 3]; // effet, melodie, percu, voix

  // Shuffle categories
  for (let i = cats.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cats[i], cats[j]] = [cats[j], cats[i]];
  }

  // Pick random instrument from each category until we have enough
  for (let i = 0; i < count; i++) {
    const cat = cats[i % 4]; // cycle through shuffled categories
    const variant = Math.floor(Math.random() * 5); // 0-4 within category
    const idx = cat * 5 + variant;
    if (!picks.includes(idx)) picks.push(idx);
  }

  return picks;
}

function placeInZone(e) {
  // Animate instrument moving to play zone
  const targetY = 150 + Math.random() * 80; // random y in zone
  const targetX = 100 + Math.random() * 800; // random x spread
  e.style.transition = 'left 0.5s ease-out, top 0.5s ease-out';
  e.style.left = targetX + 'px';
  e.style.top = targetY + 'px';
  setSprite(e, 'selected_' + e.dataset.n);
  setTimeout(() => {
    e.style.transition = '';
    A(e);
  }, 500);
}

function returnToStart(e) {
  e.style.transition = 'left 0.4s ease-in, top 0.4s ease-in';
  O(e);
  e.style.left = e.dataset.sx + 'px';
  e.style.top = e.dataset.sy + 'px';
  setSprite(e, 'icon_' + e.dataset.n);
  setTimeout(() => { e.style.transition = ''; }, 400);
}

// Get category (0-3) from instrument index
function getCat(e) { return Math.floor(parseInt(e.dataset.n - 1) / 5); }

// Get categories currently active
function getActiveCats() {
  return [...new Set(activeAuto.map(getCat))];
}

// Pick random instrument from a specific category (0-3)
function pickFromCat(cat, exclude = []) {
  const catIns = ins.filter(e => getCat(e) === cat && !exclude.includes(e));
  return catIns.length > 0 ? catIns[Math.floor(Math.random() * catIns.length)] : null;
}

function smartCombo() {
  return [
    Math.floor(Math.random() * 5),        // effet 0-4
    5 + Math.floor(Math.random() * 5),    // melodie 5-9
    10 + Math.floor(Math.random() * 5),   // percu 10-14
    15 + Math.floor(Math.random() * 5),   // voix 15-19
  ];
}

function autoSwitch() {
  const action = Math.random();
  const activeCats = getActiveCats();

  if (activeAuto.length === 0) {
    // JACKPOT chance (20%) - use a golden combo pool
    if (Math.random() < 0.20) {
      const pool = goldenCombos[Math.floor(Math.random() * goldenCombos.length)];
      // Pick 3-4, one from each category from the pool
      const cats = [0, 1, 2, 3].sort(() => Math.random() - 0.5);
      const count = 3 + Math.floor(Math.random() * 2);
      for (let i = 0; i < count; i++) {
        const cat = cats[i];
        // Find instruments from this category in the pool
        const catOptions = pool.filter(idx => Math.floor(idx / 5) === cat);
        if (catOptions.length > 0) {
          const pickIdx = catOptions[Math.floor(Math.random() * catOptions.length)];
          const pick = ins[pickIdx];
          activeAuto.push(pick);
          setTimeout(() => placeInZone(pick), i * 200);
        }
      }
    } else {
      // Smart random - one per category
      const combo = smartCombo();
      const count = 3 + Math.floor(Math.random() * 2);
      const shuffled = [...combo].sort(() => Math.random() - 0.5).slice(0, count);
      shuffled.forEach((idx, i) => {
        const pick = ins[idx];
        activeAuto.push(pick);
        setTimeout(() => placeInZone(pick), i * 200);
      });
    }
  } else if (action < 0.6) {
    // SWAP (common): replace one with another from SAME category
    const idx = Math.floor(Math.random() * activeAuto.length);
    const old = activeAuto[idx];
    const cat = getCat(old);
    const newPick = pickFromCat(cat, activeAuto);
    if (newPick) {
      returnToStart(old);
      activeAuto[idx] = newPick;
      setTimeout(() => placeInZone(newPick), 300);
    }
  } else if (activeCats.length < 4 && action < 0.85) {
    // ADD from UNUSED category (more common now)
    const unusedCats = [0, 1, 2, 3].filter(c => !activeCats.includes(c));
    if (unusedCats.length > 0) {
      const cat = unusedCats[Math.floor(Math.random() * unusedCats.length)];
      const pick = pickFromCat(cat, activeAuto);
      if (pick) {
        activeAuto.push(pick);
        placeInZone(pick);
      }
    }
  } else if (activeAuto.length > 3) {
    // REMOVE (rare, keep at least 3)
    const idx = Math.floor(Math.random() * activeAuto.length);
    const removed = activeAuto.splice(idx, 1)[0];
    returnToStart(removed);
  }
}

function toggleAuto() {
  const btn = document.getElementById('a');
  if (autoMode) {
    stopAuto();
  } else {
    autoMode = true;
    btn.classList.add('active');
    btn.textContent = 'STOP';
    ctx.resume();
    autoSwitch();
    // Random interval 3-8s for organic feel
    function scheduleNext() {
      const delay = 3000 + Math.random() * 5000;
      autoInterval = setTimeout(() => {
        if (autoMode) { autoSwitch(); scheduleNext(); }
      }, delay);
    }
    scheduleNext();
  }
}

function stopAuto() {
  autoMode = false;
  const btn = document.getElementById('a');
  btn.classList.remove('active');
  btn.textContent = 'RND';
  if (autoInterval) { clearTimeout(autoInterval); autoInterval = null; }
  activeAuto.forEach(returnToStart);
  activeAuto = [];
}

// Responsive scaling - fit to screen
function resize() {
  const c = document.getElementById('c');
  // Use documentElement for more reliable dimensions
  const vw = document.documentElement.clientWidth || window.innerWidth;
  const vh = document.documentElement.clientHeight || window.innerHeight;
  // Scale to fit whichever dimension is smaller relative to 1020x600
  const scaleX = vw / 1020;
  const scaleY = vh / 600;
  sc = Math.min(scaleX, scaleY);
  // Allow scale up to 1.5 for very large screens, but always fit
  sc = Math.min(sc, 1.5);
  c.style.transform = `scale(${sc})`;
  // Center the container
  const scaledW = 1020 * sc;
  const scaledH = 600 * sc;
  c.style.left = Math.max(0, (vw - scaledW) / 2) + 'px';
  c.style.top = Math.max(0, (vh - scaledH) / 2) + 'px';
}
window.addEventListener('resize', resize);
window.addEventListener('load', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 150));
// Run multiple times to catch late layout
resize();
setTimeout(resize, 100);
setTimeout(resize, 500);
</script>
