<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Local LLM prompt tester</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a22;
    --panel-2: #1b212c;
    --border: #242b38;
    --text: #d6dae3;
    --muted: #8b94a7;
    --accent: #9cdcfe;
    --accent-2: #c586c0;
    --ok: #6ec07a;
    --warn: #d7ba7d;
    --err: #f48771;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 14px;
  }
  body {
    display: grid;
    grid-template-columns: minmax(320px, 1fr) minmax(320px, 1fr);
    grid-template-rows: 1fr;
    height: 100vh;
    gap: 1px;
    background: var(--border);
  }
  .pane {
    background: var(--panel);
    display: flex;
    flex-direction: column;
    min-height: 0;
    min-width: 0;
  }
  .pane-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--panel-2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .pane-header h1 {
    font-size: 13px;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.02em;
  }
  .pane-header .meta { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .pane-body {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 12px 14px 0;
  }
  .field > label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  textarea {
    width: 100%;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: "JetBrains Mono", "SF Mono", Consolas, monospace;
    font-size: 12.5px;
    line-height: 1.45;
    padding: 8px 10px;
    resize: vertical;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  .system { min-height: 60px; }
  .user { min-height: 220px; flex: 1 1 auto; }
  .params {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px 12px;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: var(--panel-2);
  }
  .params label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .params input[type=number] {
    width: 80px;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 6px;
    font-family: inherit;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .actions {
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: var(--panel-2);
  }
  button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  button.primary {
    background: var(--accent);
    color: #0a0d11;
    border-color: var(--accent);
    font-weight: 600;
  }
  button.primary:hover:not(:disabled) { background: #b3e1ff; }
  button:hover:not(:disabled) { background: var(--panel-2); border-color: var(--accent); }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  .response {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .response::-webkit-scrollbar { width: 8px; }
  .response::-webkit-scrollbar-track { background: var(--panel); }
  .response::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .block {
    border: 1px solid var(--border);
    border-left-width: 3px;
    border-radius: 4px;
    background: var(--panel-2);
    padding: 8px 10px;
  }
  .block.cleaned { border-left-color: var(--ok); }
  .block.raw { border-left-color: var(--accent-2); }
  .block.thinking { border-left-color: var(--accent); }
  .block.system { border-left-color: var(--muted); }
  .block.error { border-left-color: var(--err); background: rgba(244,135,113,0.06); }
  .block .label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .block.cleaned .label { color: var(--ok); }
  .block.raw .label { color: var(--accent-2); }
  .block.thinking .label { color: var(--accent); }
  .block.error .label { color: var(--err); }
  .block .body {
    font-family: "JetBrains Mono", "SF Mono", Consolas, monospace;
    font-size: 12.5px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .loader {
    margin: 14px;
    padding: 14px;
    border: 1px dashed var(--border);
    border-radius: 4px;
    background: var(--panel-2);
    color: var(--muted);
    font-size: 12px;
  }
  .loader.hidden { display: none; }
  .loader .progress { margin-top: 8px; height: 4px; background: var(--panel); border-radius: 2px; overflow: hidden; }
  .loader .bar { height: 100%; width: 0%; background: var(--accent); transition: width 0.2s ease; }
  .status { font-size: 11px; color: var(--muted); }
  .status.ok { color: var(--ok); }
  .status.warn { color: var(--warn); }
  .status.err { color: var(--err); }
  @media (max-width: 760px) {
    body { grid-template-columns: 1fr; grid-template-rows: minmax(40vh, 1fr) minmax(40vh, 1fr); }
  }
</style>
</head>
<body>
<section class="pane">
  <header class="pane-header">
    <h1>Prompt</h1>
    <div class="meta">model: <span id="model-name">-</span></div>
  </header>
  <div class="pane-body">
    <div class="field">
      <label for="system-input">System</label>
      <textarea id="system-input" class="system">Snake game on 6x6 grid. H = snake head, - = horizontal body segment, | = vertical body segment, F = food, X = empty cell. Columns 0-5 left to right, rows 0-5 top to bottom. UP decreases row, DOWN increases row, LEFT decreases column, RIGHT increases column. Pick the direction that reduces distance from head to food without hitting a wall. Reply with one word only.</textarea>
    </div>
    <div class="field" style="flex:1 1 auto; min-height:0; padding-bottom:0;">
      <label for="user-input">User</label>
      <textarea id="user-input" class="user">Head at col 3 row 0 (TOP WALL). Food at col 2 row 0 (1 LEFT, same row).
    0 1 2 3 4 5
 0  X X F H X X
 1  X X X X X X
 2  X X X X X X
 3  X X X X X X
 4  X X X X X X
 5  X X X X X X
Avoid your own body (- or |) and the outer walls. Think step by step, then pick the direction so H moves toward the food (F). Answer with exactly one word: UP, DOWN, LEFT, or RIGHT.</textarea>
    </div>
    <div class="params">
      <label>temperature <input type="number" id="p-temp" value="1.0" step="0.1" min="0" max="2"></label>
      <label>top_p <input type="number" id="p-top-p" value="0.95" step="0.05" min="0" max="1"></label>
      <label>top_k <input type="number" id="p-top-k" value="20" step="1" min="0" max="100"></label>
      <label>presence_penalty <input type="number" id="p-pres" value="1.5" step="0.1" min="0" max="2"></label>
      <label>max_tokens <input type="number" id="p-max" value="4096" step="256" min="1" max="32768"></label>
      <label>seed (blank=random) <input type="number" id="p-seed" value="" step="1"></label>
    </div>
    <div class="actions">
      <button id="send-btn" class="primary" disabled>Send</button>
      <button id="reset-btn">Reset prompt</button>
      <button id="clear-btn">Clear response</button>
      <span class="status" id="send-status"></span>
    </div>
  </div>
</section>

<section class="pane">
  <header class="pane-header">
    <h1>Response</h1>
    <div class="meta">
      <span id="latency">latency: -</span> &middot;
      <span id="token-count">-</span>
    </div>
  </header>
  <div class="pane-body">
    <div class="loader" id="loader">
      <div id="loader-text">Initializing local model. First load downloads weights to your browser cache (one-time, may take 30-60s if not already cached from the snake demo).</div>
      <div class="progress"><div class="bar" id="loader-bar"></div></div>
    </div>
    <div class="response" id="response"></div>
  </div>
</section>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";

const MODEL_ID = "Qwen3.5-2B-q4f16_1-MLC";
document.getElementById('model-name').textContent = MODEL_ID;

const DEFAULT_SYSTEM = document.getElementById('system-input').value;
const DEFAULT_USER = document.getElementById('user-input').value;

const loader = document.getElementById('loader');
const loaderText = document.getElementById('loader-text');
const loaderBar = document.getElementById('loader-bar');
const sendBtn = document.getElementById('send-btn');
const resetBtn = document.getElementById('reset-btn');
const clearBtn = document.getElementById('clear-btn');
const sendStatus = document.getElementById('send-status');
const response = document.getElementById('response');
const latencyEl = document.getElementById('latency');
const tokenEl = document.getElementById('token-count');

let engine = null;
let busy = false;

function setStatus(msg, kind) {
  sendStatus.textContent = msg || '';
  sendStatus.className = 'status' + (kind ? ' ' + kind : '');
}

function appendBlock(label, text, kind) {
  const wrap = document.createElement('div');
  wrap.className = 'block ' + (kind || '');
  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = label;
  const body = document.createElement('div');
  body.className = 'body';
  body.textContent = text;
  wrap.append(lbl, body);
  response.appendChild(wrap);
  response.scrollTop = response.scrollHeight;
}

function splitThinkAndAnswer(raw) {
  const closed = raw.match(/<think>([\s\S]*?)<\/think>([\s\S]*)$/);
  if (closed) return { think: closed[1].trim(), answer: closed[2].trim() };
  const openOnly = raw.match(/<think>([\s\S]*)$/);
  if (openOnly) return { think: openOnly[1].trim(), answer: '' };
  return { think: '', answer: raw.trim() };
}

async function init() {
  try {
    engine = await webllm.CreateMLCEngine(MODEL_ID, {
      initProgressCallback: (report) => {
        const pct = Math.max(0, Math.min(100, Math.round((report.progress || 0) * 100)));
        loaderBar.style.width = pct + '%';
        loaderText.textContent = report.text || ('Loading ' + pct + '%');
      },
    });
    loader.classList.add('hidden');
    sendBtn.disabled = false;
    setStatus('model ready', 'ok');
  } catch (err) {
    loader.classList.remove('hidden');
    loaderText.textContent = 'Init failed: ' + (err && err.message ? err.message : String(err));
    setStatus('init failed', 'err');
  }
}

async function send() {
  if (busy || !engine) return;
  busy = true;
  sendBtn.disabled = true;
  setStatus('inferring...', 'warn');
  const sys = document.getElementById('system-input').value;
  const usr = document.getElementById('user-input').value;
  const temp = parseFloat(document.getElementById('p-temp').value) || 0;
  const topP = parseFloat(document.getElementById('p-top-p').value) || 1;
  const topK = parseInt(document.getElementById('p-top-k').value, 10) || 0;
  const presPen = parseFloat(document.getElementById('p-pres').value) || 0;
  const maxTok = parseInt(document.getElementById('p-max').value, 10) || 1024;
  const seedRaw = document.getElementById('p-seed').value;
  const seed = seedRaw === '' ? undefined : parseInt(seedRaw, 10);

  appendBlock('System', sys, 'system');
  appendBlock('User', usr, 'system');

  const opts = { messages: [], max_tokens: maxTok, temperature: temp, top_p: topP, presence_penalty: presPen };
  if (sys.trim()) opts.messages.push({ role: 'system', content: sys });
  opts.messages.push({ role: 'user', content: usr });
  if (topK > 0) opts.top_k = topK;
  if (seed !== undefined && !Number.isNaN(seed)) opts.seed = seed;

  const t0 = performance.now();
  try {
    const out = await engine.chat.completions.create(opts);
    const dt = Math.round(performance.now() - t0);
    const raw = out?.choices?.[0]?.message?.content || '';
    const usage = out?.usage || {};
    const { think, answer } = splitThinkAndAnswer(raw);
    if (think) appendBlock('Reasoning (<think>)', think, 'thinking');
    appendBlock('Answer (cleaned)', answer || '(empty - model only emitted reasoning)', 'cleaned');
    appendBlock('Raw response', raw, 'raw');
    latencyEl.textContent = 'latency: ' + dt + ' ms';
    tokenEl.textContent = (usage.prompt_tokens || '?') + ' prompt, ' + (usage.completion_tokens || '?') + ' completion';
    setStatus('done', 'ok');
  } catch (err) {
    appendBlock('Error', String(err && err.message ? err.message : err), 'error');
    setStatus('error', 'err');
  } finally {
    busy = false;
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener('click', send);
resetBtn.addEventListener('click', () => {
  document.getElementById('system-input').value = DEFAULT_SYSTEM;
  document.getElementById('user-input').value = DEFAULT_USER;
});
clearBtn.addEventListener('click', () => { response.innerHTML = ''; latencyEl.textContent = 'latency: -'; tokenEl.textContent = '-'; });
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); send(); }
});

init();
</script>
</body>
</html>
