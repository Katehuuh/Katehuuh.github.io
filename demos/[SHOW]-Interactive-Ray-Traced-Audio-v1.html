<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Interactive Ray-Traced Audio Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
:root {
  --bg: #1a1a1a;
  --fg: #cccccc;
  --muted: #8a8a8a;
  --accent: #00ffff;
  --panel: #121212;
  --border: #2b2b2b;
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: 'Noto Sans', system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, sans-serif;
}

.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
  padding: 0;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 5;
  display: flex;
  flex-wrap: wrap; /* allow two-line layout */
  gap: 6px 8px;
  align-items: center;
  padding: 6px 10px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}
.topbar .spacer { flex: 1; }

.header, .controls { display: none; }

.section {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.section.row {
  flex-direction: row;
  align-items: center;
  gap: 12px;
}

select, input[type="range"], button {
  width: 100%;
}

select, button {
  background: #0e0e0e;
  color: var(--fg);
  border: 1px solid var(--border);
  padding: 10px 12px;
  border-radius: 8px;
  outline: none;
}

button {
  cursor: pointer;
  transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
}
button:hover {
  background: #111;
  border-color: #3a3a3a;
  box-shadow: 0 0 0 2px rgba(0,255,255,0.08) inset;
}
button.primary {
  background: #2552ff; /* brighter for visibility */
  border-color: #4a6fff;
  color: #ffffff;
}
button.primary:hover {
  border-color: #218c8c;
}

input[type="range"] {
  appearance: none;
  height: 6px;
  background: #0e0e0e;
  border: 1px solid var(--border);
  border-radius: 999px;
}
input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  width: 16px; height: 16px;
  background: var(--accent);
  border-radius: 50%;
  border: none;
}
input[type="range"]::-moz-range-thumb {
  width: 16px; height: 16px;
  background: var(--accent);
  border-radius: 50%;
  border: none;
}

.toggle {
  position: relative;
  width: 48px;
  height: 28px;
}
.toggle input { display: none; }
.toggle .slider {
  position: absolute; inset: 0;
  background: #0e0e0e;
  border: 1px solid var(--border);
  border-radius: 999px;
}
.toggle .slider::after {
  content: "";
  position: absolute; top: 3px; left: 3px;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--muted);
  transition: transform 160ms ease, background 160ms ease;
}
.toggle input:checked + .slider { border-color: #1b6c6c; }
.toggle input:checked + .slider::after { transform: translateX(20px); background: var(--accent); }

.info {
  background: #0e0e0e;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-size: 14px;
}
.info .label { color: var(--muted); margin-right: 4px; }

.hint {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.5;
}

.topbar .metrics { display:flex; gap:6px; align-items:center; }
.topbar .metric { background:#0e0e0e; border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-size:12px; color:var(--fg); }
.topbar #los-graph { display:block; width:180px; height:36px; background:#0e0e0e; border:1px solid var(--border); border-radius:6px; }

.metrics { display:flex; gap:6px; align-items:center; }
.metric { background:#0e0e0e; border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-size:12px; color:var(--fg); }
.diagnostics {
  display:flex; align-items:center; justify-content:space-between;
  gap:12px; padding:8px 12px; margin-top:8px;
}
#los-graph { display:block; width:180px; height:36px; background:#0e0e0e; border:1px solid var(--border); border-radius:6px; }

.canvas-wrap {
  background: #0e0e0e;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#simulation-canvas {
  width: 100%;
  height: auto;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  background: #111;
}

.topbar select,
.topbar button { width: auto; }
.topbar input[type="range"] { width: 140px; }
.topbar #map-select { min-width: 140px; }
.topbar #material-select, .topbar #spatial-select { min-width: 120px; }

@media (max-width: 640px) {
  .topbar input[type="range"] { width: 100px; }
  .topbar #map-select { min-width: 120px; }
}

@media (max-width: 980px) {
  .diagnostics { display:none; }
}

  </style>
</head>
<body>
  <main class="container">
    <div class="topbar" role="toolbar" aria-label="Controls">
      <select id="map-select" aria-label="Map">
        <option>Open Space</option>
        <option>Single Room</option>
        <option>Maze</option>
        <option>Complex Office</option>
        <option>Destructible Walls</option>
      </select>
      <input id="muffling-slider" type="range" min="0" max="1" step="0.01" value="0.5" title="Muffling" />
      <input id="echo-slider" type="range" min="0" max="1" step="0.01" value="0.3" title="Echo Mix" />
      <select id="spatial-select" aria-label="Spatial Mode" title="Spatial Mode">
        <option selected>Virtual 5.1</option>
        <option>Stereo</option>
      </select>
      <select id="material-select" aria-label="Wall Material" title="Wall Material">
        <option>drywall</option><option>wood</option><option>stone</option><option>glass</option><option>metal</option>
      </select>
      <input id="thickness-slider" type="range" min="0.5" max="3" step="0.1" value="1" title="Wall Thickness" />
      <input id="destructible-toggle" type="checkbox" title="Destructible" />
      <button id="explode-btn" title="Explode Destructible Walls">💥</button>
      <button id="add-source-btn" title="Add Source">➕</button>
      <button id="remove-source-btn" title="Remove Source">➖</button>
      <div class="spacer"></div>
      <div class="metrics">
        <span class="metric" title="Line of Sight"><span id="direct-rays-pct">0%</span></span>
        <span class="metric" title="Muffle"><span id="muffle-strength">0.00</span></span>
        <span class="metric" title="Echo"><span id="echo-level">0.00</span></span>
      </div>
      <canvas id="los-graph" width="180" height="36" aria-label="LOS Graph"></canvas>
      <button id="start-stop-btn" class="primary" title="Start/Stop">
        <svg id="start-stop-icon" viewBox="0 0 24 24" width="18" height="18"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>
    <section class="canvas-wrap">
      <canvas id="simulation-canvas" width="1000" height="700" aria-label="Simulation Canvas"></canvas>
    </section>
  </main>
  <script type="importmap">
  {
    "imports": {
      "mitt": "https://esm.sh/mitt@3.0.1"
    }
  }
  </script>
  <script type="module">
import mitt from "mitt";


// ===== core.js =====
/* @tweakable clamp helper */
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
/* @tweakable linear interpolation */
const lerp = (a, b, t) => a + (b - a) * t;

class Vec2 {
  constructor(x = 0, y = 0) { this.x = x; this.y = y; }
  clone() { return new Vec2(this.x, this.y); }
  add(v) { this.x += v.x; this.y += v.y; return this; }
  sub(v) { this.x -= v.x; this.y -= v.y; return this; }
  mul(s) { this.x *= s; this.y *= s; return this; }
  len() { return Math.hypot(this.x, this.y); }
  norm() { const l = this.len() || 1; this.x /= l; this.y /= l; return this; }
  dot(v) { return this.x * v.x + this.y * v.y; }
  perp() { return new Vec2(-this.y, this.x); }
  static fromAngle(a) { return new Vec2(Math.cos(a), Math.sin(a)); }
}
/* @tweakable global raycast parameters */
/* RAY_COUNT also defined in sim */
/* MAX_BOUNCES also defined in sim */
/* ENERGY_THRESHOLD also defined in sim */
/* PX_PER_METER also defined in sim */
/* SOUND_SPEED_MPS also defined in sim */
/* @tweakable echo simulation every N frames */
const ECHO_SIM_STEP = 2;

/* @tweakable band helpers */
/* bScale also defined in sim */
/* bMul also defined in sim */
/* bClamp also defined in sim */
/* bSub also defined in sim */

// ===== math.js (only cross is unique; clamp/lerp/Vec2 duplicates omitted) =====
/* @tweakable clamp helper lower/upper bounds are used widely to constrain values */
/* clamp duplicated, defined in core */
/* @tweakable helper to lerp coordinates in map generation (doors positioning) */
/* lerp duplicated, defined in core */
/* Vec2 duplicated, defined in core */
const cross = (a, b) => a.x * b.y - a.y * b.x;


// ===== entities.js =====

const MATERIALS = {
  stone:   { absorption: [0.07, 0.06, 0.05], reflectivity: [0.93, 0.92, 0.90], transmission: 0.02, color: "#7a7a7a", name: "Stone" },
  wood:    { absorption: [0.15, 0.25, 0.35], reflectivity: [0.70, 0.60, 0.50], transmission: 0.20, color: "#a97b50", name: "Wood" },
  metal:   { absorption: [0.02, 0.03, 0.04], reflectivity: [0.98, 0.97, 0.96], transmission: 0.01, color: "#9aa3ad", name: "Metal" },
  glass:   { absorption: [0.05, 0.07, 0.12], reflectivity: [0.85, 0.80, 0.75], transmission: 0.60, color: "#8fd3ff", name: "Glass" },
  drywall: { absorption: [0.25, 0.40, 0.50], reflectivity: [0.60, 0.50, 0.35], transmission: 0.30, color: "#cfcfcf", name: "Drywall" }
};

const DEFAULT_WALL_MATERIAL = "drywall";

const ACCENT = "#00ffff";
const GREEN = "#64ff8a";
const RED = "#ff5a5a";

const WALL_BASE_LINE_WIDTH = 1.5;
const WALL_LINE_WIDTH_PER_THICKNESS = 1.2;

class Wall {
  constructor(x1, y1, x2, y2, material = "stone", { destructible = false, thickness = 1 /* @tweakable default wall thickness multiplier (affects absorption) */ } = {}) {
    this.a = new Vec2(x1, y1);
    this.b = new Vec2(x2, y2);
    this.material = material;
    this.destructible = destructible;
    this.destroyed = false;
    this.thickness = thickness;
  }
  get props() {
    if (this.destructible && this.destroyed) return { absorption: [0.15,0.25,0.35], reflectivity: [0.25,0.20,0.15], transmission: 0.75, color: "#888", name: "Broken" };
    const base = MATERIALS[this.material];
    return { ...base, reflectivityAvg: (base.reflectivity[0]+base.reflectivity[1]+base.reflectivity[2])/3 };
  }
  normal() { return new Vec2(this.b.x - this.a.x, this.b.y - this.a.y).perp().norm(); }
  draw(ctx) {
    ctx.save();
    const lw = Math.max(1, WALL_BASE_LINE_WIDTH + (this.thickness - 1) * WALL_LINE_WIDTH_PER_THICKNESS);
    ctx.lineWidth = lw;
    ctx.strokeStyle = this.destructible ? (this.destroyed ? "#444" : "#aaaaaa") : this.props.color;
    ctx.setLineDash(this.destructible ? (this.destroyed ? [2, 8] : [10, 6]) : []);
    ctx.beginPath(); ctx.moveTo(this.a.x, this.a.y); ctx.lineTo(this.b.x, this.b.y); ctx.stroke();
    ctx.restore();
  }
  hitTest(px, py, threshold = 6) {
    const vx = this.b.x - this.a.x, vy = this.b.y - this.a.y;
    const wx = px - this.a.x, wy = py - this.a.y;
    const c1 = vx * wx + vy * wy;
    if (c1 <= 0) return Math.hypot(px - this.a.x, py - this.a.y) < threshold;
    const c2 = vx * vx + vy * vy;
    if (c2 <= c1) return Math.hypot(px - this.b.x, py - this.b.y) < threshold;
    const b = c1 / c2;
    const bx = this.a.x + b * vx, by = this.a.y + b * vy;
    return Math.hypot(px - bx, py - by) < threshold;
  }
}

class Ray {
  constructor(origin, dir, energy = 1) {
    this.origin = origin.clone();
    this.dir = dir.clone().norm();
    this.energy = energy;
  }
  closestHit(walls, excludeWall = null) {
    let closest = null;
    const p = this.origin, r = this.dir;
    for (const wall of walls) {
      if (wall === excludeWall) continue;
      const a = wall.a, b = wall.b;
      const s = new Vec2(b.x - a.x, b.y - a.y);
      const denom = cross(r, s);
      if (Math.abs(denom) < 1e-6) continue;
      const t = cross(new Vec2(a.x - p.x, a.y - p.y), s) / denom;
      const u = cross(new Vec2(a.x - p.x, a.y - p.y), r) / denom;
      if (t > 1e-4 && u >= 0 && u <= 1) {
        const hit = new Vec2(p.x + t * r.x, p.y + t * r.y);
        const dist = t;
        if (!closest || dist < closest.dist) closest = { point: hit, dist, wall };
      }
    }
    return closest;
  }
}

class Player {
  constructor(x, y, radius = 10) { this.x = x; this.y = y; this.radius = radius; this.vx = 0; this.vy = 0; /* @tweakable player velocity (computed each frame) */ }
  get pos() { return new Vec2(this.x, this.y); }
  draw(ctx) {
    ctx.save();
    ctx.fillStyle = ACCENT;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.2; ctx.lineWidth = 2; ctx.strokeStyle = ACCENT;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + 6, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }
}

class SoundSource {
  constructor(x, y, radius = 12) { this.x = x; this.y = y; this.radius = radius; this.angle = 0; this.vx = 0; this.vy = 0; /* @tweakable source velocity */ this.size = 18; /* @tweakable volumetric source radius (px) */ }
  get pos() { return new Vec2(this.x, this.y); }
  forward() { return Vec2.fromAngle(this.angle); }
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.strokeStyle = "#e0e0e0"; ctx.lineWidth = 2;
    ctx.strokeRect(-10, -12, 20, 24);
    ctx.beginPath(); ctx.arc(0, 0, 6, -Math.PI/2, Math.PI/2);
    ctx.moveTo(6, -10); ctx.lineTo(12, -14);
    ctx.moveTo(6, 10); ctx.lineTo(12, 14);
    ctx.stroke();
    ctx.globalAlpha = 0.12; ctx.fillStyle = "#e0e0e0";
    ctx.beginPath(); ctx.arc(0, 0, this.radius + 16, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#e0e0e0"; ctx.beginPath(); ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(this.angle)*(this.radius+18), Math.sin(this.angle)*(this.radius+18)); ctx.stroke();
    ctx.restore();
  }
}

class Particle {
  constructor(x, y, color, size, shape, life = 0.9, brightness = 1) {
    this.x = x; this.y = y; this.color = color; this.size = size;
    this.shape = shape; this.life = life; this.age = 0; this.brightness = brightness;
  }
  update(dt) { this.age += dt; }
  get alive() { return this.age < this.life; }
  draw(ctx) {
    const t = Math.max(0, 1 - this.age / this.life);
    ctx.save();
    ctx.globalAlpha = t * 0.9 * this.brightness;
    ctx.translate(this.x, this.y);
    ctx.fillStyle = this.color; ctx.strokeStyle = this.color; ctx.lineWidth = 2;
    const s = this.size * t;
    if (this.shape === "x") {
      ctx.beginPath(); ctx.moveTo(-s, -s); ctx.lineTo(s, s);
      ctx.moveTo(-s, s); ctx.lineTo(s, -s); ctx.stroke();
    } else if (this.shape === "triangle") {
      ctx.beginPath(); ctx.moveTo(0, -s); ctx.lineTo(s, s); ctx.lineTo(-s, s); ctx.closePath(); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(0, 0, s, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}


// ===== render.js =====
/* @tweakable drawing alpha for ray segments */
/* RAY_ALPHA_START also defined in sim */
/* RAY_ALPHA_FALLOFF also defined in sim */
const drawWalls = (ctx, walls)=>{ 
  for(const w of walls) 
    if(!(w.destructible&&w.destroyed)) 
      w.draw(ctx); 
};
const drawEntities = (ctx, player, sources)=>{ 
  player.draw(ctx); 
  for(const s of sources) 
    s.draw(ctx); 
};
const drawSegments = (ctx, segments)=>{
  ctx.save(); 
  let alpha = RAY_ALPHA_START; 
  ctx.lineWidth=1; 
  ctx.strokeStyle=`rgba(0,255,255,${alpha})`;
  for(const seg of segments){
    ctx.strokeStyle=`rgba(0,255,255,${alpha})`;
    ctx.beginPath(); 
    ctx.moveTo(seg.from.x, seg.from.y); 
    ctx.lineTo(seg.to.x, seg.to.y); 
    ctx.stroke(); 
    alpha*=RAY_ALPHA_FALLOFF; 
  }
  ctx.restore();
};



// ===== audio-engine.js =====
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.master = null;
    this.analyser = null;
    this.lowpass = null;
    this.eqLow = null;
    this.eqMid = null;
    this.eqHigh = null;
    this.dryBus = null; 
    this.wetBus = null;
    this.convolver = null;
    this.running = false;
    this._sourceNodes = [];
    this._lastSchedule = 0;
    this._noiseBuffer = null;
    this._echoBudget = 0;
    this.spatialMode = "virtual-5.1";
    this.echoMix = 0.3;
    this._envReverbScale = 1.0;
    this._envEchoScale = 1.0;
    // virtual 5.1
    this.channels = null;
    /* @tweakable maximum echo bursts scheduled per second (token bucket refill rate) */
    this.MAX_ECHOS_PER_SEC = 40;
    /* @tweakable hard cap on simultaneously alive WebAudio nodes to prevent OOM */
    this.MAX_TOTAL_AUDIO_NODES = 350;
    /* @tweakable noise burst duration for echoes (seconds) */
    this.NOISE_BUFFER_SEC = 0.35;
    /* @tweakable max echo delay (seconds) to avoid stacking long tails */
    this.MAX_ECHO_DELAY_SEC = 0.9;
    this._echoTokens = 0;
    this._lastTokenTime = 0;
  }
  async init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.master = this.ctx.createGain(); 
    this.master.gain.value = 1;
    // dry/wet busses
    this.dryBus = this.ctx.createGain();
    this.wetBus = this.ctx.createGain(); 
    this.wetBus.gain.value = 0.35;
    // Early reflections bus
    this.earlyBus = this.ctx.createGain(); /* @tweakable gain of early reflections bus */
    this.earlyBus.gain.value = 0.6;
    // reverb
    this.convolver = this.ctx.createConvolver(); 
    this.setImpulseResponse("room");
    // EQ for muffling
    this.eqLow = this.ctx.createBiquadFilter(); 
    this.eqLow.type="lowshelf"; 
    this.eqLow.frequency.value=180;
    this.eqMid = this.ctx.createBiquadFilter(); 
    this.eqMid.type="peaking"; 
    this.eqMid.frequency.value=1000; 
    this.eqMid.Q.value=0.9;
    this.eqHigh= this.ctx.createBiquadFilter(); 
    this.eqHigh.type="highshelf"; 
    this.eqHigh.frequency.value=4500;
    // analysis
    this.analyser = this.ctx.createAnalyser(); 
    this.analyser.fftSize = 1024; /* @tweakable analyser FFT size (lower = lighter) */
    // routing
    this.eqLow.connect(this.eqMid); 
    this.eqMid.connect(this.eqHigh);
    this.eqHigh.connect(this.dryBus); 
    this.eqHigh.connect(this.convolver);
    this.eqHigh.connect(this.earlyBus);
    // 5.1 virtual panners
    const mkPan = ()=>{ 
      const p=this.ctx.createPanner(); 
      p.panningModel="HRTF"; 
      return p; 
    };
    const FL=mkPan(), FR=mkPan(), C=mkPan(), SL=mkPan(), SR=mkPan();
    // LFE as lowpassed mono
    const LFE = this.ctx.createBiquadFilter(); 
    LFE.type="lowpass"; 
    LFE.frequency.value = 150;
    const outG = this.ctx.createGain(); 
    outG.gain.value = 1;
    // positions (meters)
    FL.positionX.value=-1; 
    FL.positionZ.value=-1.5;
    FR.positionX.value=+1; 
    FR.positionZ.value=-1.5;
    C.positionX.value=0;   
    C.positionZ.value=-1;
    SL.positionX.value=-1.5; 
    SL.positionZ.value=+1;
    SR.positionX.value=+1.5; 
    SR.positionZ.value=+1;
    // mix dry/wet to channels
    const drySplit = this.ctx.createChannelMerger(2); // just for fanout
    this.dryBus.connect(FL); 
    this.dryBus.connect(FR); 
    this.dryBus.connect(C); 
    this.dryBus.connect(SL); 
    this.dryBus.connect(SR); 
    this.dryBus.connect(LFE);
    this.wetBus.connect(FL); 
    this.wetBus.connect(FR); 
    this.wetBus.connect(C); 
    this.wetBus.connect(SL); 
    this.wetBus.connect(SR); 
    this.wetBus.connect(LFE);
    this.earlyBus.connect(FL); 
    this.earlyBus.connect(FR); 
    this.earlyBus.connect(C); 
    this.earlyBus.connect(SL); 
    this.earlyBus.connect(SR);
    // sum all to master
    FL.connect(outG); 
    FR.connect(outG); 
    C.connect(outG); 
    SL.connect(outG); 
    SR.connect(outG); 
    LFE.connect(outG);
    outG.connect(this.analyser); 
    outG.connect(this.ctx.destination);
    this.channels = { FL, FR, C, SL, SR, LFE, out: outG };
    this.setEchoMix(this.echoMix);
    this._ensureNoiseBuffer();
  }
  connectSource(node){ 
    node.connect(this.eqLow); 
  }
  async start(){ 
    await this.init(); 
    if(this.running) return; 
    await this.ctx.resume(); 
    this.running=true; 
    this._lastSchedule=this.ctx.currentTime; 
    this._scheduleLoop(); 
  }
  stop(){ 
    if(!this.ctx) return; 
    this.running=false; 
    for(const n of this._sourceNodes){ 
      try{n.stop()}catch{} 
      try{n.disconnect()}catch{} 
    } 
    this._sourceNodes=[]; 
    this.ctx.suspend(); 
  }

      decay=4.0; 
    }
    if(type==="outside"){

      decay=1.5; 
    }

    buf=this.ctx.createBuffer(2,len,sr);

    this.setEchoMix(this.echoMix); 
  }
  setEchoEnvironmentScale(s){ 
    this._envEchoScale = Math.max(0,Math.min(1,s)); 
  }
  setEchoMix(v){ 
    this.echoMix = Math.max(0,Math.min(1,v)); 
    if(this.wetBus) 
      this.wetBus.gain.setTargetAtTime(0.35*this.echoMix*this._envReverbScale, this.ctx?.currentTime||0, 0.05); 
  }

    if(!this.ctx) return;
    const a=Math.max(0,Math.min(1,amount01));
    this.eqLow.gain.setTargetAtTime(6*a, this.ctx.currentTime, 0.05);
    this.eqMid.gain.setTargetAtTime(-8*a, this.ctx.currentTime, 0.05);

  setDryLevelFromEnergy(band){
    if(!this.ctx) return;

    const s=0.8;
    this.channels.FL.positionX.setTargetAtTime(-1+dx*s, this.ctx.currentTime, 0.1);
    this.channels.FR.positionX.setTargetAtTime(+1+dx*s, this.ctx.currentTime, 0.1);

  spawnEcho(distancePx, bandEnergy, pxPerMeter=100, soundSpeed=343){
    if(!this.ctx) return;

    const delay = Math.max(0.002, Math.min(0.25, distM/soundSpeed));

  }
  setDynamicReverb(lateEnergySum, avgLateDelaySec){
    if(!this.ctx) return;
    const norm = Math.max(1e-4, lateEnergySum);
    const dur = Math.max(0.3, Math.min(2.5, avgLateDelaySec*3));
    const wetScale = Math.max(0.1, Math.min(0.9, 0.25 + Math.log10(1+norm)*0.5));

  }
  currentLoudness(){
    if(!this.analyser) return 0; 
    const arr=new Uint8Array(this.analyser.frequencyBinCount); 
    this.analyser.getByteTimeDomainData(arr);
    let sum=0; 
    for(let i=0;i<arr.length;i++){ 
      const v=(arr[i]-128)/128; 
      sum+=v*v; 
    } 
    return Math.sqrt(sum/arr.length);
  }
  _track(node, extras=[]){
    this._sourceNodes.push(node, ...extras);
    node.onended=()=>{ 
      try{node.disconnect()}catch{} 
      for(const ex of extras){try{ex.disconnect()}catch{}} 
      this._sourceNodes=this._sourceNodes.filter(n=>n!==node&&!extras.includes(n)); 
    };
  }
  _scheduleLoop(){ 
    if(!this.running) return; 
    // lightweight periodic sweep to avoid buildup
    if(this._sourceNodes.length > this.MAX_TOTAL_AUDIO_NODES*0.9){

  }

    const { FL, FR, C, SL, SR } = this.channels;
    if (this.spatialMode === "stereo") {

      FR.positionX.value =  0.8; FR.positionZ.value = -1.2;
      C.positionX.value = 0;     C.positionZ.value = -2.5;
      SL.positionZ.value =  3.0; SR.positionZ.value =  3.0;
    } else {
      FL.positionX.value = -1;   FL.positionZ.value = -1.5;
      FR.positionX.value =  1;   FR.positionZ.value = -1.5;
      C.positionX.value =  0;    C.positionZ.value = -1;
      SL.positionX.value = -1.5; SL.positionZ.value =  1;
      SR.positionX.value =  1.5; SR.positionZ.value =  1;
    }
  }
  /* @tweakable strength of left/right steering and front-back depth response */
  updateSpatial(player, src, pxPerMeter=100){
    if(!this.channels||!this.ctx) return;
    const dx=(src.x-player.x)/pxPerMeter, dz=(src.y-player.y)/pxPerMeter;
    const ang=Math.atan2(dz,dx); const pan=Math.max(-1,Math.min(1,Math.sin(ang)));

    FL.positionX.setTargetAtTime(-1 - s*pan, this.ctx.currentTime, 0.05);
    FR.positionX.setTargetAtTime( 1 - s*pan, this.ctx.currentTime, 0.05);
    C.positionZ.setTargetAtTime(depth, this.ctx.currentTime, 0.05);
    try{
      if (this.channels?.FL?.setVelocity) this.channels.FL.setVelocity(src.vx/pxPerMeter, src.vy/pxPerMeter, 0);
      if (this.ctx.listener?.setVelocity) this.ctx.listener.setVelocity(player.vx/pxPerMeter, player.vy/pxPerMeter, 0);
    }catch{}
  }
}

class MapFactory {
  static bounds(w, h) {
    return [
      new Wall(10, 10, w - 10, 10, "stone"),
      new Wall(w - 10, 10, w - 10, h - 10, "stone"),
      new Wall(w - 10, h - 10, 10, h - 10, "stone"),
      new Wall(10, h - 10, 10, 10, "stone")
    ];
  }
  static openSpace(w, h) { return MapFactory.bounds(w, h); }
  static singleRoom(w, h) {
    const walls = MapFactory.bounds(w, h);
    walls.push(new Wall(w*0.25, h*0.25, w*0.75, h*0.25, "drywall"));
    walls.push(new Wall(w*0.75, h*0.25, w*0.75, h*0.75, "drywall"));
    walls.push(new Wall(w*0.75, h*0.75, w*0.25, h*0.75, "drywall"));
    walls.push(new Wall(w*0.25, h*0.75, w*0.25, h*0.25, "drywall"));
    return walls;
  }
  static maze(w, h) {
    const walls = MapFactory.bounds(w, h);
    const cols = 5, rows = 4;
    for (let i = 1; i < cols; i++) {
      const x = (w / cols) * i;
      const gapY1 = (h/rows)*2 - 20, gapY2 = gapY1 + 40; // door gap
      walls.push(new Wall(x, 10, x, gapY1, (i % 2 ? "stone" : "wood")));
      walls.push(new Wall(x, gapY2, x, h - 10, (i % 2 ? "stone" : "wood")));
    }
    for (let j = 1; j < rows; j++) {
      const y = (h / rows) * j;
      const gapX1 = (w/cols)*3 - 20, gapX2 = gapX1 + 40; // door gap
      walls.push(new Wall(10, y, gapX1, (j % 2 ? "drywall" : "glass")));
      walls.push(new Wall(gapX2, y, w - 10, (j % 2 ? "drywall" : "glass")));
    }
    return walls;
  }
  static destructible(w, h) {
    const walls = MapFactory.bounds(w, h);
    walls.push(new Wall(w*0.25, h*0.3, w*0.75, h*0.3, "drywall", { destructible: true }));
    walls.push(new Wall(w*0.25, h*0.6, w*0.75, h*0.6, "drywall", { destructible: true }));
    walls.push(new Wall(w*0.25, h*0.3, w*0.25, h*0.6, "wood"));
    walls.push(new Wall(w*0.75, h*0.3, w*0.75, h*0.6, "glass"));
    return walls;
  }
  static office(w, h) {
    const walls = MapFactory.bounds(w, h);
    // Outer ring with door gaps
    const door = /* @tweakable door opening width as fraction of side */ 0.12;
    const gapX1 = lerp(w*0.15, w*0.85, 0.5 - door/2), gapX2 = lerp(w*0.15, w*0.85, 0.5 + door/2);
    walls.push(new Wall(w*0.15,h*0.2, gapX1, h*0.2, "drywall"), new Wall(gapX2, h*0.2, w*0.85,h*0.2,"drywall"));
    walls.push(new Wall(w*0.85,h*0.2, w*0.85, h*0.5 - (h*door/2), "glass"), new Wall(w*0.85, h*0.5 + (h*door/2), w*0.85,h*0.8,"glass"));
    walls.push(new Wall(w*0.15,h*0.8, w*0.85,h*0.8,"drywall"));
    walls.push(new Wall(w*0.15,h*0.2, w*0.15, h*0.8,"drywall"));
    // Interior partitions of all materials with gaps as doors
    walls.push(new Wall(w*0.5,h*0.2, w*0.5, h*0.35,"wood"), new Wall(w*0.5,h*0.45, w*0.5, h*0.8,"wood"));
    walls.push(new Wall(w*0.15,h*0.5, w*0.45,h*0.5,"glass"), new Wall(w*0.55,h*0.5, w*0.85,h*0.5,"glass"));
    walls.push(new Wall(w*0.5,h*0.35, w*0.75,h*0.35,"stone"), new Wall(w*0.78,h*0.35, w*0.85,h*0.35,"stone"));
    walls.push(new Wall(w*0.5,h*0.65, w*0.7,h*0.65,"metal"), new Wall(w*0.72,h*0.65, w*0.85,h*0.65,"metal"));
    return walls;
  }
  static forName(name, w, h) {
    switch (name) {
      case "Open Space": return MapFactory.openSpace(w, h);
      case "Single Room": return MapFactory.singleRoom(w, h);
      case "Maze": return MapFactory.maze(w, h);
      case "Destructible Walls": return MapFactory.destructible(w, h);
      case "Complex Office": return MapFactory.office(w, h);
      default: return MapFactory.openSpace(w, h);
    }
  }
  static impulseForMap(name, audio) {
    if (name === "Open Space") audio.setImpulseResponse("outside");
    else if (name === "Maze") audio.setImpulseResponse("hall");
    else if (name === "Complex Office") audio.setImpulseResponse("hall");
    else audio.setImpulseResponse("room");
  }
}

    this.bus.on("reset", () => this._resetPositions());
    this.bus.on("params:muffling", (v) => this.mufflingStrength = v);
    this.bus.on("params:echo", (v) => { this.echoMix = v; this.audio.setEchoMix(v); });
    this.bus.on("accessibility:toggle", (v) => this.accessibility = v);
    this.bus.on("walls:clear", () => {
      this.walls = CLEAR_WALLS_KEEP_BOUNDS
        ? this.MapFactory.bounds(this.canvas.width, this.canvas.height)
        : [];
    });
    this.bus.on("sources:clear", () => {
      this.sources = [];
      this._resetPositions(); // re-anchor player and a default source
      this.sources.push(new SoundSource(this.canvas.width * 0.8, this.canvas.height * 0.5, 12));
    });
    this.bus.on("wall:config", (cfg) => { this.wallConfig = { ...this.wallConfig, ...cfg }; });
    this.bus.on("explode", () => this._explode());
    this.bus.on("source:add", () => this._addSource());
    this.bus.on("source:remove", () => this._removeSource());

    const getPointer = (e) => {
      const rect = this.canvas.getBoundingClientRect();
      const cx = (e.clientX ?? e.touches?.[0]?.clientX ?? 0) - rect.left;
      const cy = (e.clientY ?? e.touches?.[0]?.clientY ?? 0) - rect.top;
      const sx = rect.width ? (this.canvas.width / rect.width) : 1;
      const sy = rect.height ? (this.canvas.height / rect.height) : 1;
      return new Vec2(cx * sx, cy * sy);
    };

    this.canvas.addEventListener("pointerdown", (e) => {
      const p = getPointer(e);
      if (Math.hypot(p.x - this.player.x, p.y - this.player.y) < this.player.radius + 12) {
        this._dragging = "player";
      } else if (Math.hypot(p.x - this.sources[0].x, p.y - this.sources[0].y) < this.sources[0].radius + 16) {
        this._dragging = "source";
      } else {
        // Toggle destructible if clicked on it
        let toggled = false;
        for (const w of this.walls) {
          if (w.destructible && w.hitTest(p.x, p.y)) { w.destroyed = !w.destroyed; toggled = true; break; }
        }
        if (!toggled) {
          // start drawing a new wall
          this._drawingWall = { start: p, end: p };
        }
      }
    });

    this.canvas.addEventListener("pointermove", (e) => {
      const p = getPointer(e);
      if (this._dragging === "player") {
        this.player.x = clamp(p.x, 20, this.canvas.width - 20);
        this.player.y = clamp(p.y, 20, this.canvas.height - 20);
      } else if (this._dragging === "source") {
        this.sources[0].x = clamp(p.x, 20, this.canvas.width - 20);
        this.sources[0].y = clamp(p.y, 20, this.canvas.height - 20);
      } else if (this._drawingWall) {
        this._drawingWall.end = new Vec2(clamp(p.x, 10, this.canvas.width - 10), clamp(p.y, 10, this.canvas.height - 10));
      }
    });

    window.addEventListener("pointerup", () => {
      this._dragging = null;
      if (this._drawingWall) {
        const { start, end } = this._drawingWall;
        const dist = Math.hypot(end.x - start.x, end.y - start.y);
        if (dist > 12) {
          this.walls.push(new Wall(start.x, start.y, end.x, end.y, this.wallConfig.material, { destructible: this.wallConfig.destructible, thickness: this.wallConfig.thickness }));
        }
        this._drawingWall = null;
      }
    });
  }

  _resetPositions() {
    this.player.x = this.canvas.width * 0.2; this.player.y = this.canvas.height * 0.5;
    if (this.sources[0]) { this.sources[0].x = this.canvas.width * 0.8; this.sources[0].y = this.canvas.height * 0.5; }
  }

  _loop() {
    requestAnimationFrame(() => this._loop());
    const now = performance.now();
    const dt = (now - this._lastTime) / 1000;
    this._lastTime = now;
    this._drawScene(this.ctx, dt);
    if (this.running) this._updateAudioAll();
  }

  _drawScene(ctx, dt){
    ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
    drawWalls(ctx, this.walls); drawEntities(ctx, this.player, this.sources);
    this._drawRaysFromPlayer(ctx); // restored cyan bouncing rays
    /* @tweakable diffraction path stroke color */ const DIFF_VIS_COLOR = "#f59e0b";
    if (this.running && this.sources[0]) {
      const pct = this._directRaysPercentageFor(this.sources[0]);
      if (pct < DIFFRACTION_LOS_THRESHOLD) {
        const path = this._findDiffractionPath(this.sources[0], this.player, this.walls);
        if (path) { ctx.save(); ctx.strokeStyle = DIFF_VIS_COLOR; ctx.lineWidth = 2; ctx.setLineDash([8,6]);
          ctx.beginPath(); ctx.moveTo(this.sources[0].x,this.sources[0].y); ctx.lineTo(path.vertex.x,path.vertex.y); ctx.lineTo(this.player.x,this.player.y); ctx.stroke();
          ctx.beginPath(); ctx.arc(path.vertex.x,path.vertex.y,6,0,Math.PI*2); ctx.fillStyle="rgba(245,158,11,0.5)"; ctx.fill(); ctx.restore(); }
      }
    }
    if (SHOW_DETECTOR_RAYS && this.sources[0]) this._drawDetectorRaysFor(ctx, this.sources[0]);
    for (let i=this.particles.length-1;i>=0;i--){ const p=this.particles[i]; p.update(dt); if(!p.alive) this.particles.splice(i,1); else p.draw(ctx); }
    if (this._drawingWall){ ctx.save(); ctx.setLineDash([6,4]); ctx.strokeStyle="#aaa"; ctx.beginPath(); ctx.moveTo(this._drawingWall.start.x,this._drawingWall.start.y); ctx.lineTo(this._drawingWall.end.x,this._drawingWall.end.y); ctx.stroke(); ctx.restore(); }
  }

  _traceRayPath(origin, dir) {
    const segments = [];
    let ray = new Ray(origin, dir, 1.0), lastWall = null;
    for (let b = 0; b < MAX_BOUNCES; b++) {
      const hit = ray.closestHit(this.walls, lastWall);
      if (!hit) break;
      segments.push({ from: ray.origin.clone(), to: hit.point.clone(), energy: ray.energy, wall: hit.wall });
      const props = hit.wall.props;
      const reflectivity = Array.isArray(props.reflectivity) ? props.reflectivityAvg : props.reflectivity;
      const transmission = props.transmission;
      const r = Math.random();
      let nextDir;
      if (r < reflectivity) {
        const n = hit.wall.normal(), d = ray.dir, dot = d.dot(n);
        nextDir = new Vec2(d.x - 2 * dot * n.x, d.y - 2 * dot * n.y).norm();
        ray = new Ray(hit.point.clone().add(nextDir.clone().mul(0.001)), nextDir, ray.energy * reflectivity);
      } else {
        nextDir = ray.dir.clone();
        ray = new Ray(hit.point.clone().add(nextDir.clone().mul(0.001)), nextDir, ray.energy * transmission);
      }
      if (ray.energy < ENERGY_THRESHOLD) break;
      lastWall = hit.wall;
    }
    return segments;
  }

  _drawRaysFromPlayer(ctx) {
    const origin = this.player.pos;
    ctx.save(); ctx.lineWidth = 1;
    for (let i = 0; i < this._angles.length; i++) {
      const dir = Vec2.fromAngle(this._angles[i]);
      const segments = this._traceRayPath(origin, dir);
      let alpha = RAY_ALPHA_START;
      for (const seg of segments) {
        ctx.strokeStyle = `rgba(0,255,255,${alpha})`;
        ctx.beginPath(); ctx.moveTo(seg.from.x, seg.from.y); ctx.lineTo(seg.to.x, seg.to.y); ctx.stroke();
        alpha *= RAY_ALPHA_FALLOFF;
      }
    }
    ctx.restore();
  }

  _directRaysPercentageFor(src) {
    const p = this.player.pos, s = src.pos;
    const dir = new Vec2(s.x - p.x, s.y - p.y).norm();
    const baseAngle = Math.atan2(dir.y, dir.x);
    let clear = 0;
    for (let i = 0; i < DETECTOR_RAYS; i++) {
      const spread = (i / (DETECTOR_RAYS - 1)) - 0.5;
      const a = baseAngle + spread * 0.25;
      const r = new Ray(p, Vec2.fromAngle(a));
      const hit = r.closestHit(this.walls);
      const distToSrc = Math.hypot(s.x - p.x, s.y - p.y);
      const blocked = hit && (hit.dist < distToSrc);
      if (!blocked) clear++;
    }
    return clear / DETECTOR_RAYS;
  }

  _drawDetectorRaysFor(ctx, src) {
    const p = this.player.pos, s = src.pos;
    const dir = new Vec2(s.x - p.x, s.y - p.y).norm();
    const baseAngle = Math.atan2(dir.y, dir.x);
    ctx.save(); ctx.lineWidth = 1;
    for (let i = 0; i < DETECTOR_RAYS; i++) {
      const spread = (i / (DETECTOR_RAYS - 1)) - 0.5;
      const a = baseAngle + spread * 0.25;
      const r = new Ray(p, Vec2.fromAngle(a));
      const hit = r.closestHit(this.walls);
      const distToSrc = Math.hypot(s.x - p.x, s.y - p.y);
      const blocked = hit && (hit.dist < distToSrc);
      ctx.strokeStyle = blocked ? "rgba(255,90,90,0.4)" : "rgba(100,255,138,0.6)";
      ctx.beginPath(); ctx.moveTo(p.x, p.y);
      if (blocked) ctx.lineTo(p.x + r.dir.x * hit.dist, p.y + r.dir.y * hit.dist); else ctx.lineTo(s.x, s.y);
      ctx.stroke();
    }
    ctx.restore();
  }

  _raysFromSourceParticles(nowSec, src) {
    if (!this.accessibility) return;
    const nowMs = nowSec * 1000;
    if (nowMs - this._lastParticleCast < ACCESSIBILITY_RAY_INTERVAL_MS) return;
    this._lastParticleCast = nowMs;

    const N = Math.floor(RAY_COUNT * 0.6);
    const originBase = src.pos;
    const loud = this.audio.currentLoudness();
    const brightness = Math.max(0, Math.min(1, loud * 3));
    const shape = "triangle";
    const color = GREEN;
    for (let i = 0; i < N; i++) {
      const a = (i / N) * Math.PI * 2;
      const rIn = Math.random() * src.size; /* @tweakable volumetric particle origin within source radius */
      const o = new Vec2(originBase.x + Math.cos(a)*rIn, originBase.y + Math.sin(a)*rIn);
      const segments = this._traceRayPath(o, Vec2.fromAngle(a));
      for (const seg of segments) {
        const size = lerp(PARTICLE_MIN_SIZE, PARTICLE_MAX_SIZE, Math.max(0, Math.min(1, seg.energy))) * (0.6 + brightness * 0.8);
        this.particles.push(new Particle(seg.to.x, seg.to.y, color, size, shape, PARTICLE_LIFETIME, brightness));
      }
    }
    // cap particles
    if (this.particles.length > MAX_PARTICLES) this.particles.splice(0, this.particles.length - MAX_PARTICLES);
  }

  _calculatePermeationFor(source){
    const p=this.player.pos,s=source.pos,dir=new Vec2(s.x-p.x,s.y-p.y),dist=dir.len(),ray=new Ray(p,dir);
    let energy=[1,1,1], totalT=0;
    for(const w of this.walls){
      if(w.destructible&&w.destroyed) continue;
      const hit=ray.closestHit([w]); if(hit&&hit.dist<dist){ const A=bAbsEff(w.props.absorption,w.thickness); energy=bMul(energy,bSub([1,1,1],A)); totalT+=w.thickness; }
    }
    return {energy, thickness: totalT};
  }

  _traceEchoPathsFor(source){
    const paths=[], o=this.player.pos;
    for(let i=0;i<ECHO_RAYS;i++){
      const ray=new Ray(o, Vec2.fromAngle((i/ECHO_RAYS)*Math.PI*2)), hit=ray.closestHit(this.walls);
      if(!hit){ paths.push({escaped:true,direction:ray.dir.clone()}); continue; }
      // only use for ambient direction; do not enqueue echoes here to reduce load
    }
    return paths;
  }

  _updateAudioForSource(src, pctDirect, accum) {
    const baseMuffle = 1 - pctDirect;
    const muffle = Math.max(0, Math.min(1, baseMuffle * this.mufflingStrength));
    const Edir = this._computeDirectEnergyFor(src, pctDirect, muffle);
    accum[0] += Edir[0]; accum[1] += Edir[1]; accum[2] += Edir[2];
    this.audio.updateSpatial(this.player, src, PX_PER_METER);
  }

  _computeDirectEnergyFor(src, pctDirect = 1, muffle = 0) {
    const dx = src.x - this.player.x, dy = src.y - this.player.y;
    const distPx = Math.hypot(dx, dy), distM = distPx / PX_PER_METER;
    const air = bAir(distM); const base = SOURCE_POWER / Math.max(1, distM * distM);
    const band = [base * air[0], base * air[1], base * air[2]];
    const muff = [
      1 - MUFFLE_COEFF_LOW * muffle,
      1 - MUFFLE_COEFF_MID * muffle,
      1 - MUFFLE_COEFF_HIGH * muffle
    ];
    return bClamp(bMul(band, muff), 0, 2);
  }

  _findDiffractionPath(source, player, walls){
    const s=source.pos,p=player.pos, dir=new Vec2(s.x-p.x,s.y-p.y), dist=Math.hypot(dir.x,dir.y);
    const r=new Ray(p,dir), W=[]; for(const w of walls){ const h=r.closestHit([w]); if(h&&h.dist<dist) W.push(w); }
    const occluded=(a,b,ignore)=>{ const d=new Vec2(b.x-a.x,b.y-a.y), ray=new Ray(a,d); const h=ray.closestHit(walls,ignore); return h&&h.dist<Math.hypot(d.x,d.y)-0.1; };
    let best=null;
    for(const w of W){ for(const v of [w.a,w.b]){
      if(occluded(s,v,w)||occluded(v,p,w)) continue;
      const d1=Math.hypot(v.x-s.x,v.y-s.y), d2=Math.hypot(p.x-v.x,p.y-v.y), tot=d1+d2;
      const v1=new Vec2(v.x-s.x,v.y-s.y).norm(), v2=new Vec2(p.x-v.x,p.y-v.y).norm();
      const theta=Math.PI - Math.acos(clamp(v1.dot(v2),-1,1));
      if(!best||tot<best.totalDistance) best={vertex:v,totalDistance:tot,bendAngle:theta};
    } }
    return best;
  }

  _updateAudioAll() {
    this.audio.beginFrame();
    const sorted=[...this.sources].sort((a,b)=>Math.hypot(this.player.x-a.x,this.player.y-a.y)-Math.hypot(this.player.x-b.x,this.player.y-b.y));
    const total=[0,0,0]; let escX=0,escZ=0,escN=0;
    for(let i=0;i<sorted.length;i++){
      const src=sorted[i];
      const pct=this._directRaysPercentageFor(src);
      
      // 1. Direct Path
      const directEnergy = this._computeDirectEnergyFor(src, pct, 1 - pct);
      total[0] += directEnergy[0] * pct;
      total[1] += directEnergy[1] * pct;
      total[2] += directEnergy[2] * pct;
      
      // 2. Permeation Path (through walls)
      if(pct < PERMEATION_THRESHOLD){ 
        const per=this._calculatePermeationFor(src);
        const base=this._computeDirectEnergyFor(src,1,0); // Energy without occlusion
        const perE=bMul(base,per.energy);
        const f=(1-pct); 
        total[0]+=perE[0]*f; total[1]+=perE[1]*f; total[2]+=perE[2]*f; 
      }

      // 3. Diffraction Path (around corners)
      if (pct < DIFFRACTION_LOS_THRESHOLD) {
        const path = this._findDiffractionPath(src, this.player, this.walls);
        if (path) {
          const distM = Math.max(MIN_PATH_M, path.totalDistance / PX_PER_METER);
          const falloff = SOURCE_POWER / (distM * distM);
          const air = bAir(distM), c = Math.cos(path.bendAngle);
          const att = (k)=> Math.pow(0.5*(1+c), k);
          const diff = [falloff*air[0]*att(DIFF_K_LOW), falloff*air[1]*att(DIFF_K_MID), falloff*air[2]*att(DIFF_K_HIGH)];
          total[0]+=diff[0]; total[1]+=diff[1]; total[2]+=diff[2];
        }
      }

      // Spatialization and Echoes
      this.audio.updateSpatial(this.player, src, PX_PER_METER);
      const paths=this._traceEchoPathsFor(src);
      for(const p of paths){ if(p.escaped){ escX+=p.direction.x; escZ+=p.direction.y; escN++; } }
    }
    this.audio.setMuffleStrength(this.mufflingStrength);
    this.audio.setDryLevelFromEnergy(total);
    if(escN>0){ const l=Math.hypot(escX,escZ)||1; this.audio.updateAmbientDirection(escX/l, escZ/l); }
    this._echoFrame=(this._echoFrame+1)|0;
    if ((this._echoFrame % 2)===0 && this.sources[0]) {
      this.simulateEchoRays({ player:this.player, source:this.sources[0], audio:this.audio, world:{ walls:this.walls } });
    }
  }

  _removeSource() {
    /* @tweakable minimum number of sources to keep */
    const MIN_SOURCES = 1;
    if (this.sources.length > MIN_SOURCES) this.sources.pop();
  }

  _addSource() {
    /* @tweakable maximum simultaneous sources */
    const MAX_SOURCES = 4;
    if (this.sources.length >= MAX_SOURCES) return;
    /* @tweakable pixel offset for new source placement */
    const OFFSET_PX = 40;
    const base = this.sources[this.sources.length - 1] || this.sources[0];
    const nx = clamp((base?.x ?? this.canvas.width * 0.5) + OFFSET_PX, 20, this.canvas.width - 20);
    const ny = clamp((base?.y ?? this.canvas.height * 0.5) + OFFSET_PX, 20, this.canvas.height - 20);
    this.sources.push(new SoundSource(nx, ny, 12));
  }

  simulateEchoRays({player, source, world, audio}){
    const origin = new Vec2(source.x, source.y);
    const playerC = new Vec2(player.x, player.y); const pr = player.radius;
    const circleHit = (p,q,c,r)=>{ const vx=q.x-p.x,vy=q.y-p.y; const A=vx*vx+vy*vy; const B=2*((p.x-c.x)*vx+(p.y-c.y)*vy); const C=(p.x-c.x)*(p.x-c.x)+(p.y-c.y)*(p.y-c.y)-r*r; const D=B*B-4*A*C; if(D<0) return null; const s1=(-B-Math.sqrt(D))/(2*A), s2=(-B+Math.sqrt(D))/(2*A); const t=Math.min(s1,s2); if(t>0&&t<1) return t; return null; };
    const bandAir=(dm)=>[Math.exp(-0.004*dm),Math.exp(-0.02*dm),Math.exp(-0.06*dm)];
    let lateEnergySum = 0, lateDelaySum = 0, lateCount = 0;
    for(let i=0;i<RAY_COUNT;i++){
      const angle=(i/RAY_COUNT)*Math.PI*2;
      const rIn = Math.random()*source.size; /* @tweakable volumetric ray origin radius */
      const a0 = Math.random()*Math.PI*2;
      let pos=new Vec2(source.x + Math.cos(a0)*rIn, source.y + Math.sin(a0)*rIn), dir=Vec2.fromAngle(angle), energy=[1,1,1], traveled=0, last=null;
      for(let b=0;b<MAX_BOUNCES;b++){
        // find closest wall hit
        let closest=null;
        for(const w of world.walls){
          if(w===last) continue;
          const a=w.a, bb=w.b; const s=new Vec2(bb.x-a.x, bb.y-a.y);
          const denom = dir.x*(-s.y) + dir.y*(s.x);
          if (Math.abs(denom)<1e-6) continue;
          const ap = new Vec2(a.x-pos.x, a.y-pos.y);
          const t = (ap.x*(-s.y)+ap.y*(s.x))/denom;
          const u = (ap.x*dir.y - ap.y*dir.x)/denom;
          if(t>1e-4 && u>=0 && u<=1){
            const hit=new Vec2(pos.x+dir.x*t, pos.y+dir.y*t);
            if(!closest || t<closest.t) closest={ t, wall:w, point:hit };
          }
        }
        const segEnd = closest ? closest.point : pos.clone().add(dir.clone().mul(10000));
        const tCirc = circleHit(pos, segEnd, playerC, pr);
        if (tCirc!=null){
          const hitPoint = new Vec2(pos.x+dir.x*tCirc, pos.y+dir.y*tCirc);
          const segLen = Math.hypot(hitPoint.x-pos.x, hitPoint.y-pos.y);
          traveled += segLen/PX_PER_METER;
          const air = bandAir(traveled);
          const out = bClamp([energy[0]*air[0], energy[1]*air[1], energy[2]*air[2]], 0, 1);
          if (b < EARLY_BOUNCES_MAX) audio.spawnEarlyReflection(traveled*PX_PER_METER, out, PX_PER_METER, SOUND_SPEED_MPS);
          else { lateEnergySum += out[0]+out[1]+out[2]; lateDelaySum += traveled/SOUND_SPEED_MPS; lateCount++; }
          break;
        }
        const segLenPx = Math.hypot(segEnd.x-pos.x, segEnd.y-pos.y);
        traveled += segLenPx/PX_PER_METER;
        if(!closest) break;
        // reflection/transmission at wall
        const props = closest.wall.props;
        const A = props.absorption;
        const Rv = props.reflectivity;
        const keep = [Rv[0]*(1-A[0]), Rv[1]*(1-A[1]), Rv[2]*(1-A[2])];
        energy = [energy[0]*keep[0], energy[1]*keep[1], energy[2]*keep[2]];
        pos = closest.point.clone().add(dir.clone().mul(0.001));
        dir = dir; last = closest.wall;
        if (energy[0]+energy[1]+energy[2] < ENERGY_THRESHOLD) break;
      }
    }
    if (lateCount>0) audio.setDynamicReverb(lateEnergySum, lateDelaySum/lateCount);
  }
}

/* @tweakable whether to auto-start audio when play button missing */
const wireUI = (audio, bus) => {
  const mapSelect=document.getElementById("map-select");
  if(mapSelect) mapSelect.addEventListener("change", e=>bus.emit("map:change", e.target.value));
  const muff=document.getElementById("muffling-slider");
  if(muff){ bus.emit("params:muffling", parseFloat(muff.value)); muff.addEventListener("input",e=>bus.emit("params:muffling", parseFloat(e.target.value))); }
  const echo=document.getElementById("echo-slider");
  if(echo){ bus.emit("params:echo", parseFloat(echo.value)); echo.addEventListener("input",e=>{ const v=parseFloat(e.target.value); bus.emit("params:echo", v); audio.setEchoMix(v); }); }
  const startBtn=document.getElementById("start-stop-btn");
  const icon=document.getElementById("start-stop-icon");
  const playPath="M8 5v14l11-7z", pausePath="M6 6h4v12H6zm8 0h4v12h-4z";
  let running=false;
  if(startBtn) startBtn.addEventListener("click", async ()=>{ running=!running; icon?.querySelector("path")?.setAttribute("d", running?pausePath:playPath); bus.emit("toggle:run", running); });
  // wall tools
  const material=document.getElementById("material-select");
  const thick=document.getElementById("thickness-slider");
  const destr=document.getElementById("destructible-toggle");
  const sendCfg=()=>bus.emit("wall:config",{ material:material.value, thickness:parseFloat(thick.value), destructible:!!destr.checked });
  material?.addEventListener("change", sendCfg); thick?.addEventListener("input", sendCfg); destr?.addEventListener("change", sendCfg); sendCfg();
  document.getElementById("explode-btn")?.addEventListener("click", ()=>bus.emit("explode"));
  document.getElementById("add-source-btn")?.addEventListener("click", ()=>bus.emit("source:add"));
  document.getElementById("remove-source-btn")?.addEventListener("click", ()=>bus.emit("source:remove"));
  return bus;
};


// ===== main.js =====

const bus = mitt();
const canvas = document.getElementById("simulation-canvas");
const audio = new AudioEngine();
audio.setSpatialMode("virtual-5.1");
const sim = new Simulation(canvas, bus, audio, MapFactory);

// UI wires (compact top bar)
const mapSelect = document.getElementById("map-select");
mapSelect.addEventListener("change", (e) => bus.emit("map:change", e.target.value));

/* @tweakable start the simulation automatically when no Start/Stop button exists */
const START_RUNNING_IF_NO_BUTTON = false;
const startStopBtn = document.getElementById("start-stop-btn");
/* @tweakable SVG path for the play icon */
const playPath = "M8 5v14l11-7z";
/* @tweakable SVG path for the pause icon */
const pausePath = "M6 6h4v12H6zm8 0h4v12h-4z";
const startStopIcon = document.getElementById("start-stop-icon");
let running = false;
if (startStopBtn) {
  startStopBtn.addEventListener("click", async () => {
    running = !running;
    startStopIcon?.querySelector("path")?.setAttribute("d", running ? pausePath : playPath);
    bus.emit("toggle:run", running);
  });
} else if (START_RUNNING_IF_NO_BUTTON) { bus.emit("toggle:run", true); }

const resetBtn = document.getElementById("reset-btn");
if (resetBtn) resetBtn.addEventListener("click", () => bus.emit("reset"));

const clearBtn = document.getElementById("clear-btn");
if (clearBtn) {
  clearBtn.addEventListener("click", () => {
    bus.emit("walls:clear");
    bus.emit("sources:clear");
    bus.emit("reset");
  });
}

const mufflingSlider = document.getElementById("muffling-slider");
bus.emit("params:muffling", parseFloat(mufflingSlider.value));
mufflingSlider.addEventListener("input", (e) => bus.emit("params:muffling", parseFloat(e.target.value)));

const echoSlider = document.getElementById("echo-slider");
bus.emit("params:echo", parseFloat(echoSlider.value));
echoSlider.addEventListener("input", (e) => {
  const v = parseFloat(e.target.value);
  bus.emit("params:echo", v);
  audio.setEchoMix(v); // ensure wet mix and echo tails respond
});

const accessibilityBtn = document.getElementById("accessibility-btn");
let accessibility = false;
if (accessibilityBtn) {
  accessibilityBtn.addEventListener("click", () => {
    accessibility = !accessibility;
    accessibilityBtn.setAttribute("aria-pressed", String(accessibility));
    bus.emit("accessibility:toggle", accessibility);
  });
}

const spatialSelect = document.getElementById("spatial-select");
if (spatialSelect) spatialSelect.addEventListener("change", (e) => audio.setSpatialMode(e.target.value === "Virtual 5.1" ? "virtual-5.1" : "stereo"));

const materialSelect = document.getElementById("material-select");
const thicknessSlider = document.getElementById("thickness-slider");
const destructibleToggle = document.getElementById("destructible-toggle");
const sendWallConfig = () => bus.emit("wall:config", { material: materialSelect.value, thickness: parseFloat(thicknessSlider.value), destructible: !!destructibleToggle.checked });
materialSelect.addEventListener("change", sendWallConfig);
thicknessSlider.addEventListener("input", sendWallConfig);
destructibleToggle.addEventListener("change", sendWallConfig);
sendWallConfig();

const explodeBtn = document.getElementById("explode-btn");
if (explodeBtn) explodeBtn.addEventListener("click", () => bus.emit("explode"));

// multi-source controls
const addSrcBtn = document.getElementById("add-source-btn");
const remSrcBtn = document.getElementById("remove-source-btn");
if (addSrcBtn) addSrcBtn.addEventListener("click", () => bus.emit("source:add"));
if (remSrcBtn) remSrcBtn.addEventListener("click", () => bus.emit("source:remove"));

/* @tweakable waveform stroke color */
const WAVE_COLOR = "#00f2ea";
/* @tweakable waveform line width (px) */
const WAVE_LINE_WIDTH = 2;
/* @tweakable waveform baseline color */
const WAVE_BASE_COLOR = "rgba(255,255,255,0.15)";
const losGraph = document.getElementById("los-graph");
if (losGraph) {
  const gctx = losGraph.getContext("2d");
  let arr = null; /* @tweakable reuse analyser buffer to reduce GC pressure */
  const drawWave = () => {
    const w = losGraph.width, h = losGraph.height;
    gctx.clearRect(0,0,w,h);
    gctx.strokeStyle = WAVE_BASE_COLOR; gctx.lineWidth = 1;
    gctx.beginPath(); gctx.moveTo(0, h/2); gctx.lineTo(w, h/2); gctx.stroke();
    if (audio.analyser) {
      if (!arr) arr = new Uint8Array(audio.analyser.fftSize/2);
      audio.analyser.getByteTimeDomainData(arr);
      gctx.strokeStyle = WAVE_COLOR; gctx.lineWidth = WAVE_LINE_WIDTH;
      gctx.beginPath();
      for (let i=0;i<arr.length;i++){
        const x = (i/(arr.length-1))*w;
        const v = (arr[i]-128)/128;
        const y = h/2 + v*(h*0.42);
        if (i===0) gctx.moveTo(x,y); else gctx.lineTo(x,y);
      }
      gctx.stroke();
    }
    requestAnimationFrame(drawWave);
  };
  requestAnimationFrame(drawWave);
}

  </script>
</body>
</html>
