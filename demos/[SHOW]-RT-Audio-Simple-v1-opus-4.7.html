<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RT Audio Simple</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    min-height: 100vh;
    padding: 36px 20px 28px;
    background: #111;
    color: #e8e8e8;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  #arena {
    display: block;
    width: min(700px, calc(100vw - 40px));
    aspect-ratio: 1 / 1;
    border: 1px solid rgba(255,255,255,0.18);
    background: #161616;
    touch-action: none;
  }
  #playBtn {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 44px;
    height: 44px;
    display: grid;
    place-items: center;
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 999px;
    background: #1c1c1c;
    color: #f4f4f4;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
  }
  #playBtn:hover { background: #262626; }
  #hint {
    margin: 6px 0 0;
    color: #b8b8b8;
    font-size: 13px;
    text-align: center;
  }
  #readout {
    color: #f0f0f0;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
  <button id="playBtn" type="button" aria-label="Play">&#9654;</button>
  <canvas id="arena" width="700" height="700"></canvas>
  <p id="hint">Drag the cyan player or orange source. Move behind the wall to hear the volume drop.</p>
  <div id="readout">LOS: 0%</div>

<script>
(() => {
  "use strict";

  const SIZE = 700;
  const RAY_COUNT = 16;
  const FAN_DEG = 8;
  const FAN_RAD = FAN_DEG * Math.PI / 180;

  const canvas = document.getElementById("arena");
  const ctx2d = canvas.getContext("2d");
  const readout = document.getElementById("readout");
  const playBtn = document.getElementById("playBtn");

  // Default positions: both above y=400 wall, clear horizontal sight line.
  const player = { x: 180, y: 230, r: 16, color: "#22d3ee" };
  const source = { x: 520, y: 230, r: 16, color: "#ff9a2f" };

  // Walls: one horizontal split at y=400 with a 100px doorway gap centered around x=350.
  // Plus a few short obstacles in the lower area for variety.
  const walls = [
    { x1: 60,  y1: 400, x2: 300, y2: 400 }, // left half of horizontal wall
    { x1: 400, y1: 400, x2: 640, y2: 400 }, // right half of horizontal wall (gap 300..400 = 100px)
    { x1: 150, y1: 480, x2: 150, y2: 620 }, // small vertical obstacle bottom-left
    { x1: 550, y1: 480, x2: 550, y2: 620 }  // small vertical obstacle bottom-right
  ];

  let audioCtx = null;
  let noiseBuffer = null;
  let bufferSource = null;
  let lowpass = null;
  let gainNode = null;
  let playing = false;

  let dragTarget = null;
  let dragDX = 0;
  let dragDY = 0;

  let losPct = 1;
  let selfTestRan = false;
  let selfTestFailed = false;
  let selfTestMsg = "";

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  // Ray (origin px,py, dir rx,ry) vs segment (a->b). Returns t (>=0) along ray
  // where it first hits the segment, or Infinity if no hit.
  // Uses parametric solve: P + t*D = A + u*(B-A), 0<=u<=1, t>=0.
  function raySegT(px, py, rx, ry, ax, ay, bx, by) {
    const sx = bx - ax;
    const sy = by - ay;
    const denom = rx * sy - ry * sx;
    if (Math.abs(denom) < 1e-9) return Infinity; // parallel
    const dx = ax - px;
    const dy = ay - py;
    const t = (dx * sy - dy * sx) / denom;
    const u = (dx * ry - dy * rx) / denom;
    if (t >= 0 && u >= 0 && u <= 1) return t;
    return Infinity;
  }

  function computeLOS() {
    const dx = source.x - player.x;
    const dy = source.y - player.y;
    const distToSource = Math.hypot(dx, dy);
    if (distToSource < 1e-6) return 1;

    const baseAngle = Math.atan2(dy, dx);
    let unobstructed = 0;

    for (let i = 0; i < RAY_COUNT; i++) {
      const fanT = RAY_COUNT === 1 ? 0.5 : i / (RAY_COUNT - 1);
      const angle = baseAngle + (fanT * 2 - 1) * FAN_RAD;
      const rx = Math.cos(angle);
      const ry = Math.sin(angle);
      let closest = Infinity;
      for (let j = 0; j < walls.length; j++) {
        const w = walls[j];
        const t = raySegT(player.x, player.y, rx, ry, w.x1, w.y1, w.x2, w.y2);
        if (t < closest) closest = t;
      }
      // unobstructed if closest hit is farther than the source
      if (closest > distToSource) unobstructed++;
    }
    return unobstructed / RAY_COUNT;
  }

  function drawArena() {
    ctx2d.clearRect(0, 0, SIZE, SIZE);
    ctx2d.fillStyle = "#161616";
    ctx2d.fillRect(0, 0, SIZE, SIZE);

    // walls
    ctx2d.save();
    ctx2d.lineWidth = 8;
    ctx2d.lineCap = "butt";
    ctx2d.strokeStyle = "#cccccc";
    for (const w of walls) {
      ctx2d.beginPath();
      ctx2d.moveTo(w.x1, w.y1);
      ctx2d.lineTo(w.x2, w.y2);
      ctx2d.stroke();
    }
    ctx2d.restore();

    // player and source
    drawDot(player);
    drawDot(source);

    if (selfTestFailed) drawSelfTestBar();
  }

  function drawDot(e) {
    ctx2d.beginPath();
    ctx2d.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx2d.fillStyle = e.color;
    ctx2d.fill();
    ctx2d.lineWidth = 2;
    ctx2d.strokeStyle = "rgba(255,255,255,0.85)";
    ctx2d.stroke();
  }

  function drawSelfTestBar() {
    ctx2d.fillStyle = "#c91515";
    ctx2d.fillRect(0, 0, SIZE, 36);
    ctx2d.fillStyle = "#fff";
    ctx2d.font = "13px system-ui, -apple-system, sans-serif";
    ctx2d.textAlign = "center";
    ctx2d.textBaseline = "middle";
    ctx2d.fillText(selfTestMsg, SIZE / 2, 18);
  }

  function makeNoiseBuffer() {
    const sr = audioCtx.sampleRate;
    const buf = audioCtx.createBuffer(1, sr * 2, sr);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    return buf;
  }

  async function startAudio() {
    if (playing) return;
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
    }
    if (audioCtx.state === "suspended") await audioCtx.resume();
    if (!noiseBuffer) noiseBuffer = makeNoiseBuffer();

    bufferSource = audioCtx.createBufferSource();
    lowpass = audioCtx.createBiquadFilter();
    gainNode = audioCtx.createGain();

    bufferSource.buffer = noiseBuffer;
    bufferSource.loop = true;
    lowpass.type = "lowpass";
    lowpass.Q.value = 0.7;
    lowpass.frequency.value = 800 + 6200 * losPct;
    gainNode.gain.value = 0.05 + 0.95 * losPct;

    bufferSource.connect(lowpass);
    lowpass.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    bufferSource.start();

    playing = true;
    playBtn.textContent = "⏸";
    playBtn.setAttribute("aria-label", "Stop");
  }

  function stopAudio() {
    if (!playing) return;
    playing = false;
    playBtn.textContent = "▶";
    playBtn.setAttribute("aria-label", "Play");
    try { if (bufferSource) bufferSource.stop(); } catch {}
    if (bufferSource) { bufferSource.disconnect(); bufferSource = null; }
    if (lowpass) { lowpass.disconnect(); lowpass = null; }
    if (gainNode) { gainNode.disconnect(); gainNode = null; }
  }

  function updateAudio() {
    if (!playing || !audioCtx || !gainNode || !lowpass) return;
    const t = audioCtx.currentTime;
    gainNode.gain.setTargetAtTime(0.05 + 0.95 * losPct, t, 0.04);
    lowpass.frequency.setTargetAtTime(800 + 6200 * losPct, t, 0.04);
  }

  function eventToCanvas(ev) {
    const r = canvas.getBoundingClientRect();
    return {
      x: (ev.clientX - r.left) * (SIZE / r.width),
      y: (ev.clientY - r.top) * (SIZE / r.height)
    };
  }

  function pick(p) {
    let best = null;
    let bestDist = Infinity;
    for (const e of [player, source]) {
      const d = Math.hypot(p.x - e.x, p.y - e.y);
      if (d <= e.r + 8 && d < bestDist) { best = e; bestDist = d; }
    }
    return best;
  }

  canvas.addEventListener("pointerdown", (ev) => {
    const p = eventToCanvas(ev);
    const target = pick(p);
    if (!target) return;
    dragTarget = target;
    dragDX = p.x - target.x;
    dragDY = p.y - target.y;
    canvas.setPointerCapture(ev.pointerId);
    ev.preventDefault();
  });

  canvas.addEventListener("pointermove", (ev) => {
    if (!dragTarget) return;
    const p = eventToCanvas(ev);
    dragTarget.x = clamp(p.x - dragDX, dragTarget.r, SIZE - dragTarget.r);
    dragTarget.y = clamp(p.y - dragDY, dragTarget.r, SIZE - dragTarget.r);
    ev.preventDefault();
  });

  function endDrag(ev) {
    if (!dragTarget) return;
    if (canvas.hasPointerCapture(ev.pointerId)) canvas.releasePointerCapture(ev.pointerId);
    dragTarget = null;
  }
  canvas.addEventListener("pointerup", endDrag);
  canvas.addEventListener("pointercancel", endDrag);

  playBtn.addEventListener("click", () => {
    if (playing) { stopAudio(); return; }
    startAudio().catch((e) => { console.error("Audio start failed", e); stopAudio(); });
  });

  function frame() {
    losPct = computeLOS();
    readout.textContent = `LOS: ${Math.round(losPct * 100)}%`;
    drawArena();

    if (!selfTestRan) {
      selfTestRan = true;
      if (losPct < 0.5) {
        selfTestFailed = true;
        const pctRound = Math.round(losPct * 100);
        selfTestMsg = `LOS BUG: cyan and orange are in plain sight, detector reads ${pctRound}% (expected >= 50%)`;
        document.title = `LOS DETECTOR BUG: losPct = ${losPct}`;
        console.error("LOS DETECTOR BUG", losPct, {
          player: { x: player.x, y: player.y },
          source: { x: source.x, y: source.y },
          walls
        });
        drawArena();
      }
    }

    updateAudio();
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
