function log(msg) {
  const el = document.getElementById('progress-text');
  if (el) el.textContent = msg;
  console.log('[desloppify]', msg);
}

function setProgress(pct) {
  const el = document.getElementById('progress-fill');
  if (el) el.style.width = Math.min(100, pct) + '%';
}

function showError(msg) {
  const el = document.getElementById('progress');
  el.style.display = 'block';
  el.innerHTML = `<div class="error-msg">${msg}</div>`;
}

async function runFullScan(files, projectName) {
  const progressEl = document.getElementById('progress');
  const resultsEl = document.getElementById('results');
  progressEl.style.display = 'block';
  resultsEl.style.display = 'none';

  const allPaths = [...files.keys()];
  log('Detecting language...');
  setProgress(5);
  const lang = detectLanguage(allPaths) || 'generic';
  log(`Detected language: ${LANG_DISPLAY[lang] || lang}`);
  setProgress(10);

  let sourceFiles;
  if (lang === 'generic') {
    // No recognized language — use all non-binary files for file-level analysis
    log('No specific language detected — running file-level detectors on all files');
    sourceFiles = allPaths.filter(p => {
      const ext = p.substring(p.lastIndexOf('.')).toLowerCase();
      return !['.png','.jpg','.jpeg','.gif','.ico','.svg','.woff','.woff2','.ttf','.eot',
               '.mp3','.mp4','.zip','.tar','.gz','.pdf','.exe','.dll','.so','.dylib',
               '.bin','.dat','.db','.lock'].includes(ext);
    });
  } else {
    sourceFiles = getSourceFiles(files, lang);
  }
  if (sourceFiles.length === 0) {
    showError(`No analyzable source files found${lang !== 'generic' ? ` for ${lang}` : ''}.`);
    return;
  }
  log(`Found ${sourceFiles.length} ${lang !== 'generic' ? lang + ' ' : ''}source files`);

  // Init tree-sitter (non-blocking)
  log('Loading tree-sitter...');
  setProgress(15);
  const tsReady = await initTreeSitter();
  if (tsReady) log('Tree-sitter loaded');
  else log('Tree-sitter unavailable, using regex fallback');

  // Extract functions
  log('Extracting functions...');
  setProgress(25);
  const functions = await extractFunctions(files, lang, sourceFiles);
  log(`Extracted ${functions.length} functions`);
  setProgress(35);

  // Extract classes
  log('Extracting classes...');
  const classes = await extractClasses(files, lang, sourceFiles);
  log(`Extracted ${classes.length} classes`);
  setProgress(40);

  // Build import graph
  log('Building import graph...');
  const graph = await buildImportGraph(files, lang, sourceFiles);
  // Annotate graph nodes with LOC for orphaned/single-use detectors
  for (const [filepath, node] of Object.entries(graph)) {
    const content = files.get(filepath);
    node._loc = content ? content.split('\n').length : 0;
  }
  setProgress(50);

  // Run detectors
  log('Running detectors...');
  const findings = {}; // id → finding
  const potentials = {};
  let findingId = 0;

  function addFindings(detectorName, result, makeDetail) {
    potentials[detectorName] = result.potential;
    for (const entry of result.entries) {
      const id = `${detectorName}::${findingId++}`;
      findings[id] = {
        id, detector: detectorName, file: entry.file || entry.directory || '.',
        status: 'open', confidence: 'high', tier: DETECTOR_SCORING_POLICIES[detectorName]?.tier || 3,
        detail: makeDetail ? makeDetail(entry) : entry,
      };
    }
  }

  // File health: structural (complexity)
  const complexityResult = detectComplexity(files, sourceFiles, functions);
  addFindings('structural', complexityResult, e => ({ file: e.file, signals: e.signals, score: e.score }));
  setProgress(55);

  // Code quality: flat_dirs
  const flatResult = detectFlatDirs(sourceFiles);
  addFindings('flat_dirs', flatResult);

  // Code quality: naming
  const namingResult = detectNaming(sourceFiles);
  addFindings('naming', namingResult);

  // Code quality: orphaned
  const orphanedResult = detectOrphaned(graph, sourceFiles);
  addFindings('orphaned', orphanedResult);

  // Code quality: single_use
  const singleUseResult = detectSingleUse(graph, sourceFiles);
  addFindings('single_use', singleUseResult);

  // Code quality: coupling
  const couplingResult = detectCoupling(graph, sourceFiles);
  addFindings('coupling', couplingResult);

  // Code quality: logs (leftover debug statements)
  const logsResult = detectLogs(files, sourceFiles, lang);
  addFindings('logs', logsResult);

  // Code quality: deprecated code
  const deprecatedResult = detectDeprecated(files, sourceFiles);
  addFindings('deprecated', deprecatedResult);
  setProgress(65);

  // JSHint lint analysis (JS/TS only)
  let jshintResult = { entries: [], scanned: 0 };
  if (['javascript', 'typescript'].includes(lang)) {
    log('Running JSHint analysis...');
    jshintResult = detectJSHintIssues(files, sourceFiles, lang);
    if (jshintResult.entries.length > 0) {
      log(`JSHint: ${jshintResult.entries.length} issues in ${jshintResult.scanned} files`);
    }
  }
  setProgress(70);

  // Duplication: dupes
  const dupesResult = detectDuplicates(functions);
  addFindings('dupes', dupesResult, e => ({
    fn_a: e.fn_a, fn_b: e.fn_b, similarity: e.similarity, kind: e.kind
  }));
  setProgress(75);

  // Security: cycles
  const cyclesResult = detectCycles(graph);
  addFindings('cycles', cyclesResult, e => ({ files: e.files, length: e.length }));
  setProgress(80);

  // Go-specific detectors (if Go repo)
  let goSecurityResult = { entries: [], scanned: 0 };
  let goSmellsResult = { entries: [], totalFiles: 0 };
  if (lang === 'go') {
    log('Running Go security detectors...');
    goSecurityResult = detectGoSecurity(files);
    addFindings('go_security', goSecurityResult, e => ({
      file: e.file, line: e.line, check: e.check, summary: e.summary
    }));
    log('Running Go smell detectors...');
    goSmellsResult = detectGoSmells(files);
    log(`Go: ${goSecurityResult.entries.length} security + ${goSmellsResult.entries.length} smell findings`);
  }
  setProgress(82);

  // Display-only detectors (not scored)
  const largeResult = detectLargeFiles(files, sourceFiles);
  const godsResult = detectGods(classes);
  const sigResult = detectSignatureVariance(functions);

  // Compute scores
  log('Computing scores...');
  setProgress(85);
  const dimScores = computeDimensionScores(findings, potentials);
  const overallScore = computeHealthScore(dimScores);
  log(`Overall mechanical score: ${fmtScore(overallScore)}`);

  // Render scorecard
  log('Rendering scorecard...');
  setProgress(90);
  const canvas = document.getElementById('scorecard');
  renderScorecard(canvas, overallScore, dimScores, projectName);
  setProgress(95);

  // Save state for AI review (before displayResults which reads it)
  _lastScanState = { files, sourceFiles, dimScores, overallScore, projectName, lang };

  // Build results display
  displayResults(dimScores, overallScore, {
    large: largeResult, gods: godsResult, signature: sigResult,
    structural: complexityResult, flat_dirs: flatResult, naming: namingResult,
    orphaned: orphanedResult, single_use: singleUseResult, coupling: couplingResult,
    logs: logsResult, deprecated: deprecatedResult, jshint: jshintResult,
    dupes: dupesResult, cycles: cyclesResult,
    go_security: goSecurityResult, go_smells: goSmellsResult,
  }, sourceFiles.length, lang);

  setProgress(100);
  log('Scan complete!');
  progressEl.style.display = 'none';
  resultsEl.style.display = 'block';
  document.getElementById('input-card').style.display = 'none';
  document.getElementById('page-header').style.display = 'none';

  // Auto-trigger AI review if checkbox is enabled
  if (document.getElementById('ai-enabled').checked) {
    runAIReview();
  }
}

function displayResults(dimScores, overallScore, detectorResults, fileCount, lang) {
  // Score hero (text-based, copyable)
  const scoreNum = document.getElementById('score-number');
  scoreNum.textContent = fmtScore(overallScore);
  scoreNum.style.color = scoreColor(overallScore);
  document.getElementById('score-label').textContent = 'MECHANICAL HEALTH SCORE';
  document.getElementById('score-subtitle').textContent = '';
  document.getElementById('score-project').textContent = _lastScanState?.projectName || '';

  // Inline dim pills
  const activeDims = Object.entries(dimScores)
    .filter(([, d]) => d.checks > 0)
    .sort(([a], [b]) => (a === 'File health' ? -1 : b === 'File health' ? 1 : a.localeCompare(b)));
  const pillsEl = document.getElementById('score-dims');
  pillsEl.innerHTML = activeDims.map(([name, d]) =>
    `<span class="dim-pill">${name} <span class="pill-score" style="color:${scoreColor(d.score)}">${fmtScore(d.score)}%</span></span>`
  ).join('');

  // Dimension table
  const tableEl = document.getElementById('dim-table');
  let html = `<thead><tr><th>Dimension</th><th>Score</th><th>Checks</th><th>Issues</th></tr></thead><tbody>`;
  for (const [name, data] of activeDims) {
    html += `<tr>
      <td>${name}</td>
      <td class="score-cell" style="color:${scoreColor(data.score)}">${fmtScore(data.score)}%</td>
      <td>${data.checks}</td>
      <td>${data.issues}</td>
    </tr>`;
  }
  html += `<tr style="border-top:2px solid var(--border)">
    <td><strong>Overall</strong></td>
    <td class="score-cell" style="color:${scoreColor(overallScore)}"><strong>${fmtScore(overallScore)}</strong></td>
    <td>${fileCount} files</td>
    <td>${lang}</td>
  </tr>`;
  html += '</tbody>';
  tableEl.innerHTML = html;

  // Findings summary
  const summaryEl = document.getElementById('findings-summary');
  let shtml = '<h3>Findings</h3>';

  const detectorLabels = {
    large: 'Large Files', structural: 'Complexity', flat_dirs: 'Flat Directories',
    naming: 'Naming Inconsistencies', orphaned: 'Orphaned Files', single_use: 'Single-Use Abstractions',
    coupling: 'High Coupling', logs: 'Debug/Log Statements', deprecated: 'Deprecated Code',
    jshint: 'JSHint Lint Issues', dupes: 'Duplicates', cycles: 'Import Cycles',
    gods: 'God Classes', signature: 'Signature Variance',
    go_security: 'Go Security Issues', go_smells: 'Go Code Smells',
  };

  for (const [key, label] of Object.entries(detectorLabels)) {
    const result = detectorResults[key];
    if (!result || result.entries.length === 0) continue;
    shtml += `<div class="finding-group"><h4>${label} (${result.entries.length})</h4>`;
    const shown = result.entries.slice(0, 10);
    for (const entry of shown) {
      let text = '';
      if (entry.file) text = entry.file;
      if (entry.directory) text = entry.directory;
      if (entry.loc) text += ` (${entry.loc} LOC)`;
      if (entry.file_count) text += ` — ${entry.file_count} files`;
      if (entry.signals) text += ` — ${entry.signals.join(', ')}`;
      if (entry.similarity) text += ` — ${Math.round(entry.similarity * 100)}% similar`;
      if (entry.fn_a) text = `${entry.fn_a.file}:${entry.fn_a.name} ↔ ${entry.fn_b.file}:${entry.fn_b.name}`;
      if (entry.files && entry.length) text = `Cycle of ${entry.length}: ${entry.files.slice(0, 5).join(' → ')}`;
      if (entry.reasons) text += ` — ${entry.reasons.join(', ')}`;
      if (entry.minority) text += ` — ${entry.minority_count} ${entry.minority} vs ${entry.majority_count} ${entry.majority}`;
      if (entry.sole_importer) text += ` — only used by ${entry.sole_importer}`;
      if (entry.name && entry.signature_count) text = `${entry.name} — ${entry.signature_count} variants across ${entry.file_count} files`;
      // Logs/deprecated entries (file + count)
      if (entry.count && !entry.check && !entry.id) text += ` — ${entry.count} occurrences`;
      // JSHint entries
      if (entry.reason) text = `${entry.file}:${entry.line} — ${entry.reason}`;
      // Go security entries
      if (entry.check) text = `${entry.file}:${entry.line} — [${entry.check}] ${entry.summary}`;
      // Go smell entries (grouped by smell type)
      if (entry.id && entry.label && entry.matches) text = `${entry.label} (${entry.count} hits)`;
      shtml += `<div class="finding-item">${escapeHtml(text)}</div>`;
    }
    if (result.entries.length > 10) {
      shtml += `<div class="finding-item" style="font-style:italic">...and ${result.entries.length - 10} more</div>`;
    }
    shtml += '</div>';
  }
  summaryEl.innerHTML = shtml;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function downloadScorecard() {
  const canvas = document.getElementById('scorecard');
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'desloppify-scorecard.png';
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

// Global state for AI review integration
let _lastScanState = null;

const AI_REVIEW_PROMPT = `You are a code quality reviewer. Analyze the following code samples from a repository and rate them on these 5 dimensions (each 0-100).

Score from evidence only. Do not inflate scores. If code is mediocre, say so.

Dimensions:
1. **Naming quality**: Are variable/function/class names descriptive, consistent, and following language conventions?
2. **Error consistency**: Is error handling thorough, uniform, and following language idioms?
3. **Abstraction fit**: Are abstractions at the right level? Not over-engineered or under-engineered?
4. **Logic clarity**: Is the control flow easy to follow? Are complex conditions well-structured?
5. **AI-generated debt**: Does this code show signs of AI-generated slop (repetitive boilerplate, over-commented obvious code, inconsistent patterns)?

Return ONLY valid JSON with this exact shape (no markdown fences, no explanation outside the JSON):
{
  "assessments": {
    "naming_quality": {"score": 0, "rationale": ""},
    "error_consistency": {"score": 0, "rationale": ""},
    "abstraction_fit": {"score": 0, "rationale": ""},
    "logic_clarity": {"score": 0, "rationale": ""},
    "ai_generated_debt": {"score": 0, "rationale": ""}
  },
  "findings": [
    {"dimension": "", "summary": "", "file": "", "suggestion": ""}
  ],
  "overall_subjective": 0,
  "summary": ""
}

CODE_SAMPLES`;

function sampleCodeForReview(files, sourceFiles, maxSamples = 8, maxCharsPerFile = 3000) {
  // Pick a diverse mix: largest files + random small ones
  const withSize = sourceFiles.map(fp => ({ fp, size: (files.get(fp) || '').length }));
  withSize.sort((a, b) => b.size - a.size);

  const picked = [];
  // Take top 4 largest (most representative)
  for (let i = 0; i < Math.min(4, withSize.length); i++) picked.push(withSize[i].fp);
  // Take 4 random from the rest
  const rest = withSize.slice(4);
  for (let i = rest.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [rest[i], rest[j]] = [rest[j], rest[i]];
  }
  for (let i = 0; i < Math.min(4, rest.length); i++) picked.push(rest[i].fp);

  let samples = '';
  for (const fp of picked.slice(0, maxSamples)) {
    const content = files.get(fp) || '';
    const truncated = content.length > maxCharsPerFile
      ? content.substring(0, maxCharsPerFile) + '\n... (truncated)'
      : content;
    samples += `\n--- FILE: ${fp} ---\n${truncated}\n`;
  }
  return samples;
}

async function runAIReview() {
  if (!_lastScanState) return;
  const { files, sourceFiles, dimScores, overallScore, projectName, lang } = _lastScanState;

  const statusEl = document.getElementById('ai-status');
  const selectedModel = document.getElementById('ai-model').value;
  statusEl.style.display = 'block';

  try {
    // Check if puter.js is loaded
    if (typeof puter === 'undefined') {
      statusEl.textContent = 'Puter.js not loaded. Please refresh the page.';
      return;
    }

    // Auth check — signIn triggers popup (must be from user click)
    statusEl.textContent = 'Signing into Puter (popup may appear)...';
    try {
      const isSignedIn = await puter.auth.isSignedIn();
      if (!isSignedIn) {
        await puter.auth.signIn();
      }
    } catch (authErr) {
      statusEl.textContent = 'Puter auth cancelled or blocked. Allow popups and try again.';
      return;
    }

    statusEl.textContent = 'Sampling code for AI review...';
    const codeSamples = sampleCodeForReview(files, sourceFiles);
    const prompt = AI_REVIEW_PROMPT.replace('CODE_SAMPLES', codeSamples);

    statusEl.textContent = `AI reviewing code via ${selectedModel} (15-60s)...`;
    const response = await puter.ai.chat(prompt, {
      model: selectedModel,
      temperature: 0.2,
      max_tokens: 3000,
    });

    // Puter returns { message: { content: [{ type: "text", text: "..." }] } }
    const content = response?.message?.content;
    let text;
    if (Array.isArray(content)) {
      text = content.filter(b => b.type === 'text').map(b => b.text).join('');
    } else if (typeof content === 'string') {
      text = content;
    } else {
      text = response?.text || String(response);
    }

    // Parse JSON from response
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) {
      statusEl.textContent = 'AI returned non-JSON response. Showing raw output below.';
      document.getElementById('findings-summary').innerHTML +=
        `<div class="finding-group"><h4>AI Review (raw)</h4><pre style="white-space:pre-wrap;font-size:0.8rem">${escapeHtml(text)}</pre></div>`;
      return;
    }

    const review = JSON.parse(jsonMatch[0]);
    statusEl.textContent = 'AI review complete! Updating scorecard...';

    // Add subjective dimensions to the dimension table
    const subjectiveDims = {};
    if (review.assessments) {
      const dimNames = {
        naming_quality: 'Naming quality',
        error_consistency: 'Error consistency',
        abstraction_fit: 'Abstraction fit',
        logic_clarity: 'Logic clarity',
        ai_generated_debt: 'AI-generated debt',
      };
      for (const [key, data] of Object.entries(review.assessments)) {
        const name = dimNames[key] || key;
        subjectiveDims[name] = {
          score: data.score, checks: 1, issues: data.score < 70 ? 1 : 0,
          rationale: data.rationale, source: 'ai',
        };
      }
    }

    // Compute blended score (40% mechanical, 60% subjective — matching CLI)
    const mechScore = overallScore;
    const subjScores = Object.values(subjectiveDims).map(d => d.score);
    const subjAvg = subjScores.length > 0
      ? subjScores.reduce((a, b) => a + b, 0) / subjScores.length : null;

    let blendedScore;
    if (subjAvg !== null) {
      blendedScore = mechScore * 0.4 + subjAvg * 0.6;
    } else {
      blendedScore = mechScore;
    }

    // Update score hero for blended mode
    const scoreNum = document.getElementById('score-number');
    scoreNum.textContent = fmtScore(blendedScore);
    scoreNum.style.color = scoreColor(blendedScore);
    document.getElementById('score-label').textContent = 'DESLOPPIFY SCORE';
    document.getElementById('score-subtitle').textContent = 'mechanical + AI review';

    // Update dim pills
    const allDimsPills = { ...dimScores, ...subjectiveDims };
    const pillDims = Object.entries(allDimsPills).filter(([, d]) => d.checks > 0);
    document.getElementById('score-dims').innerHTML = pillDims.map(([name, d]) =>
      `<span class="dim-pill">${name} <span class="pill-score" style="color:${scoreColor(d.score)}">${fmtScore(d.score)}%</span></span>`
    ).join('');

    // Re-render hidden canvas for PNG export
    const canvas = document.getElementById('scorecard');
    renderScorecard(canvas, blendedScore, { ...dimScores, ...subjectiveDims }, projectName, true);

    // Update dimension table
    const tableEl = document.getElementById('dim-table');
    const allDims = { ...dimScores, ...subjectiveDims };
    const activeDims = Object.entries(allDims)
      .filter(([, d]) => d.checks > 0)
      .sort(([a, da], [b, db]) => {
        // Mechanical first, then subjective
        const aIsSubj = da.source === 'ai' ? 1 : 0;
        const bIsSubj = db.source === 'ai' ? 1 : 0;
        if (aIsSubj !== bIsSubj) return aIsSubj - bIsSubj;
        return a === 'File health' ? -1 : b === 'File health' ? 1 : a.localeCompare(b);
      });

    let html = `<thead><tr><th>Dimension</th><th>Score</th><th>Source</th><th>Notes</th></tr></thead><tbody>`;
    for (const [name, data] of activeDims) {
      const isAI = data.source === 'ai';
      html += `<tr${isAI ? ' style="background:rgba(68,120,68,0.06)"' : ''}>
        <td>${name}${isAI ? ' <span style="color:var(--green);font-size:0.75rem">[AI]</span>' : ''}</td>
        <td class="score-cell" style="color:${scoreColor(data.score)}">${fmtScore(data.score)}%</td>
        <td style="font-size:0.8rem;color:var(--dim)">${isAI ? 'Puter AI' : 'Mechanical'}</td>
        <td style="font-size:0.8rem;color:var(--dim)">${data.rationale || (isAI ? '' : `${data.checks} checks, ${data.issues} issues`)}</td>
      </tr>`;
    }
    html += `<tr style="border-top:2px solid var(--border)">
      <td><strong>Mechanical</strong></td>
      <td class="score-cell" style="color:${scoreColor(mechScore)}"><strong>${fmtScore(mechScore)}</strong></td>
      <td></td><td style="font-size:0.8rem;color:var(--dim)">40% weight</td>
    </tr>`;
    if (subjAvg !== null) {
      html += `<tr>
        <td><strong>Subjective (AI)</strong></td>
        <td class="score-cell" style="color:${scoreColor(subjAvg)}"><strong>${fmtScore(subjAvg)}</strong></td>
        <td></td><td style="font-size:0.8rem;color:var(--dim)">60% weight</td>
      </tr>`;
    }
    html += `<tr style="border-top:2px solid var(--accent)">
      <td><strong>Overall (blended)</strong></td>
      <td class="score-cell" style="color:${scoreColor(blendedScore)}"><strong>${fmtScore(blendedScore)}</strong></td>
      <td>${sourceFiles.length} files</td><td>${lang}</td>
    </tr>`;
    html += '</tbody>';
    tableEl.innerHTML = html;

    // Add AI findings to findings summary
    if (review.findings && review.findings.length > 0) {
      const summaryEl = document.getElementById('findings-summary');
      let aiFindingsHtml = '<div class="finding-group"><h4 style="color:var(--green)">AI Review Findings</h4>';
      for (const f of review.findings.slice(0, 15)) {
        aiFindingsHtml += `<div class="finding-item">${escapeHtml(
          `[${f.dimension || 'general'}] ${f.file || ''}: ${f.summary || ''}`
        )}</div>`;
      }
      if (review.summary) {
        aiFindingsHtml += `<div style="margin-top:0.5rem;font-style:italic;font-size:0.85rem;color:var(--text)">${escapeHtml(review.summary)}</div>`;
      }
      aiFindingsHtml += '</div>';
      summaryEl.innerHTML = aiFindingsHtml + summaryEl.innerHTML;
    }

    statusEl.textContent = `AI done — blended ${fmtScore(blendedScore)} (mech ${fmtScore(mechScore)}×0.4 + subj ${fmtScore(subjAvg)}×0.6)`;

  } catch (err) {
    const msg = err.message || String(err);
    if (msg.includes('usage-limited') || msg.includes('limit')) {
      statusEl.textContent = 'Puter credits exhausted — sign up at puter.com for more.';
    } else {
      statusEl.textContent = `AI review error: ${msg}`;
    }
  }
}

// ── Main Entry Points ───────────────────────────────────────────────────────

async function startScan() {
  const input = document.getElementById('repo-url').value;
  const parsed = parseRepoUrl(input);
  if (!parsed) { showError('Invalid repo URL. Use: owner/repo or https://github.com/owner/repo'); return; }

  const { owner, repo } = parsed;
  const scanBtn = document.getElementById('scan-btn');
  scanBtn.disabled = true;
  document.getElementById('progress').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('manual-paste').style.display = 'none';

  try {
    log('Fetching repository info...');
    setProgress(2);
    let branch = parsed.branch;
    if (!branch) {
      try { branch = await fetchDefaultBranch(owner, repo); }
      catch (e) { branch = 'main'; }
    }

    log(`Fetching file tree (branch: ${branch})...`);
    setProgress(5);
    let files;

    try {
      const tree = await fetchRepoTree(owner, repo, branch);
      log(`Found ${tree.length} files in tree, fetching contents...`);
      files = await fetchFileContents(owner, repo, branch, tree, (done, total) => {
        setProgress(5 + (done / total) * 40);
        log(`Fetching files... ${done}/${total}`);
      });
    } catch (e) {
      log(`GitHub API failed (${e.message}), trying gitingest fallback...`);
      files = await fetchViaGitingest(owner, repo);
      if (!files || files.size === 0) {
        showError(
          `Could not fetch repo. GitHub API: ${e.message}. Gitingest fallback also failed. ` +
          `Try adding a GitHub token, or paste output below.`
        );
        document.getElementById('token-row').style.display = 'block';
        document.getElementById('manual-paste').style.display = 'block';
        scanBtn.disabled = false;
        return;
      }
      log(`Got ${files.size} files via gitingest`);
    }

    if (!files || files.size === 0) {
      showError('No files fetched. The repo might be empty or private.');
      scanBtn.disabled = false;
      return;
    }

    log(`Loaded ${files.size} files, starting analysis...`);
    await runFullScan(files, `${owner}/${repo}`);
  } catch (e) {
    showError(`Scan failed: ${e.message}`);
    console.error(e);
  } finally {
    scanBtn.disabled = false;
  }
}

async function scanFromPaste() {
  const text = document.getElementById('paste-area').value;
  if (!text.trim()) { showError('Paste area is empty.'); return; }
  const files = parseGitingestText(text);
  if (files.size === 0) { showError('Could not parse any files from the pasted text.'); return; }
  log(`Parsed ${files.size} files from paste`);
  document.getElementById('manual-paste').style.display = 'none';
  await runFullScan(files, 'pasted-repo');
}

// ── Token persistence ────────────────────────────────────────────────────
const tokenInput = document.getElementById('gh-token');
const savedToken = sessionStorage.getItem('gh_token');
if (savedToken) { tokenInput.value = savedToken; document.getElementById('token-row').style.display = 'block'; }
tokenInput.addEventListener('input', () => sessionStorage.setItem('gh_token', tokenInput.value));

// ── Theme toggle ─────────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☀' : '☾';
  localStorage.setItem('desloppify-theme', theme);
}
document.getElementById('theme-toggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
});
applyTheme(localStorage.getItem('desloppify-theme') || 'dark');

// ── AI checkbox ──────────────────────────────────────────────────────────
document.getElementById('ai-enabled').addEventListener('change', (e) => {
  document.getElementById('ai-model').disabled = !e.target.checked;
});

// ── Button events ────────────────────────────────────────────────────────
document.getElementById('scan-btn').addEventListener('click', () => startScan());
document.getElementById('paste-btn').addEventListener('click', () => scanFromPaste());
document.getElementById('download-btn').addEventListener('click', () => downloadScorecard());
document.getElementById('rescan-btn').addEventListener('click', () => {
  document.getElementById('results').style.display = 'none';
  document.getElementById('input-card').style.display = '';
  document.getElementById('page-header').style.display = '';
  window.scrollTo(0, 0);
});
document.getElementById('repo-url').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') startScan();
});

// ── Public API (for MCP / external callers) ──────────────────────────────
window.desloppify = {
  /** Scan a GitHub repo programmatically. Returns { score, dimensions, findings }. */
  async scan(repo, opts = {}) {
    const parsed = parseRepoUrl(repo);
    if (!parsed) throw new Error('Invalid repo: use owner/repo');
    const { owner, repo: repoName } = parsed;
    let branch = parsed.branch;
    if (!branch) { try { branch = await fetchDefaultBranch(owner, repoName); } catch { branch = 'main'; } }
    const tree = await fetchRepoTree(owner, repoName, branch);
    const files = await fetchFileContents(owner, repoName, branch, tree);
    const lang = autoDetectLang(files);
    const sourceFiles = [...files.keys()].filter(f => isSourceFile(f, lang));
    // Run detectors (simplified — no progress UI)
    const functions = [], classes = [], imports = [];
    await extractAST(files, sourceFiles, lang, functions, classes, imports);
    const findings = new Map(); const potentials = new Map();
    const addFindings = (det, result, mapper) => {
      if (!result || !result.entries) return;
      const f = result.entries.map(mapper);
      findings.set(det, f); potentials.set(det, result.potential || result.scanned || result.entries.length);
    };
    // Core detectors
    const complexity = detectComplexity(functions);
    addFindings('complexity', complexity, e => ({ file: e.file, signals: e.signals }));
    const flatResult = detectFlatDirs(files, sourceFiles);
    addFindings('flat_dirs', flatResult, e => ({ directory: e.directory, file_count: e.file_count }));
    const namingResult = detectNaming(sourceFiles);
    addFindings('naming', namingResult, e => ({ file: e.file, minority: e.minority }));
    const orphanedResult = detectOrphaned(sourceFiles, imports);
    addFindings('orphaned', orphanedResult, e => ({ file: e.file }));
    const singleUseResult = detectSingleUse(sourceFiles, imports);
    addFindings('single_use', singleUseResult, e => ({ file: e.file, sole_importer: e.sole_importer }));
    const couplingResult = detectCoupling(imports, sourceFiles);
    addFindings('coupling', couplingResult, e => ({ file: e.file }));
    const logsResult = detectLogs(files, sourceFiles, lang);
    addFindings('logs', logsResult, e => ({ file: e.file, count: e.count }));
    const deprecatedResult = detectDeprecated(files, sourceFiles, lang);
    addFindings('deprecated', deprecatedResult, e => ({ file: e.file, count: e.count }));
    const dupesResult = detectDuplicates(functions);
    addFindings('dupes', dupesResult, e => ({ fn_a: e.fn_a, fn_b: e.fn_b, similarity: e.similarity }));
    const cyclesResult = detectCycles(imports);
    addFindings('cycles', cyclesResult, e => ({ files: e.files, length: e.length }));
    const dimScores = computeDimensionScores(findings, potentials);
    const score = computeHealthScore(dimScores);
    return {
      score, lang,
      dimensions: Object.fromEntries(Object.entries(dimScores).filter(([,d]) => d.checks > 0).map(([k,d]) => [k, { score: d.score, checks: d.checks, issues: d.issues }])),
      findings: Object.fromEntries([...findings.entries()].map(([k,v]) => [k, v.length])),
    };
  },
  /** Get last scan state */
  get lastScan() { return _lastScanState; },
};
</script>
